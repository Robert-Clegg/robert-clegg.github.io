                        );
                      })}
                      {/* Icon row: 4 icons in a row */}
                      {(() => {
                        const iconY = y + 20 + 2 * (pillH + 1);
                        const iconS = 14;
                        const iconGap = (pillW - iconItems.length * iconS) / (iconItems.length + 1);
                        return iconItems.map((ic, ii) => {
                          const icAge = time - (inputNodeFire[ic.key] || -999);
                          const lit = icAge < 1.5 && time > 0.1;
                          const intensity = lit ? Math.exp(-icAge * 1.0) : 0;
                          const ix = bx + innerPad + iconGap + ii * (iconS + iconGap);
                          return (
                            <g key={`icon-${ii}`}>
                              <rect x={ix} y={iconY} width={iconS} height={iconS} rx={3}
                                fill={lit ? `${ic.color}${Math.round(intensity * 30).toString(16).padStart(2,'0')}` : "rgba(255,255,255,0.02)"}
                                stroke={lit ? `${ic.color}88` : "rgba(255,255,255,0.08)"} strokeWidth={0.5} />
                              {lit && <rect x={ix - 1} y={iconY - 1} width={iconS + 2} height={iconS + 2} rx={4}
                                fill="none" stroke={ic.color} strokeWidth={1} opacity={intensity * 0.5} filter="url(#glowSmall)" />}
                              <text x={ix + iconS / 2} y={iconY + 10.5} textAnchor="middle"
                                fill={lit ? ic.color : "rgba(255,255,255,0.15)"}
                                fontSize={9} fontFamily="sans-serif"
                                opacity={lit ? 0.6 + intensity * 0.4 : 0.4}>{ic.label}</text>
                            </g>
                          );
                        });
                      })()}
                    </g>
                  );
                }

                // — HUD box: Heatmap | Dock | UNIT inset — abstract visual data + active cell —
                if (box.id === "hud") {
                  const hmAge = time - inputNodeFire.heatmap;
                  const scAge = time - inputNodeFire.schematic;
                  const rdAge = time - inputNodeFire.readout;
                  const hmAct = hmAge < 2.0 && time > 0.1 ? Math.exp(-hmAge * 0.7) : 0;
                  const scAct = scAge < 1.5 && time > 0.1 ? Math.exp(-scAge * 0.9) : 0;
                  const rdAct = rdAge < 1.5 && time > 0.1 ? Math.exp(-rdAge * 1.0) : 0;
                  const anyAct = hmAct + scAct + rdAct > 0.1;
                  const innerPad = 3;
                  const labelH = 12;
                  const contentY = y + labelH;
                  const contentH = boxH - labelH - 2;

                  // ── UNIT state (embedded at right edge) ──
                  const switchEvents = treeEvents.filter(e => e.type === "SwitchEvent" && e.t <= time);
                  const lastSwitch = switchEvents.length > 0 ? switchEvents[switchEvents.length - 1] : null;
                  const currentUnit = (time > 0.1 && lastSwitch) ? (lastSwitch?.data?.toUnitType || "") : "";
                  const switchAge = lastSwitch ? time - lastSwitch.t : 999;
                  const switchFresh = time > 0.1 && switchAge < 1.0;
                  const switchPulse = switchFresh ? Math.exp(-switchAge * 2.5) : 0;
                  const pathogenSet = new Set(["VirusType","PneumoniaType","MycobacteriumType","TuberculosisType"]);
                  const immuneSet2 = new Set(["NeutrophilType","TCellType","NKCellType","MacrophageType"]);
                  const isPathogen = pathogenSet.has(currentUnit);
                  const isImmune = immuneSet2.has(currentUnit);
                  const teamColor = isPathogen ? "#ff3344" : isImmune ? "#44ddff" : "#666666";
                  const unitNames = {
                    NeutrophilType: "NEUT", NKCellType: "NK", TCellType: "TCELL",
                    MacrophageType: "MACRO", VirusType: "VIRUS", PneumoniaType: "PNEUM",
                    MycobacteriumType: "MYCO", TuberculosisType: "TB"
                  };
                  const unitName = unitNames[currentUnit] || "—";

                  // ── Independent timers — gated behind time > 0.1 so HUD starts dim like AUDIO/TXT ──
                  const gameStarted = time > 0.1;
                  const sqCycle = playing && gameStarted ? (time % 12) : 12;
                  const sqOn = sqCycle < 10;
                  const sqFade = sqCycle >= 10 && sqCycle < 11;
                  const sqOpacity = gameStarted ? (sqOn ? Math.min(1, sqCycle * 1.5) : sqFade ? (1 - (sqCycle - 10)) : 0) : 0;

                  const dkCycle = playing && gameStarted ? (time % 9) : 9;
                  const dkOn = dkCycle < 6;
                  const dkFade = dkCycle >= 6 && dkCycle < 7.5;
                  const dkOpacity = gameStarted ? (dkOn ? Math.min(1, dkCycle * 1) : dkFade ? (1 - (dkCycle - 6) * 0.67) : 0) : 0;

                  // ── Layout: heatmap left, dock middle, UNIT inset right ──
                  const unitInsetW = Math.round((contentH + 4) / 3); // 1/3 size
                  const unitInsetH = Math.round(contentH / 3);
                  const dockW = 10;
                  const availW = bw - innerPad * 2;
                  const sqSize = contentH;
                  const sqX = bx + innerPad;
                  const sqY = contentY;
                  const sqCols = 5, sqRows = 5;
                  const sqCellW = sqSize / sqCols, sqCellH = sqSize / sqRows;
                  const sqSeed = Math.floor(time / 5) * 7;

                  const unitInsetX = bx + bw - innerPad - unitInsetW;
                  const dockX = unitInsetX - dockW - 2;
                  const dockY = contentY;
                  const dockH = contentH;
                  const dockRows = 7;
                  const dockRowH = dockH / dockRows;
                  const clickIdx = dkOn ? Math.floor(((time * 0.53) % dockRows)) : -1;
                  const dualSeed = Math.floor(time * 0.53);
                  const hasDual = dkOn && ((dualSeed * 7 + 3) % 10) < 3;
                  const clickIdx2 = hasDual ? (clickIdx + 1 + ((dualSeed * 13) % (dockRows - 1))) % dockRows : -1;

                   // -- Radar sweep -- gap between heatmap and dock --
                   const radarGapX = sqX + sqSize + 2;
                   const radarGapW = dockX - radarGapX - 2;
                   const radarR = Math.min(radarGapW, contentH) / 2 - 1;
                   const radarCx = radarGapX + radarGapW / 2;
                   const radarCy = contentY + contentH / 2;
                   const radarAngle = gameStarted ? (time * 0.3) % (Math.PI * 2) : 0;
                   const radarOpacity = gameStarted ? Math.min(1, (time - 0.5) * 2) : 0;
                   const radarBlips = Array.from({ length: 8 }, (_, bi) => {
                     const seed1 = Math.sin((bi + 1) * 127.1 + Math.floor(time / 6) * 311.7) * 43758.5453;
                     const blipAngle = ((seed1 % 1) + 1) % 1 * Math.PI * 2;
                     const seed2 = Math.sin((bi + 1) * 269.3 + Math.floor(time / 6) * 183.1) * 21037.2;
                     const blipDist = 0.25 + (((seed2 % 1) + 1) % 1) * 0.7;
                     const bx2 = radarCx + Math.cos(blipAngle) * blipDist * radarR;
                     const by2 = radarCy + Math.sin(blipAngle) * blipDist * radarR;
                     let angleDiff = radarAngle - blipAngle;
                     while (angleDiff < 0) angleDiff += Math.PI * 2;
                     while (angleDiff > Math.PI * 2) angleDiff -= Math.PI * 2;
                     const blipAge = angleDiff / (Math.PI * 2);
                     const blipBright = blipAge < 0.15 ? 1.0 - blipAge / 0.15 * 0.3 : Math.max(0, 0.7 - (blipAge - 0.15) * 1.2);
                     return { x: bx2, y: by2, bright: blipBright };
                   });

                  // ── UNIT SVG rendering (scaled to fit small inset) ──
                  const ucx = unitInsetX + unitInsetW / 2;
                  const ucy = contentY + unitInsetH / 2;
                  const us = Math.min(unitInsetH, unitInsetW) * 0.455; // scale factor (+30%)
                  const renderUnitSVG = () => {
                    const strokeW = switchFresh ? 1.5 + switchPulse : 1.0;
                    const strokeOp = switchFresh ? 0.9 + switchPulse * 0.1 : 0.7;
                    const fillOp = switchFresh ? 0.15 + switchPulse * 0.15 : 0.08;
                    const st = { fill: `${teamColor}${Math.round(fillOp * 255).toString(16).padStart(2,'0')}`, stroke: teamColor, strokeWidth: strokeW, opacity: strokeOp, strokeLinejoin: "round", strokeLinecap: "round" };
                    switch(currentUnit) {
                      case "NeutrophilType": {
                        const r1 = us * 0.85, r2 = us * 0.4;
                        const arms = [0, 120, 240].map(a => {
                          const rad = a * Math.PI / 180;
                          return `M ${ucx + Math.cos(rad) * r2} ${ucy + Math.sin(rad) * r2} Q ${ucx + Math.cos(rad) * r1 * 0.9} ${ucy + Math.sin(rad) * r1 * 0.9} ${ucx + Math.cos(rad + 0.5) * r1} ${ucy + Math.sin(rad + 0.5) * r1} A ${r2 * 1.2} ${r2 * 1.2} 0 0 1 ${ucx + Math.cos(rad - 0.5) * r1} ${ucy + Math.sin(rad - 0.5) * r1} Q ${ucx + Math.cos(rad) * r1 * 0.9} ${ucy + Math.sin(rad) * r1 * 0.9} ${ucx + Math.cos(rad) * r2} ${ucy + Math.sin(rad) * r2}`;
                        });
                        return <g><circle cx={ucx} cy={ucy} r={r2 * 0.5} {...st} />{arms.map((d, i) => <path key={i} d={d} {...st} />)}</g>;
                      }
                      case "NKCellType": {
                        const pts = [0, 45, 90, 135, 180, 225, 270, 315].map((a, i) => {
                          const rad = a * Math.PI / 180;
                          const r = us * (0.6 + (i % 2 === 0 ? 0.35 : 0.15) + (i === 1 || i === 5 ? 0.2 : 0));
                          return [ucx + Math.cos(rad) * r, ucy + Math.sin(rad) * r];
                        });
                        const d = pts.map((p, i) => i === 0 ? `M ${p[0]} ${p[1]}` : `Q ${(pts[i-1][0] + p[0]) / 2 + (i % 2 ? 3 : -3)} ${(pts[i-1][1] + p[1]) / 2 + (i % 3 ? 2 : -2)} ${p[0]} ${p[1]}`).join(" ") + " Z";
                        return <g><path d={d} {...st} /><circle cx={ucx - 1} cy={ucy} r={us * 0.28} {...st} /></g>;
                      }
                      case "TCellType": case "MacrophageType": {
                        const r = us * 0.65; const bumps = 6;
                        const pts2 = Array.from({length: bumps * 2}, (_, i) => { const a = (i * Math.PI) / bumps; const br = i % 2 === 0 ? r + us * 0.2 : r - us * 0.05; return [ucx + Math.cos(a) * br, ucy + Math.sin(a) * br]; });
                        const d2 = pts2.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0]} ${p[1]}`).join(" ") + " Z";
                        return <g><path d={d2} {...st} /><circle cx={ucx} cy={ucy} r={r * 0.35} {...st} strokeDasharray="2 2" /></g>;
                      }
                      case "VirusType": {
                        return <g><polygon points={`${ucx},${ucy - us * 0.75} ${ucx - us * 0.65},${ucy + us * 0.5} ${ucx + us * 0.65},${ucy + us * 0.5}`} {...st} /></g>;
                      }
                      case "PneumoniaType": {
                        const spheres = [[ucx - us * 0.35, ucy - us * 0.3, us * 0.28], [ucx + us * 0.1, ucy, us * 0.32], [ucx - us * 0.25, ucy + us * 0.35, us * 0.24], [ucx + us * 0.35, ucy + us * 0.4, us * 0.2]];
                        return <g>
                          {[[0,1],[1,2],[2,3]].map(([a,b], i) => <line key={i} x1={spheres[a][0]} y1={spheres[a][1]} x2={spheres[b][0]} y2={spheres[b][1]} stroke={teamColor} strokeWidth={strokeW * 0.6} opacity={strokeOp * 0.5} />)}
                          {spheres.map((sp, i) => <circle key={`s${i}`} cx={sp[0]} cy={sp[1]} r={sp[2]} {...st} />)}</g>;
                      }
                      case "MycobacteriumType": {
                        const rodW = us * 0.2, rodH2 = us * 0.55;
                        const rods = [[ucx - us * 0.15, ucy - us * 0.1, -20], [ucx + us * 0.15, ucy + us * 0.05, 25], [ucx - us * 0.05, ucy + us * 0.25, -40]];
                        return <g>{rods.map(([rx, ry, angle], i) => <rect key={i} x={rx - rodW / 2} y={ry - rodH2 / 2} width={rodW} height={rodH2} rx={rodW / 2} transform={`rotate(${angle} ${rx} ${ry})`} {...st} />)}
                          <ellipse cx={ucx} cy={ucy + us * 0.05} rx={us * 0.35} ry={us * 0.45} fill="none" stroke={teamColor} strokeWidth={strokeW * 0.4} opacity={strokeOp * 0.3} strokeDasharray="3 2" /></g>;
                      }
                      case "TuberculosisType": {
                        const r = us * 0.6;
                        return <g>
                          <rect x={ucx - us * 0.12} y={ucy - r} width={us * 0.24} height={r * 2} rx={us * 0.12} transform={`rotate(30 ${ucx} ${ucy})`} {...st} />
                          <rect x={ucx - us * 0.12} y={ucy - r} width={us * 0.24} height={r * 2} rx={us * 0.12} transform={`rotate(-30 ${ucx} ${ucy})`} {...st} />
                          {[0, 60, 120, 180, 240, 300].map((a, i) => { const rad = a * Math.PI / 180; return <line key={i} x1={ucx + Math.cos(rad) * r * 0.7} y1={ucy + Math.sin(rad) * r * 0.7} x2={ucx + Math.cos(rad) * r * 1.1} y2={ucy + Math.sin(rad) * r * 1.1} stroke={teamColor} strokeWidth={strokeW * 0.5} opacity={strokeOp * 0.5} />; })}</g>;
                      }
                      default: return <text x={ucx} y={ucy + 3} textAnchor="middle" fill="#666" fontSize={8} fontFamily={mono}>?</text>;
                    }
                  };

                  return (
                    <g key={`raw-${box.id}`}>
                      {anyAct && <rect x={bx - 2} y={y - 2} width={bw + 4} height={boxH + 4} rx={8}
                        fill="none" stroke={`${box.color}40`} strokeWidth={3} filter="url(#glow)" />}
                      <rect x={bx} y={y} width={bw} height={boxH} rx={5}
                        fill={`${box.color}10`}
                        stroke={`${box.color}aa`} strokeWidth={anyAct ? 1.0 : 0.5} />
                      <text x={bx + bw / 2} y={y + 9} textAnchor="middle"
                        fill="#ffaa44" fontSize={7} fontFamily={mono} fontWeight={700} letterSpacing={1.5}>HUD</text>

                      {/* Square heatmap — left side */}
                      <rect x={sqX} y={sqY} width={sqSize} height={sqSize} rx={2}
                        fill={sqOpacity > 0.05 ? "rgba(0,0,0,0.3)" : "rgba(255,255,255,0.02)"}
                        stroke={sqOpacity > 0.05 ? "#ffaa4455" : "#ffaa4422"} strokeWidth={0.5} />
                      {sqOpacity > 0.02 && Array.from({ length: sqCols * sqRows }, (_, ci) => {
                        const col = ci % sqCols, row2 = Math.floor(ci / sqCols);
                        const h = ((sqSeed + ci * 37 + ci * ci * 13) % 100) / 100;
                        const r2 = Math.round(h < 0.5 ? h * 2 * 180 : 180 + (h - 0.5) * 2 * 75);
                        const g2 = Math.round(h < 0.4 ? 40 + h * 100 : h < 0.7 ? 80 + (h - 0.4) * 200 : 140 + (h - 0.7) * 380);
                        const b2 = Math.round(h < 0.3 ? 80 + h * 200 : h < 0.6 ? 140 - (h - 0.3) * 300 : Math.max(0, 50 - (h - 0.6) * 125));
                        return (
                          <rect key={`sq-${ci}`}
                            x={sqX + col * sqCellW + 0.3} y={sqY + row2 * sqCellH + 0.3}
                            width={sqCellW - 0.6} height={sqCellH - 0.6} rx={0.5}
                            fill={`rgb(${r2},${g2},${b2})`} opacity={sqOpacity * (0.35 + h * 0.4)} />
                        );
                      })}
                      {sqOpacity > 0.1 && <>
                        <line x1={sqX + sqSize / 2} y1={sqY + 1} x2={sqX + sqSize / 2} y2={sqY + sqSize - 1}
                          stroke="#ffaa4433" strokeWidth={0.3} />
                        <line x1={sqX + 1} y1={sqY + sqSize / 2} x2={sqX + sqSize - 1} y2={sqY + sqSize / 2}
                          stroke="#ffaa4433" strokeWidth={0.3} />
                      </>}

                      {/* Radar sweep between heatmap and dock */}
                      {radarR > 3 && <>
                        <circle cx={radarCx} cy={radarCy} r={radarR} fill="rgba(0,0,0,0.35)"
                          stroke={radarOpacity > 0.05 ? "#ffaa4444" : "#ffaa4418"} strokeWidth={0.5} />
                        {radarOpacity > 0.02 && <>
                          <circle cx={radarCx} cy={radarCy} r={radarR * 0.5}
                            fill="none" stroke="#ffaa4418" strokeWidth={0.3} />
                          <circle cx={radarCx} cy={radarCy} r={radarR * 0.25}
                            fill="none" stroke="#ffaa4412" strokeWidth={0.3} />
                          <line x1={radarCx - radarR} y1={radarCy} x2={radarCx + radarR} y2={radarCy}
                            stroke="#ffaa4415" strokeWidth={0.3} />
                          <line x1={radarCx} y1={radarCy - radarR} x2={radarCx} y2={radarCy + radarR}
                            stroke="#ffaa4415" strokeWidth={0.3} />
                          <line x1={radarCx} y1={radarCy}
                            x2={radarCx + Math.cos(radarAngle) * radarR}
                            y2={radarCy + Math.sin(radarAngle) * radarR}
                            stroke="#ffaa44" strokeWidth={1} opacity={radarOpacity * 0.8} />
                                                    <line x1={radarCx} y1={radarCy} x2={radarCx + Math.cos(radarAngle - 0.2) * radarR} y2={radarCy + Math.sin(radarAngle - 0.2) * radarR} stroke="#ffaa44" strokeWidth={0.5} opacity={radarOpacity * 0.06} />
                          <line x1={radarCx} y1={radarCy} x2={radarCx + Math.cos(radarAngle - 0.45) * radarR} y2={radarCy + Math.sin(radarAngle - 0.45) * radarR} stroke="#ffaa44" strokeWidth={0.5} opacity={radarOpacity * 0.045} />
                          <line x1={radarCx} y1={radarCy} x2={radarCx + Math.cos(radarAngle - 0.7) * radarR} y2={radarCy + Math.sin(radarAngle - 0.7) * radarR} stroke="#ffaa44" strokeWidth={0.5} opacity={radarOpacity * 0.03} />

                          {radarBlips.map((blip, bi) => blip.bright > 0.05 && (
                            <circle key={`rb-${bi}`} cx={blip.x} cy={blip.y}
                              r={1 + blip.bright * 1.2}
                              fill="#ffaa44" opacity={radarOpacity * blip.bright * 0.9} />
                          ))}
                          <circle cx={radarCx} cy={radarCy} r={1} fill="#ffaa44" opacity={radarOpacity * 0.6} />
                        </>}
                      </>}

                      {/* Vertical dock — middle */}
                      <rect x={dockX} y={dockY} width={dockW} height={dockH} rx={2}
                        fill={dkOpacity > 0.05 ? "rgba(0,0,0,0.25)" : "rgba(255,255,255,0.02)"}
                        stroke={dkOpacity > 0.05 ? "#ffaa4444" : "#ffaa4422"} strokeWidth={0.5} />
                      {Array.from({ length: dockRows }, (_, ri) => {
                        const ry = dockY + ri * dockRowH;
                        const isClicked = ri === clickIdx || ri === clickIdx2;
                        return (
                          <g key={`dk-${ri}`}>
                            <rect x={dockX + 0.8} y={ry + 0.4} width={dockW - 1.6} height={dockRowH - 0.8} rx={1}
                              fill={isClicked ? "#ffaa4433" : "rgba(255,255,255,0.01)"}
                              stroke={isClicked ? "#ffaa44aa" : "#ffaa4412"} strokeWidth={isClicked ? 0.5 : 0.2} />
                            <circle cx={dockX + dockW / 2} cy={ry + dockRowH / 2}
                              r={isClicked ? 2 : 1.2}
                              fill={isClicked ? "#ffaa44" : "#ffaa4430"}
                              opacity={isClicked ? 0.85 : 0.35} />
                          </g>
                        );
                      })}

                      {/* UNIT inset — right corner: neon SVG of active cell */}
                      <rect x={unitInsetX} y={contentY} width={unitInsetW} height={unitInsetH} rx={2}
                        fill={switchFresh ? `${teamColor}0a` : currentUnit ? "rgba(0,0,0,0.15)" : "rgba(0,0,0,0.08)"}
                        stroke={switchFresh ? `${teamColor}66` : currentUnit ? `${teamColor}33` : "#ffffff18"}
                        strokeWidth={0.6} />
                      {switchFresh && <rect x={unitInsetX - 1} y={contentY - 1} width={unitInsetW + 2} height={unitInsetH + 2} rx={3}
                        fill="none" stroke={teamColor} strokeWidth={1 + switchPulse} filter="url(#glow)" opacity={switchPulse * 0.4} />}
                      {currentUnit ? renderUnitSVG() : (
                        <text x={ucx} y={ucy + 2} textAnchor="middle" fill="#ffffff18" fontSize={6} fontFamily={mono}>?</text>
                      )}
                    </g>
                  );
                }

                // — CELLS box: minimap + yellow kill splashes + population bars —
                // v35: WORLD uses full 2× container width
                if (box.id === "cam") {
                  const worldX = bx; // full container left edge
                  const worldW = bw; // full container width
                  const labelH = 14;
                  const pad = 4;
                  const mapX = worldX + pad;
                  const mapY = y + labelH + pad;
                  const mapW = worldW - pad * 2;
                  const mapH = boxH - labelH - pad * 2;
                  const hasDots = cellSightings.length > 0;
                  const GAME_SIZE = 450; // v36: expanded to show cells near edges/spawning off-field
                  // Max age for opacity scaling
                  const maxAge = Math.max(10, time);
                  return (
                    <g key={`raw-${box.id}`}>
                      <rect x={worldX - 3} y={y - 3} width={worldW + 6} height={boxH + 6} rx={10}
                        fill="none" stroke="#00ddff30" strokeWidth={4} filter="url(#glow)" />
                      <rect x={worldX} y={y} width={worldW} height={boxH} rx={8}
                        fill="#00ddff12"
                        stroke="#00ddffcc" strokeWidth={1.2} />
                      <text x={worldX + worldW / 2} y={y + 10} textAnchor="middle"
                        fill="#00ddff"
                        fontSize={7} fontFamily={mono} fontWeight={700} letterSpacing={1.5}>WORLD</text>
                      {/* Minimap background */}
                      <rect x={mapX} y={mapY} width={mapW} height={mapH} rx={2}
                        fill="rgba(0,0,0,0.5)" stroke="rgba(255,255,255,0.2)" strokeWidth={0.8} />
                      {/* Bright grid lines */}
                      {[0.2, 0.4, 0.6, 0.8].map(frac => (
                        <g key={`mg-${frac}`}>
                          <line x1={mapX + mapW * frac} y1={mapY} x2={mapX + mapW * frac} y2={mapY + mapH}
                            stroke="rgba(255,255,255,0.15)" strokeWidth={0.5} strokeDasharray="2,3" />
                          <line x1={mapX} y1={mapY + mapH * frac} x2={mapX + mapW} y2={mapY + mapH * frac}
                            stroke="rgba(255,255,255,0.15)" strokeWidth={0.5} strokeDasharray="2,3" />
                        </g>
                      ))}
                      {/* All observed cell positions — only after game starts */}
                      {time > 0.1 && cellSightings.filter(dot => dot.x >= 0 && dot.x <= GAME_SIZE && dot.z >= 0 && dot.z <= GAME_SIZE).map((dot, di) => {
                        const nx = mapX + Math.max(0, Math.min(1, dot.x / GAME_SIZE)) * mapW;
                        const nz = mapY + mapH - Math.max(0, Math.min(1, dot.z / GAME_SIZE)) * mapH;
                        const color = dot.team === "imm" ? "#66bbff" : dot.team === "path" ? "#ff5555" : "#777777";
                        // Live cells stay bright; trails decay; player cell always full brightness
                        const opacity = dot.player ? 1.0
                          : dot.dead ? 0.2
                          : dot.age < 0.5 ? 1.0           // just placed — full bright
                          : dot.age < 3 ? 0.85             // recent — still bright
                          : dot.age < 8 ? 0.4              // trail — fading
                          : 0.15;                           // old ghost
                        const sz = dot.dead ? 2 : dot.team === "node" ? 6 : dot.player ? 5 : 3.5;
                        return (
                          <rect key={`cs-${di}`} x={nx - sz / 2} y={nz - sz / 2} width={sz} height={sz}
                            rx={dot.team === "node" ? 1 : 0.5}
                            fill={dot.dead ? "rgba(100,100,100,0.3)" : color} opacity={opacity} />
                        );
                      })}
                      {/* Kill splashes — skull & crossbones */}
                      {time > 0.1 && killSplashes.filter(ks => ks.x >= 0 && ks.x <= GAME_SIZE && ks.z >= 0 && ks.z <= GAME_SIZE).map((ks, ki) => {
                        const kx = mapX + (ks.x / GAME_SIZE) * mapW;
                        const kz = mapY + mapH - (ks.z / GAME_SIZE) * mapH;
                        const fade = Math.pow(Math.max(0, 1 - ks.age / KILL_SPLASH_FADE), 0.6);
                        const sz = 7;
                        return (
                          <g key={`ks-${ki}`} opacity={fade}>
                            {/* Expanding ring */}
                            <circle cx={kx} cy={kz} r={2 + ks.age * 4} fill="none"
                              stroke="#ffdd00" strokeWidth={0.5} opacity={0.4} />
                            {/* Skull emoji rendered as text */}
                            <text x={kx} y={kz + sz * 0.4} textAnchor="middle"
                              fontSize={sz * 1.4} style={{ userSelect: "none" }}>💀</text>
                          </g>
                        );
                      })}
                      {/* Player position */}
                      {/* ═══ GAME NODES — hollow circles, infected = red spill ═══ */}
                      {Object.entries(MAP_NODES).map(([name, pos]) => {
                        const nx = mapX + (pos.x / GAME_SIZE) * mapW;
                        const nz = mapY + mapH - (pos.z / GAME_SIZE) * mapH;
                        const owner = nodeOwnership[name];
                        const isInfected = owner === 1; // pathogen team
                        const isImmune = owner === 2;
                        const isBase = name.includes("Base");
                        const isLarge = name.includes("Large");
                        const r = isBase ? 8 : isLarge ? 6 : 4;
                        const strokeColor = isInfected ? "#ff4444" : isImmune ? "#4499ff" : "#666666";
                        return (
                          <g key={`node-${name}`}>
                            {/* Infection spill — red virus particles radiating outward */}
                            {isInfected && Array.from({length: 6}, (_, i) => {
                              const angle = (i / 6) * Math.PI * 2 + time * 0.3;
                              const dist = r + 3 + Math.sin(time * 0.7 + i * 1.3) * 4;
                              const sx = nx + Math.cos(angle) * dist;
                              const sy = nz + Math.sin(angle) * dist;
                              const op = 0.3 + Math.sin(time * 1.1 + i * 2.1) * 0.2;
                              return <circle key={`spill-${i}`} cx={sx} cy={sy} r={1.2} fill="#ff4444" opacity={op} />;
                            })}
                            {/* Node ring — hollow circle */}
                            <circle cx={nx} cy={nz} r={r} fill="none"
                              stroke={strokeColor} strokeWidth={isBase ? 1.5 : 1} opacity={0.8} />
                            {/* Inner dot when owned */}
                            {owner && <circle cx={nx} cy={nz} r={r * 0.35}
                              fill={isInfected ? "#ff4444" : "#4499ff"} opacity={0.5} />}
                          </g>
                        );
                      })}
                      {/* Player position */}
                      {playerPos && (() => {
                        const px = mapX + (playerPos.x / GAME_SIZE) * mapW;
                        const pz = mapY + mapH - (playerPos.z / GAME_SIZE) * mapH;
                        const isPath = ["VirusType","PneumoniaType","MycobacteriumType","TuberculosisType"].includes(playerPos.type);
                        const ringColor = isPath ? "#ff4444" : "#4499ff";
                        return (
                          <g>
                            <circle cx={px} cy={pz} r={4} fill="none" stroke={ringColor} strokeWidth={1} opacity={0.6}>
                              <animate attributeName="r" values="3;5;3" dur="1.5s" repeatCount="indefinite" />
                              <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.5s" repeatCount="indefinite" />
                            </circle>
                            <circle cx={px} cy={pz} r={2} fill="#ffffff" opacity={0.9} />
                          </g>
                        );
                      })()}

                    </g>
                  );
                }

                // — Default box rendering (fallback) —
                return (
                  <g key={`raw-${box.id}`}>
                    {isHot && (
                      <rect x={bx - 3} y={y - 3} width={bw + 6} height={boxH + 6} rx={10}
                        fill="none" stroke={box.color} strokeWidth={2} filter="url(#glow)">
                        <animate attributeName="opacity" values="0.7;0.15;0.7" dur="0.6s" repeatCount="indefinite" />
                      </rect>
                    )}
                    <rect x={bx} y={y} width={bw} height={boxH} rx={8}
                      fill={isHot ? `${box.color}18` : isActive ? `${box.color}0a` : "transparent"}
                      stroke={isHot ? `${box.color}88` : isActive ? `${box.color}44` : box.color}
                      strokeWidth={isHot ? 1.5 : 1}>
                      {isFresh && <animate attributeName="opacity" values="1;0.5;1" dur="0.25s" repeatCount="2" />}
                    </rect>
                    <text x={bx + bw / 2} y={y + boxH / 2 - 4}
                      textAnchor="middle" fill={isActive ? box.color : box.color}
                      fontSize={13} fontFamily={mono} fontWeight={isHot ? 800 : 600}
                      letterSpacing={2}>{box.label}</text>
                    <text x={bx + bw / 2} y={y + boxH / 2 + 10}
                      textAnchor="middle" fill={isActive ? "rgba(255,255,255,0.4)" : `${box.color}88`}
                      fontSize={8} fontFamily={mono}>{box.sub}</text>
                  </g>
                );
              })}

              {/* Connection lines: channels → game events (merged pipeline) */}
              {renderChannelToDerivedEdges()}
              {renderDerivedToEventEdges()}
              {renderDerivedFeatureNodes()}

              {/* Network edges with cumulative trail */}
              {renderEdges(EVENT_SKILL_EDGES, TREE_EVENTS, TREE_SKILLS, "event", "skill")}
              {renderSubSkillToLayerEdges()}
              {renderEdges(LAYER_PROFILE_EDGES, TREE_LAYERS, TREE_PROFILES, "layer", "profile")}
              {renderEdges(PROFILE_CAREER_EDGES, TREE_PROFILES, TREE_CAREERS, "profile", "career")}

              {/* Network nodes */}
              {TREE_EVENTS.map(n => renderNode(n, "event"))}
              {TREE_SKILLS.map(n => renderNode(n, "skill"))}
              {renderSubSkills()}
              {TREE_LAYERS.map(n => renderNode(n, "layer"))}
              {TREE_PROFILES.map(n => renderNode(n, "profile"))}
              {TREE_CAREERS.map(n => renderNode(n, "career"))}

              {/* ─── SOFTMAX PROBABILITY BARS — confidence distribution across careers ─── */}
              {COL_RAMP.careers > 0 && (() => {
                const barW = nodeW[6]; // matches career node width
                const barH = 5;
                const barGap = 3;
                const sorted = [...TREE_CAREERS].sort((a, b) =>
                  (treeActivation.careerStrength[b.id] || 0) - (treeActivation.careerStrength[a.id] || 0)
                );
                const top1Id = sorted[0]?.id;
                const top2Id = sorted[1]?.id;
                const top3Id = sorted[2]?.id;
                const anyData = sorted[0] && (treeActivation.careerStrength[sorted[0].id] || 0) > 0.01;

                return TREE_CAREERS.map(n => {
                  const pos = getPos(n.col + 2, n.row);
                  const prob = treeActivation.careerStrength[n.id] || 0;
                  const fillW = prob * barW;
                  const barY = pos.y + nodeH + barGap;
                  const isTop1 = n.id === top1Id;
                  const isTop3 = n.id === top1Id || n.id === top2Id || n.id === top3Id;
                  const pct = Math.round(prob * 100);

                  const barColor = isTop1 ? "#c084fc" : isTop3 ? "#a855f7" : "rgba(168,85,247,0.3)";
                  const trackColor = "rgba(168,85,247,0.07)";
                  const pctColor = isTop1 ? "#c084fc" : isTop3 ? "rgba(168,85,247,0.7)" : "rgba(168,85,247,0.3)";

                  return (
                    <g key={`prob-${n.id}`}>
                      <rect x={pos.x} y={barY} width={barW} height={barH} rx={2.5} fill={trackColor} />
                      {fillW > 0 && (
                        <rect x={pos.x} y={barY} width={fillW} height={barH} rx={2.5} fill={barColor}
                          opacity={anyData ? 0.85 : 0}
                          filter={isTop1 && prob > 0.25 ? "url(#glowSmall)" : undefined} />
                      )}
                      {anyData && pct > 0 && (
                        <text x={pos.x + barW} y={pos.y + 19} textAnchor="end"
                          fill={pctColor} fontSize={7} fontFamily={mono} fontWeight={isTop1 ? 700 : 400}
                          opacity={0.9}>
                          {pct}%
                        </text>
                      )}
                      {isTop1 && prob > 0.2 && (
                        <circle cx={pos.x + fillW} cy={barY + barH / 2} r={2.5} fill="#c084fc">
                          <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite" />
                        </circle>
                      )}
                    </g>
                  );
                });
              })()}

              {/* Gap indicators */}
              {gaps.map(gapId => {
                const layer = TREE_LAYERS.find(l => l.id === gapId);
                if (!layer) return null;
                const pos = getPos(layer.col + 2, layer.row);
                return (
                  <g key={`gap-${gapId}`}>
                    <rect x={pos.x - 6} y={pos.y - 4} width={nodeW[layer.col + 2] + 12} height={nodeH + 8} rx={8} fill="none" stroke="rgba(255,60,60,0.25)" strokeWidth={1} strokeDasharray="4 3" />
                    <text x={pos.x + nodeW[layer.col + 2] + 12} y={pos.y + nodeH / 2 + 3} fill="rgba(255,60,60,0.5)" fontSize={7} fontFamily={mono}>GAP</text>
                  </g>
                );
              })}
            </svg>
          </div>

        </>;
      })()}

      {/* ═══ COMPARE — Population Braided River ═══ */}
      {tab === "compare" && (() => {
        const CW = 1100, CH = 500;
        const cPad = { top: 50, bottom: 40, left: 60, right: 60 };
        const plotW = CW - cPad.left - cPad.right;
        const plotH = CH - cPad.top - cPad.bottom;

        // ═══ SYNTHETIC POPULATION — 8 archetype trajectories ═══
        // Each archetype has cognitive layer activation weights per game phase
        // Y-position = weighted average of L1(top) to L4(bottom)
        // Phase columns: Opening(0-30s) | Early-Mid(30-60s) | Mid(60-90s) | Late-Mid(90-120s) | Endgame(120-150s) | Resolution(150s+)
        const PHASES = ["Opening", "Early Mid", "Middlegame", "Late Mid", "Endgame", "Resolution"];
        const phaseX = (i) => cPad.left + (i / (PHASES.length - 1)) * plotW;
        const layerY = (weights) => {
          // weights = [L1, L2, L3, L4] normalized — higher L1 = top, higher L4 = bottom
          const total = weights[0] + weights[1] + weights[2] + weights[3];
          if (total === 0) return cPad.top + plotH / 2;
          const norm = weights.map(w => w / total);
          const yFrac = norm[0] * 0.0 + norm[1] * 0.33 + norm[2] * 0.66 + norm[3] * 1.0;
          return cPad.top + yFrac * plotH;
        };

        // Archetype definitions: name, color, phase weights [L1,L2,L3,L4] per phase, final career
        const ARCHETYPES = [
          {
            id: "rush_swarm", name: "Rush → Swarm → Steamroll", color: "#ff4444", career: "Rapid Response",
            phases: [[0.8,0.15,0.05,0],[0.7,0.2,0.1,0],[0.5,0.3,0.15,0.05],[0.4,0.25,0.25,0.1],[0.5,0.2,0.2,0.1],[0.6,0.15,0.15,0.1]],
            width: 2.5, players: 18
          },
          {
            id: "rush_deny", name: "Rush → Denial → Lockdown", color: "#ff6644", career: "Precision Execution",
            phases: [[0.8,0.15,0.05,0],[0.5,0.25,0.2,0.05],[0.2,0.2,0.4,0.2],[0.1,0.15,0.4,0.35],[0.05,0.1,0.4,0.45],[0.05,0.1,0.35,0.5]],
            width: 1.8, players: 12
          },
          {
            id: "scout_expand", name: "Scout → Expansionist → Lockdown", color: "#44cc44", career: "Systems Design",
            phases: [[0.1,0.5,0.3,0.1],[0.1,0.35,0.4,0.15],[0.05,0.2,0.5,0.25],[0.05,0.15,0.45,0.35],[0.05,0.1,0.45,0.4],[0.05,0.1,0.4,0.45]],
            width: 2.2, players: 22
          },
          {
            id: "scout_surgical", name: "Scout → Surgical → Assassin", color: "#22aa66", career: "Technical Analysis",
            phases: [[0.1,0.5,0.3,0.1],[0.3,0.35,0.25,0.1],[0.4,0.3,0.15,0.15],[0.5,0.2,0.1,0.2],[0.4,0.15,0.15,0.3],[0.35,0.15,0.15,0.35]],
            width: 1.5, players: 8
          },
          {
            id: "fortify_expand", name: "Fortify → Expansionist → Lockdown", color: "#4488ff", career: "Strategic Leadership",
            phases: [[0.05,0.15,0.6,0.2],[0.05,0.15,0.55,0.25],[0.05,0.1,0.5,0.35],[0.05,0.1,0.45,0.4],[0.05,0.1,0.4,0.45],[0.05,0.05,0.4,0.5]],
            width: 2.8, players: 25
          },
          {
            id: "fortify_deny", name: "Fortify → Denial → Steamroll", color: "#6666ff", career: "Systems Design",
            phases: [[0.05,0.15,0.6,0.2],[0.1,0.2,0.45,0.25],[0.2,0.25,0.35,0.2],[0.3,0.25,0.3,0.15],[0.4,0.2,0.25,0.15],[0.5,0.2,0.2,0.1]],
            width: 1.5, players: 10
          },
          {
            id: "infiltrate_flex", name: "Infiltrate → Read → Flex", color: "#aa44ff", career: "Creative Production",
            phases: [[0.15,0.35,0.3,0.2],[0.15,0.3,0.3,0.25],[0.2,0.25,0.25,0.3],[0.2,0.2,0.25,0.35],[0.15,0.2,0.25,0.4],[0.15,0.2,0.2,0.45]],
            width: 2.0, players: 15
          },
          {
            id: "adaptive", name: "Adaptive Genius", color: "#888888", career: "Human Services",
            phases: [[0.25,0.25,0.25,0.25],[0.2,0.3,0.25,0.25],[0.2,0.25,0.3,0.25],[0.25,0.2,0.25,0.3],[0.2,0.25,0.2,0.35],[0.15,0.2,0.25,0.4]],
            width: 1.2, players: 6
          },
        ];

        // Generate trajectory points with jitter for each archetype
        const seed = (s) => {
          let h = 0xdeadbeef ^ s;
          return () => { h = Math.imul(h ^ (h >>> 16), 2246822507); h = Math.imul(h ^ (h >>> 13), 3266489909); return ((h ^= h >>> 16) >>> 0) / 4294967296; };
        };

        // Build heat map grid — 20 cols × 16 rows
        const heatCols = 20, heatRows = 16;
        const heatW = plotW / heatCols, heatH = plotH / heatRows;
        const heatGrid = Array.from({ length: heatRows }, () => Array(heatCols).fill(null));
        // Initialize with color accumulators
        for (let r = 0; r < heatRows; r++) for (let c = 0; c < heatCols; c++) heatGrid[r][c] = { count: 0, rr: 0, gg: 0, bb: 0 };

        // Generate all trajectory curves and populate heat map
        const allTrajectories = ARCHETYPES.map((arch, ai) => {
          const rng = seed(ai * 1337 + 42);
          const points = arch.phases.map((weights, pi) => ({
            x: phaseX(pi),
            y: layerY(weights) + (rng() - 0.5) * 20
          }));
          // Populate heat map by sampling along the curve
          for (let t = 0; t <= 1; t += 0.02) {
            const idx = t * (points.length - 1);
            const i0 = Math.floor(idx);
            const i1 = Math.min(i0 + 1, points.length - 1);
            const frac = idx - i0;
            const px = points[i0].x + (points[i1].x - points[i0].x) * frac;
            const py = points[i0].y + (points[i1].y - points[i0].y) * frac;
            const gc = Math.floor(Math.max(0, Math.min(heatCols - 1, (px - cPad.left) / plotW * heatCols)));
            const gr = Math.floor(Math.max(0, Math.min(heatRows - 1, (py - cPad.top) / plotH * heatRows)));
            const hex = arch.color;
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            heatGrid[gr][gc].count += arch.players;
            heatGrid[gr][gc].rr += r * arch.players;
            heatGrid[gr][gc].gg += g * arch.players;
            heatGrid[gr][gc].bb += b * arch.players;
          }
          return { ...arch, points };
        });

        // Normalize heat map
        const maxHeat = Math.max(1, ...heatGrid.flat().map(c => c.count));

        // Build bezier path from points
        const curvePath = (pts) => {
          if (pts.length < 2) return "";
          let d = `M${pts[0].x},${pts[0].y}`;
          for (let i = 0; i < pts.length - 1; i++) {
            const p0 = pts[i], p1 = pts[i + 1];
            const cpx = (p1.x - p0.x) * 0.4;
            d += ` C${p0.x + cpx},${p0.y} ${p1.x - cpx},${p1.y} ${p1.x},${p1.y}`;
          }
          return d;
        };

        // Detect convergence zones — where 3+ archetypes are within 30px vertically at same phase
        const convergences = [];
        for (let pi = 0; pi < PHASES.length; pi++) {
          const ys = allTrajectories.map(t => ({ y: t.points[pi].y, color: t.color, name: t.name }));
          ys.sort((a, b) => a.y - b.y);
          for (let i = 0; i < ys.length; i++) {
            const cluster = [ys[i]];
            for (let j = i + 1; j < ys.length; j++) {
              if (ys[j].y - ys[i].y < 40) cluster.push(ys[j]);
            }
            if (cluster.length >= 3) {
              const avgY = cluster.reduce((s, c) => s + c.y, 0) / cluster.length;
              convergences.push({ x: phaseX(pi), y: avgY, count: cluster.length, phase: PHASES[pi] });
              break; // one per phase
            }
          }
        }

        // Current player trajectory (Commander session mapped to phases)
        const cmdPhaseWeights = [
          [0.3, 0.3, 0.3, 0.1], // opening: mixed, figuring out
          [0.15, 0.25, 0.4, 0.2], // early mid: starting to plan
          [0.1, 0.2, 0.45, 0.25], // mid: strategic mode
          [0.05, 0.15, 0.4, 0.4], // late mid: metacognitive
          [0.05, 0.1, 0.4, 0.45], // endgame: full strategic
          [0.05, 0.1, 0.35, 0.5], // resolution: metacog dominant
        ];
        const playerPoints = cmdPhaseWeights.map((w, i) => ({ x: phaseX(i), y: layerY(w) }));
        const playerPath = curvePath(playerPoints);

        // Find closest archetype to player at each phase
        const playerMatch = allTrajectories.reduce((best, t) => {
          const dist = t.points.reduce((s, p, i) => s + Math.abs(p.y - playerPoints[i].y), 0);
          return dist < best.dist ? { dist, name: t.name, career: t.career, color: t.color } : best;
        }, { dist: Infinity, name: "", career: "", color: "" });

        return <>
          <div style={{ textAlign: "center", marginBottom: 8 }}>
            <div style={{ fontSize: 9, letterSpacing: 3, color: "rgba(255,255,255,0.25)", fontFamily: mono }}>
              POPULATION COGNITIVE TRAJECTORIES • {ARCHETYPES.reduce((s, a) => s + a.players, 0)} SYNTHETIC PLAYERS • 8 ARCHETYPES
            </div>
            <div style={{ fontSize: 11, color: "rgba(255,255,255,0.3)", marginTop: 4 }}>
              Braided river: trajectories converge at bottleneck events, diverge at strategic decisions
            </div>
          </div>

          <div style={{ overflowX: "auto" }}>
            <svg width={CW} height={CH} viewBox={`0 0 ${CW} ${CH}`} style={{ display: "block", margin: "0 auto", background: "rgba(0,0,0,0.3)", borderRadius: 12 }}>
              <defs>
                <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="4" result="blur" />
                  <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
                </filter>
                <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="8" result="blur" />
                  <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
                </filter>
              </defs>

              {/* Heat map background */}
              {heatGrid.map((row, ri) => row.map((cell, ci) => {
                if (cell.count < 1) return null;
                const intensity = Math.pow(cell.count / maxHeat, 0.5);
                const r = Math.round(cell.rr / cell.count);
                const g = Math.round(cell.gg / cell.count);
                const b = Math.round(cell.bb / cell.count);
                return (
                  <rect key={`h-${ri}-${ci}`}
                    x={cPad.left + ci * heatW} y={cPad.top + ri * heatH}
                    width={heatW + 1} height={heatH + 1}
                    fill={`rgba(${r},${g},${b},${intensity * 0.15})`} />
                );
              }))}

              {/* Phase columns */}
              {PHASES.map((p, i) => (
                <g key={`phase-${i}`}>
                  <line x1={phaseX(i)} y1={cPad.top - 5} x2={phaseX(i)} y2={cPad.top + plotH + 5}
                    stroke="rgba(255,255,255,0.06)" strokeWidth={0.5} strokeDasharray="4 6" />
                  <text x={phaseX(i)} y={cPad.top - 15} textAnchor="middle"
                    fill="rgba(255,255,255,0.25)" fontSize={8} fontFamily={mono} letterSpacing={1}>{p}</text>
                </g>
              ))}

              {/* Layer labels on left */}
              {[["L1 REACTIVE", 0], ["L2 PATTERN", 0.33], ["L3 STRATEGIC", 0.66], ["L4 METACOG", 1.0]].map(([label, frac]) => (
                <text key={label} x={cPad.left - 8} y={cPad.top + frac * plotH + 3}
                  textAnchor="end" fill="rgba(255,255,255,0.15)" fontSize={7} fontFamily={mono}>{label}</text>
              ))}

              {/* Archetype trajectory curves — background (wider, dim) */}
              {allTrajectories.map((t, i) => (
                <path key={`trail-bg-${i}`} d={curvePath(t.points)} fill="none"
                  stroke={t.color} strokeWidth={t.width * 3} opacity={0.06} filter="url(#softGlow)" />
              ))}

              {/* Archetype trajectory curves — main */}
              {allTrajectories.map((t, i) => (
                <g key={`trail-${i}`}>
                  <path d={curvePath(t.points)} fill="none"
                    stroke={t.color} strokeWidth={t.width} opacity={0.5} />
                  {/* Event dots at each phase */}
                  {t.points.map((p, pi) => (
                    <circle key={`dot-${i}-${pi}`} cx={p.x} cy={p.y} r={2.5}
                      fill={t.color} opacity={0.6} stroke="rgba(0,0,0,0.5)" strokeWidth={0.5} />
                  ))}
                </g>
              ))}

              {/* Convergence zones */}
              {convergences.map((c, i) => (
                <g key={`conv-${i}`}>
                  <circle cx={c.x} cy={c.y} r={18} fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth={1} strokeDasharray="3 3">
                    <animate attributeName="r" values="15;20;15" dur="3s" repeatCount="indefinite" />
                    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3s" repeatCount="indefinite" />
                  </circle>
                  <text x={c.x} y={c.y + 28} textAnchor="middle" fill="rgba(255,255,255,0.2)" fontSize={6} fontFamily={mono}>
                    {c.count} converge
                  </text>
                </g>
              ))}

              {/* CURRENT PLAYER overlay — thick white with session color glow */}
              <path d={playerPath} fill="none" stroke="#ffffff" strokeWidth={3} opacity={0.15} filter="url(#glow2)" />
              <path d={playerPath} fill="none" stroke="#ffffff" strokeWidth={2} opacity={0.8} />
              {playerPoints.map((p, i) => (
                <g key={`player-${i}`}>
                  <circle cx={p.x} cy={p.y} r={5} fill="#ffffff" opacity={0.9} stroke={C_COLOR} strokeWidth={1.5} />
                  {i === playerPoints.length - 1 && (
                    <circle cx={p.x} cy={p.y} r={8} fill="none" stroke="#ffffff" strokeWidth={1} opacity={0.4}>
                      <animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite" />
                      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite" />
                    </circle>
                  )}
                </g>
              ))}

              {/* Player label */}
              <text x={playerPoints[playerPoints.length - 1].x + 12} y={playerPoints[playerPoints.length - 1].y + 4}
                fill="#ffffff" fontSize={9} fontFamily={mono} fontWeight={700}>YOU</text>

              {/* Career endpoints */}
              {allTrajectories.map((t, i) => {
                const last = t.points[t.points.length - 1];
                return (
                  <text key={`career-${i}`} x={last.x + 12} y={last.y + 3}
                    fill={t.color} fontSize={7} fontFamily={mono} opacity={0.6}>{t.career}</text>
                );
              })}

              {/* Bottom axis — time */}
              <line x1={cPad.left} y1={cPad.top + plotH + 15} x2={cPad.left + plotW} y2={cPad.top + plotH + 15}
                stroke="rgba(255,255,255,0.1)" strokeWidth={0.5} />
              <text x={cPad.left} y={cPad.top + plotH + 28} fill="rgba(255,255,255,0.15)" fontSize={7} fontFamily={mono}>0s</text>
              <text x={cPad.left + plotW} y={cPad.top + plotH + 28} textAnchor="end" fill="rgba(255,255,255,0.15)" fontSize={7} fontFamily={mono}>180s</text>
              <text x={cPad.left + plotW / 2} y={cPad.top + plotH + 28} textAnchor="middle" fill="rgba(255,255,255,0.2)" fontSize={7} fontFamily={mono}>MATCH TIME →</text>
            </svg>
          </div>

          {/* Archetype legend */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, justifyContent: "center", marginTop: 12 }}>
            {ARCHETYPES.map(a => (
              <div key={a.id} style={{ display: "flex", alignItems: "center", gap: 4, padding: "3px 8px", borderRadius: 4,
                background: a.color + "10", border: "1px solid " + a.color + "30" }}>
                <div style={{ width: 8, height: 3, background: a.color, borderRadius: 1 }} />
                <span style={{ fontSize: 8, color: a.color, fontFamily: mono, opacity: 0.7 }}>{a.name}</span>
                <span style={{ fontSize: 7, color: "rgba(255,255,255,0.25)", fontFamily: mono }}>n={a.players}</span>
              </div>
            ))}
          </div>

          {/* Player match summary */}
          <div style={{ marginTop: 14, background: "rgba(255,255,255,0.06)", borderRadius: 10, padding: 14, border: "1px solid rgba(255,255,255,0.06)", textAlign: "center" }}>
            <div style={{ fontSize: 9, letterSpacing: 2, color: "rgba(255,255,255,0.25)", fontFamily: mono, marginBottom: 6 }}>CLOSEST POPULATION MATCH</div>
            <div style={{ fontSize: 16, fontWeight: 800, color: playerMatch.color }}>{playerMatch.name}</div>
            <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", marginTop: 4 }}>
              Career signal: <span style={{ color: playerMatch.color, fontWeight: 700 }}>{playerMatch.career}</span>
            </div>
            <div style={{ fontSize: 9, color: "rgba(255,255,255,0.2)", marginTop: 8, fontFamily: mono }}>
              Your trajectory most closely follows the {playerMatch.name} archetype.
              {" "}Players in this group tend toward {playerMatch.career} career pathways.
            </div>
          </div>
        </>;
      })()}



      <div style={{ textAlign: "center", marginTop: 20, fontSize: 8, color: "rgba(255,255,255,0.1)", fontFamily: mono, letterSpacing: 2 }}>
        PATHOGENIKA • COGNITIVE MECHANICS v46 • AUTO-LOAD • KNOVERSE AI © 2026
      </div>
      </div>{/* end content area wrapper */}
    </div>
  );
}

ReactDOM.render(React.createElement(TemporalReplay), document.getElementById("root"));
</script>
</body></html>
