<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Pathogenika — Video Sync</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #060610; color: white; font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Outfit:wght@400;700;900&display=swap');

  .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
  .header-brand { font-size: 8px; letter-spacing: 4px; color: rgba(255,255,255,0.15); font-family: 'JetBrains Mono', monospace; }
  .header-title { font-size: 14px; font-weight: 900; font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #00e5ff, #ff3d71); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header-status { display: flex; align-items: center; gap: 8px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-connected { background: #00ff88; box-shadow: 0 0 8px #00ff8866; }
  .dot-disconnected { background: #ff3d71; }
  .dot-waiting { background: #ffaa00; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .status-text { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px; }

  .video-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; background: #000; }
  video { width: 100%; height: 100%; object-fit: contain; background: #000; }

  .drop-zone { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; border: 2px dashed rgba(255,255,255,0.08); transition: all 0.2s; cursor: pointer; }
  .drop-zone.active { border-color: #a855f7; background: rgba(168,85,247,0.05); }
  .drop-icon { font-size: 64px; opacity: 0.15; }
  .drop-text { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: rgba(255,255,255,0.3); letter-spacing: 2px; }
  .drop-sub { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: rgba(255,255,255,0.12); }

  .overlay-time { position: absolute; bottom: 12px; left: 12px; background: rgba(0,0,0,0.8); border-radius: 8px; padding: 6px 14px; display: flex; align-items: center; gap: 10px; }
  .overlay-dot { width: 6px; height: 6px; border-radius: 50%; }
  .overlay-clock { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: white; }
  .overlay-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: rgba(255,255,255,0.3); }

  .footer { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 8px 16px; border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
  .footer-info { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: rgba(255,255,255,0.2); }

  .file-input { display: none; }
  .load-btn { padding: 4px 12px; background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.3); border-radius: 4px; color: #a855f7; font-family: 'JetBrains Mono', monospace; font-size: 10px; cursor: pointer; letter-spacing: 1px; }
  .load-btn:hover { background: rgba(168,85,247,0.2); }
</style>
</head>
<body>

<div class="header">
  <span class="header-brand">KNOVERSE AI</span>
  <span class="header-title">Video Sync Player</span>
  <div class="header-status">
    <div class="dot dot-waiting" id="statusDot"></div>
    <span class="status-text" id="statusText" style="color: #ffaa00;">WAITING FOR DASHBOARD</span>
    <label class="load-btn">
      🎬 LOAD VIDEO
      <input type="file" accept="video/*" class="file-input" id="fileInput"/>
    </label>
  </div>
</div>

<div class="video-area" id="videoArea">
  <!-- Drop zone shown when no video -->
  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">🎬</div>
    <div class="drop-text">DROP VIDEO FILE HERE</div>
    <div class="drop-sub">or use the LOAD VIDEO button above</div>
    <div class="drop-sub" style="margin-top: 8px; color: rgba(255,255,255,0.25);">Dashboard controls playback • This window just renders video</div>
  </div>

  <!-- Video element (hidden until loaded) -->
  <video id="video" style="display:none;" muted playsinline preload="auto"></video>

  <!-- Time overlay -->
  <div class="overlay-time" id="timeOverlay" style="display:none;">
    <div class="overlay-dot" id="playDot" style="background: #ff3d71;"></div>
    <span class="overlay-clock" id="timeClock">0:00.0</span>
    <span class="overlay-label">MATCH TIME</span>
  </div>
</div>

<div class="footer">
  <span class="footer-info">BROADCAST CHANNEL: pathogenika-video-sync</span>
  <span class="footer-info" id="videoInfo"></span>
</div>

<script>
// ═══ BroadcastChannel sync ═══
const channel = new BroadcastChannel("pathogenika-video-sync");
const video = document.getElementById("video");
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("fileInput");
const statusDot = document.getElementById("statusDot");
const statusText = document.getElementById("statusText");
const timeOverlay = document.getElementById("timeOverlay");
const timeClock = document.getElementById("timeClock");
const playDot = document.getElementById("playDot");
const videoInfo = document.getElementById("videoInfo");

let isPlaying = false;
let dashboardConnected = false;
let videoLoaded = false;
let currentSpeed = 1;

// ═══ Announce presence periodically ═══
function announceStatus() {
  channel.postMessage({
    type: "player-status",
    connected: true,
    videoLoaded: videoLoaded,
    duration: video.duration || 0
  });
}
setInterval(announceStatus, 1000);
announceStatus();

// ═══ Listen for dashboard commands ═══
channel.onmessage = (e) => {
  const msg = e.data;
  if (!msg || !msg.type) return;

  if (msg.type === "dashboard-ping") {
    dashboardConnected = true;
    statusDot.className = "dot dot-connected";
    statusText.style.color = "#00ff88";
    statusText.textContent = "DASHBOARD CONNECTED";
    announceStatus();
    return;
  }

  if (msg.type === "play") {
    isPlaying = true;
    playDot.style.background = "#00ff88";
    playDot.style.boxShadow = "0 0 8px #00ff88";
    if (videoLoaded) {
      video.playbackRate = msg.speed || 1;
      currentSpeed = msg.speed || 1;
      video.play().catch(() => {});
    }
    return;
  }

  if (msg.type === "pause") {
    isPlaying = false;
    playDot.style.background = "#ff3d71";
    playDot.style.boxShadow = "none";
    if (videoLoaded) video.pause();
    return;
  }

  if (msg.type === "seek") {
    if (videoLoaded && msg.time != null) {
      const t = Math.max(0, Math.min(msg.time, video.duration || 9999));
      if (Math.abs(video.currentTime - t) > 0.3) {
        video.currentTime = t;
      }
    }
    return;
  }

  if (msg.type === "speed") {
    currentSpeed = msg.speed || 1;
    if (videoLoaded) video.playbackRate = currentSpeed;
    return;
  }
};

// ═══ Send time updates back to dashboard ═══
video.addEventListener("timeupdate", () => {
  const t = video.currentTime;
  const m = Math.floor(t / 60);
  const s = Math.floor(t % 60);
  const ms = Math.floor((t % 1) * 10);
  timeClock.textContent = m + ":" + String(s).padStart(2, "0") + "." + ms;

  channel.postMessage({
    type: "video-timeupdate",
    currentTime: t
  });
});

// ═══ File loading ═══
function loadVideo(file) {
  if (!file || !file.type.startsWith("video/")) return;

  // Release previous blob
  if (video.src && video.src.startsWith("blob:")) {
    URL.revokeObjectURL(video.src);
  }

  const url = URL.createObjectURL(file);
  video.src = url;
  video.style.display = "block";
  dropZone.style.display = "none";
  timeOverlay.style.display = "flex";

  video.onloadedmetadata = () => {
    videoLoaded = true;
    videoInfo.textContent = file.name + " • " + Math.round(video.duration) + "s • " + video.videoWidth + "x" + video.videoHeight;
    announceStatus();
    // If dashboard was already playing, start
    if (isPlaying) {
      video.playbackRate = currentSpeed;
      video.play().catch(() => {});
    }
  };

  video.onerror = () => {
    videoInfo.textContent = "ERROR loading " + file.name;
  };
}

fileInput.addEventListener("change", (e) => {
  loadVideo(e.target.files[0]);
});

// Drag and drop
dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("active"); });
dropZone.addEventListener("dragleave", () => { dropZone.classList.remove("active"); });
dropZone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropZone.classList.remove("active");
  const file = Array.from(e.dataTransfer.files).find(f => f.type.startsWith("video/"));
  if (file) loadVideo(file);
});
// Click drop zone to open file picker
dropZone.addEventListener("click", () => fileInput.click());

// Also allow drop on the video itself (to swap videos)
document.getElementById("videoArea").addEventListener("dragover", (e) => e.preventDefault());
document.getElementById("videoArea").addEventListener("drop", (e) => {
  e.preventDefault();
  const file = Array.from(e.dataTransfer.files).find(f => f.type.startsWith("video/"));
  if (file) loadVideo(file);
});

// ═══ Cleanup on close ═══
window.addEventListener("beforeunload", () => {
  channel.postMessage({ type: "player-disconnected" });
  if (video.src && video.src.startsWith("blob:")) URL.revokeObjectURL(video.src);
});
</script>
</body>
</html>
