            finalPathway.add(k);
            finalStrength[k] = Math.max(finalStrength[k] || 0, strength);
            finalPathway.add(edge[0]); // skill node
            finalStrength[edge[0]] = Math.max(finalStrength[edge[0]] || 0, strength);
            finalPathway.add(edge[1]); // layer node
            finalStrength[edge[1]] = Math.max(finalStrength[edge[1]] || 0, strength);
          }
          // Trace EVERY event→skill edge that fired (MUST run before DF trace so events are in finalPathway)
          for (const edge of EVENT_SKILL_EDGES) {
            const k = `${edge[0]}:${edge[1]}`;
            const c = edgeFireCounts[k] || 0;
            if (c < 1) continue;
            const strength = Math.max(0.15, c / maxELFire);
            finalPathway.add(k);
            finalStrength[k] = Math.max(finalStrength[k] || 0, strength);
            finalPathway.add(edge[0]); // event node — was missing!
            finalStrength[edge[0]] = Math.max(finalStrength[edge[0]] || 0, strength);
            finalPathway.add(edge[1]); // skill node
            finalStrength[edge[1]] = Math.max(finalStrength[edge[1]] || 0, strength);
          }
          // Trace backwards: derived features → events
          // If event is already in finalPathway (from event→skill trace), light ALL its feeding DFs + channels
          // Extraction brightness matches DATA layer — no attenuation
          for (const df of DERIVED_FEATURES) {
            for (const evId of df.feeds) {
              const evInFinal = finalPathway.has(evId);
              const k = `${df.id}:${evId}`;
              const c = edgeFireCounts[k] || 0;
              if (!evInFinal && c < 1) continue;
              const strength = evInFinal
                ? Math.max(0.2, finalStrength[evId] || 0.2)
                : Math.max(0.15, c / maxELFire);
              finalPathway.add(k);
              finalStrength[k] = Math.max(finalStrength[k] || 0, strength);
              finalPathway.add(df.id);
              finalStrength[df.id] = Math.max(finalStrength[df.id] || 0, strength);
              finalPathway.add(evId);
              finalStrength[evId] = Math.max(finalStrength[evId] || 0, strength);
              // Trace channels → derived features — same brightness as event
              for (const src of df.sources) {
                const ck = `${src}:${df.id}`;
                const cc = edgeFireCounts[ck] || 0;
                const srcStrength = cc > 0 ? Math.max(strength, cc / maxELFire) : strength;
                finalPathway.add(ck);
                finalStrength[ck] = Math.max(finalStrength[ck] || 0, srcStrength);
                finalPathway.add(src);
                finalStrength[src] = Math.max(finalStrength[src] || 0, srcStrength);
              }
            }
          }
          // Trace skill→layer edges
          for (const edge of SUBSKILL_LAYER_EDGES) {
            const k = `${edge[0]}:${edge[1]}`;
            const c = edgeFireCounts[k] || 0;
            if (c < 1) continue;
            const strength = Math.max(0.15, c / maxELFire);
            finalPathway.add(k);
            finalStrength[k] = Math.max(finalStrength[k] || 0, strength);
            finalPathway.add(edge[0]); // skill node
            finalStrength[edge[0]] = Math.max(finalStrength[edge[0]] || 0, strength);
          }
          // Trace forwards: layer → profile → career (ALL that fired)
          // Progressive layer weighting: L4 > L3 > L2 > L1 career contribution
          for (const edge of LAYER_PROFILE_EDGES) {
            const k = `${edge[0]}:${edge[1]}`;
            const c = edgeFireCounts[k] || 0;
            if (c < 1) continue;
            const layerMult = LAYER_CAREER_WEIGHT[edge[0]] || 1;
            const strength = Math.max(0.15, Math.min(1.0, (c / maxELFire) * layerMult));
            finalPathway.add(k);
            finalStrength[k] = Math.max(finalStrength[k] || 0, strength);
            finalPathway.add(edge[1]);
            finalStrength[edge[1]] = Math.max(finalStrength[edge[1]] || 0, strength);
          }
          for (const edge of PROFILE_CAREER_EDGES) {
            const k = `${edge[0]}:${edge[1]}`;
            const c = edgeFireCounts[k] || 0;
            if (c < 1) continue;
            const strength = Math.max(0.15, c / maxELFire);
            finalPathway.add(k);
            finalStrength[k] = Math.max(finalStrength[k] || 0, strength);
            finalPathway.add(edge[1]);
            finalStrength[edge[1]] = Math.max(finalStrength[edge[1]] || 0, strength);
          }
          // Rank profiles and careers — top 3 get boosted, rest dimmed
          const profileRanks = TREE_PROFILES.map(p => ({
            id: p.id, score: finalStrength[p.id] || 0
          })).sort((a, b) => b.score - a.score);
          const top3Profiles = new Set(profileRanks.slice(0, 3).filter(p => p.score > 0).map(p => p.id));
          const careerRanks = TREE_CAREERS.map(c => ({
            id: c.id, score: finalStrength[c.id] || 0
          })).sort((a, b) => b.score - a.score);
          const top3Careers = new Set(careerRanks.slice(0, 3).filter(c => c.score > 0).map(c => c.id));
          // Boost top 3, dim rest — top 3 should be clearly dominant
          for (const p of TREE_PROFILES) {
            if (top3Profiles.has(p.id)) {
              finalStrength[p.id] = Math.max(finalStrength[p.id] || 0, 0.85);
            } else if (finalStrength[p.id]) {
              finalStrength[p.id] = Math.min(finalStrength[p.id], 0.1);
            }
          }
          for (const c of TREE_CAREERS) {
            if (top3Careers.has(c.id)) {
              finalStrength[c.id] = Math.max(finalStrength[c.id] || 0, 0.85);
            } else if (finalStrength[c.id]) {
              finalStrength[c.id] = Math.min(finalStrength[c.id], 0.1);
            }
          }
          // Boost/dim edges to profiles and careers based on ranking
          for (const edge of LAYER_PROFILE_EDGES) {
            const k = `${edge[0]}:${edge[1]}`;
            if (!finalStrength[k]) continue;
            if (top3Profiles.has(edge[1])) {
              finalStrength[k] = Math.max(finalStrength[k], 0.7);
            } else {
              finalStrength[k] = Math.min(finalStrength[k], 0.08);
            }
          }
          for (const edge of PROFILE_CAREER_EDGES) {
            const k = `${edge[0]}:${edge[1]}`;
            if (!finalStrength[k]) continue;
            if (top3Careers.has(edge[1])) {
              // Any path feeding a top career gets boosted
              const boost = top3Profiles.has(edge[0]) ? 0.7 : 0.45;
              finalStrength[k] = Math.max(finalStrength[k], boost);
            } else {
              finalStrength[k] = Math.min(finalStrength[k], 0.08);
            }
          }
          // ─── WIN STATE: at 70% brightness in final pathway (40% brighter) ─────────────
          finalPathway.add("sk_win");
          finalStrength["sk_win"] = Math.max(finalStrength["sk_win"] || 0, 0.7);
          for (const ss of TREE_SUB_SKILLS) {
            if (ss.parent === "sk_win") {
              finalPathway.add(ss.id);
              finalStrength[ss.id] = Math.max(finalStrength[ss.id] || 0, 0.7);
            }
          }
          // Also boost event→win and win subskill→layer edges
          for (const edge of EVENT_SKILL_EDGES) {
            if (edge[1] === "sk_win") {
              const k = `${edge[0]}:${edge[1]}`;
              if (edgeFireCounts[k] > 0) {
                finalPathway.add(k);
                finalStrength[k] = Math.max(finalStrength[k] || 0, 0.55);
              }
            }
          }
          for (const edge of SUBSKILL_LAYER_EDGES) {
            if (edge[0].startsWith("ss_w_")) {
              const k = `${edge[0]}:${edge[1]}`;
              if (edgeFireCounts[k] > 0) {
                finalPathway.add(k);
                finalStrength[k] = Math.max(finalStrength[k] || 0, 0.5);
              }
            }
          }
        }
        const isFinalEdge = (fromId, toId) => finalPathway.has(`${fromId}:${toId}`);
        const isFinalNode = (id) => finalPathway.has(id);
        const getFinalStrength = (key) => finalStrength[key] || 0;

        // Sub-skill channel dimensions (matching data channel size)
        const ssW = 48, ssH = 14, ssGap = 1, ssXGap = 3;

        const renderEdges = (edges, fromNodes, toNodes, fromType, toType) => {
          // Column ramp gate for destination — edges fade in with their target column
          const toRamp = toType === "skill" ? COL_RAMP.bioOther
            : toType === "layer" ? COL_RAMP.layers
            : toType === "profile" ? COL_RAMP.profiles
            : toType === "career" ? COL_RAMP.careers : 1;
          if (toRamp <= 0) return null;
          return edges.map((edge, i) => {
            const fromId = edge[0], toId = edge[1], edgeWeight = edge[2] || 1.0;
            const isSecondary = edgeWeight < 0.6;
            const fromNode = fromNodes.find(n => n.id === fromId);
            const toNode = toNodes.find(n => n.id === toId);
            if (!fromNode || !toNode) return null;

            // Propagation-based intensity: edge lights when wavefront traverses it
            const propEdge = getEdgePropIntensity(fromId, toId, PROP_DELAY) * edgeWeight;

            // ═══ MYELINATION CYCLE ═════════════════════════════════
            // Fire count drives a repeating cycle:
            //   low brightness → medium → bright → GLOW → reset to floor, repeat
            // Each completed cycle raises the permanent floor slightly
            const fireKey = `${fromId}:${toId}`;
            const rawFireCount = edgeFireCounts[fireKey] || 0;
            
            if (rawFireCount < 0.01) {
              const propCheck = getEdgePropIntensity(fromId, toId, PROP_DELAY) * edgeWeight;
              if (propCheck < 0.01 && !isFinalEdge(fromId, toId)) return null;
            }
            
            // End-state floor: any event→skill edge that fired stays visible
            const isSkillEdge = fromType === "event" && toType === "skill";
            const endFloor = isSkillEdge && rawFireCount > 0 ? Math.min(0.25, 0.05 + rawFireCount * 0.008) : 0;
            
            const CYCLE_LENGTH = Math.max(1, maxFireCount * 0.3);
            const completedCycles = Math.floor(rawFireCount / CYCLE_LENGTH);
            const cycleProgress = (rawFireCount % CYCLE_LENGTH) / CYCLE_LENGTH;
            const myelinFloor = Math.min(0.3, completedCycles * 0.06);
            const cycleBrightness = myelinFloor + cycleProgress * (0.7 - myelinFloor);
            const isGlowing = cycleProgress > 0.75;
            const glowStrength = isGlowing ? (cycleProgress - 0.75) / 0.25 : 0;
            // Final pathway edges stay visible with proportional brightness
            const finalFloor = isFinalEdge(fromId, toId) ? getFinalStrength(`${fromId}:${toId}`) * 0.5 : 0;
            const myelinWidth = isSecondary 
              ? 0.3 + Math.max(cycleBrightness, finalFloor, endFloor) * 1.8
              : 0.4 + Math.max(cycleBrightness, finalFloor, endFloor) * 3.5;

            // Background stimulation: subtle micro-pulse (much dimmer than propagation)
            const phase = i * 2.17 + fromId.length * 0.3;

            // ─── LAYER-SPEED SHIMMER ────────────────────────────
            const layerShimmerSpeed = toId === "L1" ? 50 : toId === "L2" ? 300 : toId === "L3" ? 700 : toId === "L4" ? 1500 : 0;
            const isLayerTarget = ["L1", "L2", "L3", "L4"].includes(toId);
            const layerShimmer = isLayerTarget && playing && COL_RAMP.layers > 0
              ? Math.sin(nowMs / layerShimmerSpeed + phase) * (toId === "L1" ? 0.08 : 0.03)
              : 0;

            const displayIntensity = Math.min(Math.max(cycleBrightness + layerShimmer, propEdge, finalFloor, endFloor), toRamp);
            
            // Layer-specific edge colors — blended with event source color
            const EVENT_SOURCE_COLOR = {
              ev_kill: "#44aaff",       // mouse (LMB)
              ev_death: "#ff4444",      // combat result
              ev_zoomIn: "#44aaff",     // mouse (scroll)
              ev_nearSwitch: "#00ddff", // world state
              ev_wasd: "#ffcc00",       // keyboard
              ev_mouseFollow: "#44aaff",// mouse
              ev_midSwitch: "#44aaff",  // mouse
              ev_waypoint: "#ffcc00",   // keyboard/strategic
              ev_zoomOut: "#44aaff",    // mouse (scroll)
              ev_replicate: "#ffcc00",  // keyboard R
              ev_capture: "#00ddff",    // world/spatial
              ev_dock: "#ffcc00",       // keyboard SPC
              ev_emit: "#ffcc00",       // keyboard E
              ev_farSwitch: "#00ddff",  // world
              ev_worldDeath: "#00ddff", // world state
            };
            const layerTargetColor = toId === "L1" ? "#ff4444" : toId === "L2" ? "#ff8800" : toId === "L3" ? "#00d4ff" : toId === "L4" ? "#a855f7" : null;
            const skillColor = TREE_SKILLS.find(s => s.id === fromId)?.color || TREE_SKILLS.find(s => s.id === toId)?.color || null;
            const srcColor = EVENT_SOURCE_COLOR[fromId] || skillColor;
            // Blend: for skill→layer edges, mix source (40%) + layer (60%) for input diversity
            const blendHex = (a, b, t) => {
              const pa = [parseInt(a.slice(1,3),16), parseInt(a.slice(3,5),16), parseInt(a.slice(5,7),16)];
              const pb = [parseInt(b.slice(1,3),16), parseInt(b.slice(3,5),16), parseInt(b.slice(5,7),16)];
              const r = Math.round(pa[0]*(1-t) + pb[0]*t);
              const g = Math.round(pa[1]*(1-t) + pb[1]*t);
              const bl = Math.round(pa[2]*(1-t) + pb[2]*t);
              return `rgb(${r},${g},${bl})`;
            };
            const edgeColor = movementEdgeKeys.has(fireKey) ? "#4488ff" // blue for movement events
              : (layerTargetColor && srcColor)
              ? blendHex(srcColor, layerTargetColor, 0.6)
              : (fromType === "event" && toType === "skill" && srcColor && skillColor)
              ? blendHex(srcColor, skillColor, 0.4) // event→skill: blend event color (60%) + skill color (40%)
              : layerTargetColor
              || srcColor  // use event source color before falling to skill color
              || (skillColor ? skillColor : null)
              || (fromType === "layer" ? (TREE_LAYERS.find(l => l.id === fromId)?.color || "#00e5ff") : "#a855f7");
            
            const fp = getPos(fromNode.col + 2, fromNode.row);
            const tp = getPos(toNode.col + 2, toNode.row);
            const x1 = fp.x + nodeW[fromNode.col + 2];
            const y1 = fp.y + nodeH / 2;
            const x2 = tp.x;
            const y2 = tp.y + nodeH / 2;
            const cx1 = x1 + (x2 - x1) * 0.4;
            const cx2 = x1 + (x2 - x1) * 0.6;
            const pathD = `M${x1},${y1} C${cx1},${y1} ${cx2},${y2} ${x2},${y2}`;
            const isPropagating = propEdge > 0.15;
            const dashArr = isSecondary && cycleBrightness < 0.15 && !isPropagating && rawFireCount < 3 ? "3,2" : "none";

            return (
              <g key={`edge-${fromId}-${toId}-${edgeWeight}`}>
                {isGlowing && !isSecondary && (
                  <path d={pathD} fill="none" stroke={edgeColor} 
                    strokeWidth={myelinWidth + 5 * glowStrength}
                    opacity={0.06 + glowStrength * 0.15} filter="url(#glow)" />
                )}
                {!isSecondary && isPropagating && (
                  <path d={pathD} fill="none" stroke={edgeColor} strokeWidth={propEdge * 5} opacity={propEdge * 0.35} filter="url(#glow)">
                    {playing && propEdge > 0.5 && <animate attributeName="opacity" 
                      values={`${propEdge*0.35};${propEdge*0.1};${propEdge*0.35}`} 
                      dur={toId === "L1" ? "0.15s" : toId === "L2" ? "0.4s" : toId === "L3" ? "0.8s" : "1.2s"} 
                      repeatCount="indefinite" />}
                  </path>
                )}
                <path d={pathD} fill="none"
                  stroke={isPropagating ? edgeColor : rawFireCount > 0 ? edgeColor : "rgba(255,255,255,0.08)"}
                  strokeWidth={myelinWidth}
                  opacity={rawFireCount > 0 ? Math.max(0.08, displayIntensity) : 0.05}
                  strokeDasharray={dashArr} />
              </g>
            );
          });
        };

        // ═══ v33: Derived features merged into game events ═══
        // derivedActivation still computed for pre-glow indicators on event nodes

        // ═══ DERIVED FEATURES — pre-event signal layer ═══
        // Computes feature activation from channel data + renders pre-fire connections to game events
        const derivedActivation = {};
        const derivedPreFire = {}; // which game events are being pre-fired by derived features
        if (playing && COL_RAMP.extraction > 0) {
          for (const df of DERIVED_FEATURES) {
            // Feature activates when ANY of its source channels recently fired
            const sourceActivity = df.sources.map(s => {
              const age = time - (inputNodeFire[s] || -999);
              return age < 2.0 ? Math.exp(-age * 0.8) : 0;
            });
            const maxSource = Math.max(...sourceActivity, 0);
            // Also pulse with firehose when source channels are sampling
            const firehoseBoost = df.sources.some(s => firehoseSet.has(s)) ? 0.15 : 0;
            derivedActivation[df.id] = Math.min(1, maxSource + firehoseBoost);
            // Pre-fire: when derived feature is active, stimulate its target game events
            if (derivedActivation[df.id] > 0.1) {
              for (const evId of df.feeds) {
                derivedPreFire[evId] = Math.max(derivedPreFire[evId] || 0, derivedActivation[df.id] * 0.65);
              }
            }
          }
        }

        // Derived feature node positions — evenly spaced vertically
        // v33: Derived features merged — no separate column needed
        // derivedActivation still computed, used as pre-glow on event nodes

        // ═══ CHANNEL → EVENT EDGES — stochastic popcorn firing ═══
        const renderChannelToEventEdges = () => {
          if (COL_RAMP.events <= 0) return null;
          const edges = [];
          let edgeIdx = 0;
          INPUT_NODES.forEach((inp, inpIdx) => {
            const evIds = CHANNEL_TO_EVENTS[inp.fireKey];
            if (!evIds) return;
            const boxY = getRawBoxY(inp.boxIdx);
            const nodesForBox = INPUT_NODES.filter(n => n.boxIdx === inp.boxIdx);
            const nodeIdx = nodesForBox.indexOf(inp);
            const startY = boxY + 4;
            const srcY = startY + nodeIdx * (inputNodeH + 1) + inputNodeH / 2;
            const srcAge = time - (inputNodeFire[inp.fireKey] || -999);
            const srcAct = srcAge < 8.0 ? Math.exp(-srcAge * 0.8) : 0;
            const channelLive = firehoseSet.has(inp.fireKey) || srcAct > 0.05;
            
            for (const evId of evIds) {
              const eventNode = TREE_EVENTS.find(n => n.id === evId);
              if (!eventNode) continue;
              edgeIdx++;
              const trailKey = `${inp.fireKey}:${evId}`;
              const trailFireCount = edgeFireCounts[trailKey] || 0;
              const myelinFloor = trailFireCount > 0 ? Math.min(0.35, 0.02 + trailFireCount * 0.004) : 0;
              const isFinalTrail = isFinalNode(evId) || isFinalNode(inp.fireKey);
              const finalTrailFloor = isFinalTrail && COL_RAMP.events > 0.8 ? Math.max(0.15, Math.max(getFinalStrength(inp.fireKey), getFinalStrength(evId)) * 0.4) : 0;
              // Stochastic fire
              const period = EDGE_PRIMES[(edgeIdx + 5) % EDGE_PRIMES.length];
              const cycle = Math.floor(nowMs / period);
              const phase = (inp.fireKey.length * 13 + evId.length * 23 + edgeIdx * 11) % 9;
              const isFiring = channelLive && playing && ((cycle + phase) % 7 < 3);
              const flash = isFiring ? Math.min(0.7, 0.3 + srcAct * 0.5) : 0;
              const displayCharge = Math.max(flash, myelinFloor, finalTrailFloor);
              if (displayCharge < 0.005) continue;
              
              const tp = getPos(eventNode.col + 2, eventNode.row);
              const x1 = channelRightEdge, y1 = srcY;
              const x2 = tp.x, y2 = tp.y + nodeH / 2;
              const gap = x2 - x1, cp = Math.max(8, gap * 0.35);
              const d = `M${x1},${y1} C${x1+cp},${y1} ${x2-cp},${y2} ${x2},${y2}`;
              const color = isFinalTrail ? inp.color : isFiring ? inp.color : myelinFloor > 0.05 ? "rgba(120,180,255,0.25)" : "rgba(255,255,255,0.04)";
              if (isFiring && flash > 0.3) {
                edges.push(
                  <path key={`ch-ev-glow-${inp.fireKey}-${evId}`} d={d}
                    fill="none" stroke={inp.color} strokeWidth={flash * 3} opacity={Math.min(flash * 0.25, COL_RAMP.events)} filter="url(#glow)" />
                );
              }
              edges.push(
                <path key={`ch-ev-${inp.fireKey}-${evId}`} d={d}
                  fill="none" stroke={color}
                  strokeWidth={0.4 + displayCharge * 1.5}
                  opacity={Math.min(0.02 + displayCharge * 0.5, COL_RAMP.events)} />
              );
            }
          });
          return edges;
        };

        // v30: renderBoxToNodeEdges REMOVED — signal flows through derived features only

        // ═══ CHANNEL → DERIVED FEATURE EDGES ═══
        // Stochastic firing: each edge pops independently like popcorn.
        // Repeated fires build permanent floor. Inactive edges cool down.
        const EDGE_PRIMES = [37,41,43,47,53,59,61,67,71,73,79,83,89,97,101,103,107,109,113];
        const renderChannelToDerivedEdges = () => {
          if (COL_RAMP.extraction <= 0) return null;
          const edges = [];
          let edgeIdx = 0;
          INPUT_NODES.forEach((inp) => {
            const dfIds = CHANNEL_TO_DF[inp.fireKey];
            if (!dfIds) return;
            const boxY = getRawBoxY(inp.boxIdx);
            const nodesForBox = INPUT_NODES.filter(n => n.boxIdx === inp.boxIdx);
            const nodeIdx = nodesForBox.indexOf(inp);
            const startY = boxY + 4;
            const srcY = startY + nodeIdx * (inputNodeH + 1) + inputNodeH / 2;
            const srcAge = time - (inputNodeFire[inp.fireKey] || -999);
            const srcAct = srcAge < 8.0 ? Math.exp(-srcAge * 0.8) : 0;
            const channelLive = firehoseSet.has(inp.fireKey) || srcAct > 0.05;
            for (const dfId of dfIds) {
              const df = DERIVED_FEATURES.find(d => d.id === dfId);
              if (!df) continue;
              edgeIdx++;
              const dfPos = getDfPos(df.row);
              const trailKey = `${inp.fireKey}:${dfId}`;
              const trailCount = edgeFireCounts[trailKey] || 0;
              // Accumulated floor: builds with repeated fires, represents myelination
              const myelinFloor = trailCount > 0 ? Math.min(0.35, 0.02 + trailCount * 0.004) : 0;
              const isFinalTrail = isFinalEdge(inp.fireKey, dfId);
              const finalTrailFloor = isFinalTrail && COL_RAMP.extraction > 0.8 ? Math.max(0.15, getFinalStrength(`${inp.fireKey}:${dfId}`) * 0.4) : 0;
              // Stochastic fire: each edge has its own prime-period cycle
              const period = EDGE_PRIMES[edgeIdx % EDGE_PRIMES.length];
              const cycle = Math.floor(nowMs / period);
              const phase = (inp.fireKey.length * 17 + dfId.length * 31 + edgeIdx * 7) % 11;
              const isFiring = channelLive && playing && ((cycle + phase) % 7 < 3); // ~43% duty
              // Flash bright on fire, cool to myelin floor when off
              const flash = isFiring ? Math.min(0.7, 0.3 + srcAct * 0.5) : 0;
              const displayCharge = Math.max(flash, myelinFloor, finalTrailFloor);
              if (displayCharge < 0.005) continue;
              const x1 = channelRightEdge, y1 = srcY;
              const x2 = dfPos.x, y2 = dfPos.y + dfNodeH / 2;
              const gap = x2 - x1, cp = Math.max(6, gap * 0.35);
              const d = `M${x1},${y1} C${x1+cp},${y1} ${x2-cp},${y2} ${x2},${y2}`;
              const color = isFinalTrail ? inp.color : isFiring ? inp.color : myelinFloor > 0.05 ? df.color + "44" : "rgba(255,255,255,0.04)";
              if (isFiring && flash > 0.3) edges.push(<path key={`ch-df-g-${inp.fireKey}-${dfId}`} d={d} fill="none" stroke={df.color} strokeWidth={flash * 2} opacity={Math.min(flash * 0.2, COL_RAMP.extraction)} filter="url(#glow)" />);
              edges.push(<path key={`ch-df-${inp.fireKey}-${dfId}`} d={d} fill="none" stroke={color} strokeWidth={0.3 + displayCharge * 1.5} opacity={Math.min(0.02 + displayCharge * 0.5, COL_RAMP.extraction)} />);
            }
          });
          return edges;
        };

        // ═══ DERIVED FEATURE → GAME EVENT EDGES — stochastic popcorn ═══
        const renderDerivedToEventEdges = () => {
          if (COL_RAMP.events <= 0) return null;
          const edges = [];
          let edgeIdx = 0;
          for (const df of DERIVED_FEATURES) {
            const dfPos = getDfPos(df.row);
            // Source activity from channels feeding this derived feature
            let dfAct = 0;
            for (const src of df.sources) {
              const srcAge = time - (inputNodeFire[src] || -999);
              if (srcAge < 2.0) dfAct = Math.max(dfAct, Math.exp(-srcAge * 0.8));
              if (firehoseSet.has(src)) dfAct = Math.max(dfAct, 0.3);
            }
            const dfLive = dfAct > 0.05;
            for (const evId of df.feeds) {
              const eventNode = TREE_EVENTS.find(n => n.id === evId);
              if (!eventNode) continue;
              edgeIdx++;
              const trailKey = `${df.id}:${evId}`;
              const trailCount = edgeFireCounts[trailKey] || 0;
              const myelinFloor = trailCount > 0 ? Math.min(0.35, 0.02 + trailCount * 0.004) : 0;
              const isFinalTrail = isFinalEdge(df.id, evId);
              const finalTrailFloor = isFinalTrail && COL_RAMP.events > 0.8 ? Math.max(0.15, getFinalStrength(`${df.id}:${evId}`) * 0.4) : 0;
              // Stochastic fire
              const period = EDGE_PRIMES[(edgeIdx + 9) % EDGE_PRIMES.length];
              const cycle = Math.floor(nowMs / period);
              const phase = (df.id.length * 19 + evId.length * 29 + edgeIdx * 13) % 11;
              const isFiring = dfLive && playing && ((cycle + phase) % 7 < 3);
              const flash = isFiring ? Math.min(0.6, 0.2 + dfAct * 0.5) : 0;
              const displayCharge = Math.max(flash, myelinFloor, finalTrailFloor);
              if (displayCharge < 0.005) continue;
              const x1 = dfRightEdge, y1 = dfPos.y + dfNodeH / 2;
              const tp = getPos(eventNode.col + 2, eventNode.row);
              const x2 = tp.x, y2 = tp.y + nodeH / 2;
              const gap = x2 - x1, cp = Math.max(6, gap * 0.35);
              const d = `M${x1},${y1} C${x1+cp},${y1} ${x2-cp},${y2} ${x2},${y2}`;
              const color = isFinalTrail ? df.color : isFiring ? df.color : myelinFloor > 0.05 ? df.color + "44" : "rgba(255,255,255,0.04)";
              if (isFiring && flash > 0.3) edges.push(<path key={`df-ev-g-${df.id}-${evId}`} d={d} fill="none" stroke={df.color} strokeWidth={flash * 2} opacity={Math.min(flash * 0.15, COL_RAMP.events)} filter="url(#glow)" />);
              edges.push(<path key={`df-ev-${df.id}-${evId}`} d={d} fill="none" stroke={color} strokeWidth={0.3 + displayCharge * 1.5} opacity={Math.min(0.02 + displayCharge * 0.5, COL_RAMP.events)} />);
            }
          }
          return edges;
        };

        // ═══ DERIVED FEATURE NODE RENDERING ═══
        const renderDerivedFeatureNodes = () => {
          let dfNodeIdx = 0;
          return DERIVED_FEATURES.map(df => {
            dfNodeIdx++;
            const pos = getDfPos(df.row);
            // Max incoming edge stochastic flash + myelin floor
            let maxFlash = 0;
            let maxMyelin = 0;
            for (const src of df.sources) {
              const srcAge = time - (inputNodeFire[src] || -999);
              const srcAct = srcAge < 8.0 ? Math.exp(-srcAge * 0.8) : 0;
              const channelLive = firehoseSet.has(src) || srcAct > 0.05;
              const ek = `${src}:${df.id}`;
              const eFire = edgeFireCounts[ek] || 0;
              const mFloor = eFire > 0 ? Math.min(0.35, 0.02 + eFire * 0.004) : 0;
              maxMyelin = Math.max(maxMyelin, mFloor);
              // Stochastic fire — same prime logic as edges
              const period = EDGE_PRIMES[dfNodeIdx % EDGE_PRIMES.length];
              const cycle = Math.floor(nowMs / period);
              const phase = (src.length * 17 + df.id.length * 31 + dfNodeIdx * 7) % 11;
              const isFiring = channelLive && playing && ((cycle + phase) % 7 < 3);
              if (isFiring) maxFlash = Math.max(maxFlash, Math.min(0.7, 0.3 + srcAct * 0.5));
            }
            let activity = Math.max(maxFlash, maxMyelin);
            activity = Math.min(activity, COL_RAMP.extraction); // ramp ceiling
            const isFinal = isFinalNode(df.id);
            if (isFinal && COL_RAMP.extraction > 0.8) activity = Math.max(activity, getFinalStrength(df.id) || 0.5);
            const active = activity > 0.1;
            const fresh = activity > 0.3;
            const bgOp = fresh ? Math.round(activity * 40).toString(16).padStart(2,'0') : active ? "08" : "05";
            const borderOp = fresh ? Math.round(activity * 180).toString(16).padStart(2,'0') : active ? "30" : "18";
            return (
              <g key={`df-node-${df.id}`}>
                {fresh && <rect x={pos.x - 2} y={pos.y - 2} width={dfNodeW + 4} height={dfNodeH + 4} rx={5} fill={df.color} opacity={activity * 0.12} filter="url(#glow)" />}
                <rect x={pos.x} y={pos.y} width={dfNodeW} height={dfNodeH} rx={4} fill={df.color + bgOp} stroke={df.color + borderOp} strokeWidth={fresh ? 0.8 : 0.4} />
                <text x={pos.x + dfNodeW / 2} y={pos.y + dfNodeH / 2 + 3} textAnchor="middle" fill={active ? df.color : df.color + "55"} fontSize={6.5} fontFamily={mono} fontWeight={fresh ? 600 : 400}>{df.label}</text>
              </g>
            );
          });
        };

        // ═══ SUB-SKILL MASTERY + RENDERING ═══
        const subSkillCounts = {};
        for (const ss of TREE_SUB_SKILLS) {
          let total = 0;
          for (const edge of EVENT_SUBSKILL_EDGES) {
            if (edge[1] === ss.id) {
              const k = `${edge[0]}:${edge[1]}`;
              total += edgeFireCounts[k] || 0;
            }
          }
          subSkillCounts[ss.id] = total;
        }
        const getSubSkillMastery = (ssId) => {
          const count = subSkillCounts[ssId] || 0;
          if (count < 0.5) return 0;
          if (count < 3) return 0.1 + (count / 3) * 0.15;
          return Math.min(1.0, 0.4 + (count - 3) / 7 * 0.6);
        };
        const getParentMastery = (skillId) => {
          const children = TREE_SUB_SKILLS.filter(ss => ss.parent === skillId);
          if (!children.length) return 0;
          return Math.max(...children.map(c => getSubSkillMastery(c.id)));
        };
        const renderSubSkills = () => TREE_SUB_SKILLS.map(sub => {
          const parent = TREE_SKILLS.find(s => s.id === sub.parent);
          if (!parent) return null;
          const skRamp = parent.id === "sk_virus" ? COL_RAMP.bioVirus : COL_RAMP.bioOther;
          if (skRamp <= 0) return null;
          const pp = getPos(parent.col + 2, parent.row);
          const pw = nodeW[parent.col + 2];
          // Right-justified below parent cell
          const sx = pp.x + pw - ssW;
          const ssDropGap = 4; // gap between parent bottom and first sub-skill
          const sy = pp.y + nodeH + ssDropGap + sub.offset * (ssH + ssGap);
          const mastery = getSubSkillMastery(sub.id);
          const propFlash = getPropIntensity(sub.id);
          const brightness = Math.min(Math.max(mastery, propFlash), skRamp);
          const active = brightness > 0.05;
          const fresh = propFlash > 0.3;
          const hexBr = (v) => Math.round(v).toString(16).padStart(2, "0");
          return (
            <g key={sub.id}>
              <rect x={sx} y={sy} width={ssW} height={ssH} rx={2}
                fill={fresh ? sub.color + hexBr(brightness * 48) : active ? sub.color + "12" : "rgba(255,255,255,0.01)"}
                stroke={fresh ? sub.color + hexBr(brightness * 170) : active ? sub.color + "44" : "rgba(255,255,255,0.05)"}
                strokeWidth={fresh ? 1 : 0.4} />
              <text x={sx + ssW / 2} y={sy + ssH / 2 + 3}
                textAnchor="middle" fill={active ? sub.color : "rgba(255,255,255,0.15)"}
                fontSize={7} fontFamily={mono} fontWeight={fresh ? 700 : mastery >= 0.4 ? 600 : 400}>
                {sub.label}
              </text>
              {active && (
                <line x1={sx + ssW} y1={sy}
                  x2={pp.x + pw - 2} y2={pp.y + nodeH}
                  stroke={sub.color} strokeWidth={fresh ? 1 : 0.5}
                  opacity={fresh ? brightness * 0.5 : 0.15} />
              )}
              {fresh && playing && (
                <rect x={sx - 1} y={sy - 1} width={ssW + 2} height={ssH + 2} rx={3}
                  fill="none" stroke={sub.color} strokeWidth={1.2} filter="url(#glow)">
                  <animate attributeName="opacity" values="0.6;0.1;0.6" dur="0.7s" repeatCount="indefinite" />
                </rect>
              )}
            </g>
          );
        });

        // ═══ SUB-SKILL → LAYER EDGE RENDERER ═══
        const ssDropGapConst = 4;
        const getSubSkillPos = (ssId) => {
          const sub = TREE_SUB_SKILLS.find(s => s.id === ssId);
          if (!sub) return null;
          const parent = TREE_SKILLS.find(s => s.id === sub.parent);
          if (!parent) return null;
          const pp = getPos(parent.col + 2, parent.row);
          const pw = nodeW[parent.col + 2];
          return {
            x: pp.x + pw - ssW,
            y: pp.y + nodeH + ssDropGapConst + sub.offset * (ssH + ssGap),
            color: sub.color
          };
        };

        const renderSubSkillToLayerEdges = () => {
          return SUBSKILL_LAYER_EDGES.map((edge, i) => {
            const fromId = edge[0], toId = edge[1], edgeWeight = edge[2] || 1.0;
            const isSecondary = edgeWeight < 0.6;
            const ssPos = getSubSkillPos(fromId);
            const toNode = TREE_LAYERS.find(n => n.id === toId);
            if (!ssPos || !toNode) return null;

            const propEdge = getEdgePropIntensity(fromId, toId, PROP_DELAY) * edgeWeight;
            const fireKey = `${fromId}:${toId}`;
            const rawFireCount = edgeFireCounts[fireKey] || 0;

            if (rawFireCount < 0.01) {
              const propCheck = getEdgePropIntensity(fromId, toId, PROP_DELAY) * edgeWeight;
              if (propCheck < 0.01 && !isFinalEdge(fromId, toId)) return null;
            }

            const endFloor = rawFireCount > 0 ? Math.min(0.25, 0.05 + rawFireCount * 0.008) : 0;
            const CYCLE_LENGTH = Math.max(1, maxFireCount * 0.3);
            const completedCycles = Math.floor(rawFireCount / CYCLE_LENGTH);
            const cycleProgress = (rawFireCount % CYCLE_LENGTH) / CYCLE_LENGTH;
            const myelinFloor = Math.min(0.3, completedCycles * 0.06);
            const cycleBrightness = myelinFloor + cycleProgress * (0.7 - myelinFloor);
            const isGlowing = cycleProgress > 0.75;
            const glowStrength = isGlowing ? (cycleProgress - 0.75) / 0.25 : 0;
            const finalFloor = isFinalEdge(fromId, toId) ? getFinalStrength(`${fromId}:${toId}`) * 0.5 : 0;
            const myelinWidth = isSecondary
              ? 0.3 + Math.max(cycleBrightness, finalFloor, endFloor) * 1.8
              : 0.4 + Math.max(cycleBrightness, finalFloor, endFloor) * 3.5;

            const phase = i * 2.17 + fromId.length * 0.3;
            const layerShimmerSpeed = toId === "L1" ? 50 : toId === "L2" ? 300 : toId === "L3" ? 700 : 1500;
            const layerShimmer = playing && COL_RAMP.layers > 0
              ? Math.sin(nowMs / layerShimmerSpeed + phase) * (toId === "L1" ? 0.08 : 0.03) : 0;
            const displayIntensity = Math.min(Math.max(cycleBrightness + layerShimmer, propEdge, finalFloor, endFloor), COL_RAMP.layers);

            const layerColor = TREE_LAYERS.find(l => l.id === toId)?.color || "#00e5ff";
            const edgeColor = ssPos.color
              ? `rgb(${Math.round(parseInt(ssPos.color.slice(1,3),16)*0.4 + parseInt(layerColor.slice(1,3),16)*0.6)},${Math.round(parseInt(ssPos.color.slice(3,5),16)*0.4 + parseInt(layerColor.slice(3,5),16)*0.6)},${Math.round(parseInt(ssPos.color.slice(5,7),16)*0.4 + parseInt(layerColor.slice(5,7),16)*0.6)})`
              : layerColor;

            // Edge: from sub-skill right edge to layer left edge
            const x1 = ssPos.x + ssW;
            const y1 = ssPos.y + ssH / 2;
            const tp = getPos(toNode.col + 2, toNode.row);
            const x2 = tp.x;
            const y2 = tp.y + nodeH / 2;
            const cx1 = x1 + (x2 - x1) * 0.4;
            const cx2 = x1 + (x2 - x1) * 0.6;
            const pathD = `M${x1},${y1} C${cx1},${y1} ${cx2},${y2} ${x2},${y2}`;
            const isPropagating = propEdge > 0.15;
            const dashArr = isSecondary && cycleBrightness < 0.15 && !isPropagating && rawFireCount < 3 ? "3,2" : "none";

            return (
              <g key={`ss-layer-${fromId}-${toId}`}>
                {isGlowing && !isSecondary && (
                  <path d={pathD} fill="none" stroke={edgeColor}
                    strokeWidth={myelinWidth + 5 * glowStrength}
                    opacity={0.06 + glowStrength * 0.15} filter="url(#glow)" />
                )}
                {!isSecondary && isPropagating && (
                  <path d={pathD} fill="none" stroke={edgeColor} strokeWidth={propEdge * 5} opacity={propEdge * 0.35} filter="url(#glow)" />
                )}
                <path d={pathD} fill="none" stroke={edgeColor}
                  strokeWidth={myelinWidth} opacity={0.05 + displayIntensity * 0.6}
                  strokeDasharray={dashArr} />
              </g>
            );
          });
        };

        const renderNode = (node, type) => {
          const intensity = getNodeIntensity(node.id, type);
          const col = node.col + 2;
          const pos = getPos(col, node.row);
          const w = nodeW[col];
          const active = intensity > 0.05;
          const count = treeActivation.activeCounts[node.id] || 0;
          const blink = isBlinking(node.id);
          let fillColor, borderColor, textColor, labelSize, blinkColor;
          if (type === "layer") {
            const layerDef = TREE_LAYERS.find(l => l.id === node.id);
            fillColor = active ? `${layerDef.color}22` : `${layerDef.color}12`;
            borderColor = active ? `${layerDef.color}88` : `${layerDef.color}40`;
            textColor = active ? layerDef.color : `${layerDef.color}77`;
            blinkColor = layerDef.color;
            labelSize = 10;
          } else if (type === "career") {
            fillColor = active ? "rgba(168,85,247,0.12)" : "rgba(168,85,247,0.06)";
            borderColor = active ? "rgba(168,85,247,0.5)" : "rgba(168,85,247,0.25)";
            textColor = active ? "#a855f7" : "rgba(168,85,247,0.5)";
            blinkColor = "#a855f7";
            labelSize = 9;
          } else if (type === "profile") {
            fillColor = active ? "rgba(0,212,255,0.08)" : "rgba(0,212,255,0.05)";
            borderColor = active ? "rgba(0,212,255,0.4)" : "rgba(0,212,255,0.22)";
            textColor = active ? "#00d4ff" : "rgba(0,212,255,0.5)";
            blinkColor = "#00d4ff";
            labelSize = 9;
          } else if (type === "skill") {
            const skillDef = TREE_SKILLS.find(s => s.id === node.id);
            const sColor = skillDef ? skillDef.color : "#88ff88";
            fillColor = active ? `${sColor}18` : `${sColor}0a`;
            borderColor = active ? `${sColor}66` : `${sColor}30`;
            textColor = active ? sColor : `${sColor}88`;
            blinkColor = sColor;
            labelSize = 8;
          } else {
            // Event nodes
            const preFire = derivedPreFire[node.id] || 0;
            const hasPreFire = preFire > 0.15 && !active;
            const isHeavy = HEAVY_EVENTS.has(node.id);
            if (isHeavy && active) {
              fillColor = `rgba(255,220,100,${(0.08 + intensity * 0.15).toFixed(3)})`;
              borderColor = `rgba(255,200,50,${(0.3 + intensity * 0.5).toFixed(3)})`;
              textColor = `rgba(255,240,180,${(0.6 + intensity * 0.4).toFixed(3)})`;
            } else {
              fillColor = active ? "rgba(255,255,255,0.06)" : hasPreFire ? `rgba(255,170,0,${(preFire * 0.08).toFixed(3)})` : "rgba(255,255,255,0.035)";
              borderColor = active ? "rgba(255,255,255,0.25)" : hasPreFire ? `rgba(255,170,0,${(preFire * 0.3).toFixed(3)})` : "rgba(255,255,255,0.15)";
              textColor = active ? "rgba(255,255,255,0.8)" : hasPreFire ? `rgba(255,200,100,${(0.15 + preFire * 0.3).toFixed(3)})` : "rgba(255,255,255,0.35)";
            }
            blinkColor = isHeavy ? "#ffcc00" : "#00e5ff";
            labelSize = 8;
          }
          return (
            <g key={node.id}>
              {/* Heavy event nodes: persistent warm glow halo */}
              {type === "event" && HEAVY_EVENTS.has(node.id) && active && (
                <rect x={pos.x - 2} y={pos.y - 2} width={w + 4} height={nodeH + 4} rx={8}
                  fill="none" stroke="#ffcc00" strokeWidth={1.2 + intensity * 1.5} opacity={0.15 + intensity * 0.4} filter="url(#glow)" />
              )}
              {/* worldDeath: accumulating attrition halo — cyan→orange→red as deaths mount */}
              {node.id === "ev_worldDeath" && (() => {
                const wdCount = treeActivation.activeCounts["ev_worldDeath"] || 0;
                const heat = Math.min(1, wdCount / 50); // 0→1 over ~50 deaths
                // Color shifts: cyan(0) → orange(0.5) → red(1.0)
                const r = Math.round(heat < 0.5 ? heat * 2 * 255 : 255);
                const g = Math.round(heat < 0.5 ? 200 - heat * 200 : Math.max(0, 180 - (heat - 0.5) * 360));
                const b = Math.round(heat < 0.5 ? 255 - heat * 2 * 255 : 0);
                const haloColor = `rgb(${r},${g},${b})`;
                const haloOp = 0.1 + heat * 0.5;
                const haloWidth = 1 + heat * 3;
                return wdCount > 0 ? (
                  <rect x={pos.x - 3} y={pos.y - 3} width={w + 6} height={nodeH + 6} rx={9}
                    fill="none" stroke={haloColor} strokeWidth={haloWidth} opacity={haloOp} filter="url(#glow)" />
                ) : null;
              })()}
              {/* L1 REACTIVE: rapid red flicker border — only while playing */}
              {node.id === "L1" && active && playing && (
                <rect x={pos.x - 2} y={pos.y - 2} width={w + 4} height={nodeH + 4} rx={8}
                  fill="none" stroke="#ff4444" strokeWidth={1.5}>
                  <animate attributeName="opacity" values="0;0;0.8;0;0;0.6;0;0;0.9;0" dur="0.25s" repeatCount="indefinite" />
                </rect>
              )}
              {blink && playing && node.id !== "L1" && (
                <rect x={pos.x - 3} y={pos.y - 3} width={w + 6} height={nodeH + 6} rx={9}
                  fill="none" stroke={blinkColor} strokeWidth={2} filter="url(#glow)">
                  <animate attributeName="opacity" values="0.8;0.1;0.8" dur="0.7s" repeatCount="indefinite" />
                </rect>
              )}
              <rect x={pos.x} y={pos.y} width={w} height={nodeH} rx={6}
                fill={blink ? `${blinkColor}30` : fillColor}
                stroke={blink ? blinkColor : borderColor}
                strokeWidth={blink ? 2 : active ? 1.5 : 0.5} />
              <text x={pos.x + w / 2} y={pos.y + (node.sub ? 11 : 16)}
                textAnchor="middle"
                fill={blink ? "#ffffff" : textColor} fontSize={labelSize} fontFamily={mono}
                fontWeight={blink ? 700 : active ? 600 : 400}>
                {node.label}
                {node.id === "L1" && active && playing && (
                  <animate attributeName="opacity" values="1;0.2;1;0.3;1" dur="0.3s" repeatCount="indefinite" />
                )}
              </text>
              {/* Sub-line label (layers have timing sub-labels) */}
              {node.sub && <text x={pos.x + w / 2} y={pos.y + 22} textAnchor="middle"
                fill={active ? textColor : "rgba(255,255,255,0.06)"} fontSize={7} fontFamily={mono} opacity={0.6}>
                {node.sub}
                {node.id === "L1" && active && playing && (
                  <animate attributeName="opacity" values="0.6;0.1;0.6;0.15;0.6" dur="0.3s" repeatCount="indefinite" />
                )}
              </text>}
              {type === "event" && active && count > 0 && (
                <text x={pos.x + w - 4} y={pos.y + 17} textAnchor="end"
                  fill={blink ? "#ffffff" : "rgba(255,255,255,0.5)"} fontSize={8} fontFamily={mono} fontWeight={700}>{count}</text>
              )}
            </g>
          );
        };

        let strongestCareer = null, strongestVal = 0;
        const careerSorted = TREE_CAREERS.map(c => ({ ...c, s: treeActivation.careerStrength[c.id] || 0 })).sort((a, b) => b.s - a.s);
        if (careerSorted.length > 0 && careerSorted[0].s > 0) {
          strongestCareer = careerSorted[0];
          strongestVal = careerSorted[0].s;
        }

        const layerIds = ["L1", "L2", "L3", "L4"];
        const layerVals = layerIds.map(l => treeActivation.layerStrength[l] || 0);
        const gaps = [];
        for (let i = 1; i < layerVals.length - 1; i++) {
          if (layerVals[i] < 0.1 && (layerVals[i - 1] > 0.2 || layerVals[i + 1] > 0.2)) gaps.push(layerIds[i]);
        }

        return <>
          {/* Scrubber bar + session selector — above column labels */}
          <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4, padding: "0 10px" }}>
            {/* Session selector — left side, no vertical space */}
            {[{ id: "commander", label: "CMD", color: C_COLOR }, { id: "soldier", label: "SLD", color: S_COLOR }].map(s => (
              <button key={s.id} onClick={() => setTreeSession(s.id)} style={{
                background: treeSession === s.id ? `${s.color}18` : "transparent",
                border: `1px solid ${treeSession === s.id ? s.color + "44" : "rgba(255,255,255,0.06)"}`,
                color: treeSession === s.id ? s.color : "rgba(255,255,255,0.25)",
                padding: "2px 8px", borderRadius: 4, cursor: "pointer",
                fontFamily: mono, fontSize: 8, letterSpacing: 1.5, fontWeight: 600,
              }}>{s.label}</button>
            ))}
            <div style={{ fontSize: 8, color: "rgba(255,255,255,0.2)", fontFamily: mono, letterSpacing: 1, marginLeft: 4 }}>
              {treeSession.toUpperCase()} • {Math.round(time)}s
            </div>
            {/* Scrubber bar — fills remaining space */}
            <div style={{ flex: 1, position: "relative", height: 14, cursor: "pointer", marginLeft: 8 }} onClick={(e) => {
              const rect = e.currentTarget.getBoundingClientRect();
              setTime((e.clientX - rect.left) / rect.width * MAX_DUR);
            }}>
              <div style={{ position: "absolute", top: 5, left: 0, right: 0, height: 3, background: "rgba(255,255,255,0.05)", borderRadius: 2 }} />
              <div style={{ position: "absolute", top: 3, left: (SOLDIER_DUR / MAX_DUR * 100) + "%", width: 1, height: 8, background: S_COLOR, opacity: 0.2 }} />
              <div style={{ position: "absolute", top: 5, left: 0, width: (time / MAX_DUR * 100) + "%", height: 3, background: `linear-gradient(90deg, ${S_COLOR}, ${C_COLOR})`, borderRadius: 2, transition: playing ? "none" : "width 0.15s" }} />
              <div style={{ position: "absolute", top: 2, left: (time / MAX_DUR * 100) + "%", width: 8, height: 10, background: "white", borderRadius: 2, transform: "translateX(-4px)", boxShadow: "0 0 6px rgba(255,255,255,0.3)" }} />
            </div>
          </div>

          <div style={{ overflow: "hidden", direction: "ltr" }}>
            <svg width={W} height={H} viewBox={`-92 0 ${W + 92} ${H}`} style={{ display: "block", margin: "0 auto", direction: "ltr" }}>
              <defs>
                <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="4" result="blur" />
                  <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
                </filter>
                <filter id="glowSmall" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="2" result="blur" />
                  <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
                </filter>
              </defs>

              {/* ─── COLUMN HEADERS — inside SVG so they stay locked to column positions ─── */}
              {[
                { label: "INPUT",          sub: "devices",          x: boxX + boxW / 2,              color: "rgba(255,255,255,0.55)" },
                { label: "DATA",           sub: "sample rate: 16ms",x: inputNodeX + inputNodeW / 2,  color: playing && COL_RAMP.data > 0 ? "#00e5ff" : "rgba(255,255,255,0.55)" },
                { label: "EXTRACTION",     sub: "L1 processing",    x: dfColX + dfNodeW / 2,         color: playing && COL_RAMP.extraction > 0 ? "#ff6644" : "rgba(255,255,255,0.55)" },
                { label: "GAME EVENTS",    sub: "classified",       x: colX[2] + nodeW[2] / 2,       color: "rgba(255,255,255,0.55)" },
                { label: "BIOLOGY",        sub: "domain skills",    x: colX[3] + nodeW[3] / 2,  color: "rgba(255,255,255,0.55)" },
                { label: "NEURAL ABSTRACTION",sub:"seconds",      x: colX[4] + nodeW[4] / 2,       color: "rgba(255,255,255,0.55)" },
                { label: "PROFILES",        sub: "minutes",          x: colX[5] + nodeW[5] / 2,       color: "rgba(255,255,255,0.55)" },
                { label: "CAREER PATHWAYS",sub: "confidence →",     x: colX[6] + nodeW[6] / 2,       color: "rgba(255,255,255,0.55)" },
              ].map(h => (
                <g key={h.label}>
                  <text x={h.x} y={10} textAnchor="middle"
                    fill={h.color} fontSize={8} fontFamily={mono} fontWeight={600} letterSpacing={1.5}>
                    {h.label}
                  </text>
                  <text x={h.x} y={20} textAnchor="middle"
                    fill={h.color === "rgba(255,255,255,0.55)" ? "rgba(255,255,255,0.2)" : h.color + "88"}
                    fontSize={6} fontFamily={mono} letterSpacing={1}>
                    {h.sub}
                  </text>
                </g>
              ))}

              {/* Input label nodes — left of containers, rapid firehose cycling */}
              {INPUT_NODES.map((inp, idx) => {
                const boxY = getRawBoxY(inp.boxIdx);
                const nodesForBox = INPUT_NODES.filter(n => n.boxIdx === inp.boxIdx);
                const nodeIdx = nodesForBox.indexOf(inp);
                const nodeGap = 1;
                // v36: top-align channels with their input container
                const startY = boxY + 4;
                const ny = startY + nodeIdx * (inputNodeH + nodeGap);
                const fireAge = time - (inputNodeFire[inp.fireKey] || -999);
                const eventActive = fireAge < BLINK_WINDOW;
                const eventFresh = fireAge < 0.4;
                // Firehose: this node is being "polled" this frame
                const firehoseHit = firehoseSet.has(inp.fireKey);
                const active = eventActive || firehoseHit;
                const fresh = eventFresh || firehoseHit;
                // Vary brightness per-node using prime hash for christmas tree depth
                const nodeHash = (inp.label.charCodeAt(0) * 31 + (inp.label.charCodeAt(1) || 7)) % 100;
                const firehoseBright = firehoseHit ? 0.35 + (nodeHash / 100) * 0.65 : 0;
                const brightness = eventFresh ? 1.0 : firehoseHit ? firehoseBright : (eventActive ? 0.3 : 0);
                // Final pathway: channel stays highlighted after playback
                const isFinal = isFinalNode(inp.fireKey);
                const finalBright = isFinal ? (getFinalStrength(inp.fireKey) || 0.5) : 0;
                // mouseX/mouseY: rapid blink — these stream at 16ms, show it
                const isMouseXY = inp.fireKey === "mouseX" || inp.fireKey === "mouseY";
                const erratic = isMouseXY && active
                  ? ((Math.floor(nowMs / 37) % 5 < 3 ? 1 : 0.1)
                    * (Math.floor(nowMs / 61 + (inp.fireKey === "mouseY" ? 17 : 0)) % 3 < 2 ? 1 : 0.2)
                    * (0.5 + Math.abs(Math.sin(nowMs / 23)) * 0.5))
                  : 1.0;
                const displayBrightness = Math.max(brightness, finalBright) * erratic;
                const isActive = active || isFinal;
                const isFresh = fresh || isFinal;
                return (
                  <g key={`inp-${inp.label}`}>
                    <rect x={inputNodeX} y={ny} width={inputNodeW} height={inputNodeH} rx={2}
                      fill={isFresh ? `${inp.color}${Math.round(displayBrightness * 48).toString(16).padStart(2,'0')}` : isActive ? `${inp.color}12` : "rgba(255,255,255,0.01)"}
                      stroke={isFresh ? `${inp.color}${Math.round(displayBrightness * 170).toString(16).padStart(2,'0')}` : isActive ? `${inp.color}44` : "rgba(255,255,255,0.05)"}
                      strokeWidth={isFresh ? 1 : 0.4} />
                    <text x={inputNodeX + inputNodeW / 2} y={ny + inputNodeH / 2 + 3}
                      textAnchor="middle" fill={isActive ? inp.color : "rgba(255,255,255,0.15)"}
                      fontSize={7} fontFamily={mono} fontWeight={isFresh ? 700 : 400} opacity={isMouseXY && isActive ? erratic : 1}>{inp.label}</text>
                    {/* Connector: container → channel node (short link) */}
                    {isActive && (
                      <line x1={boxLayout[inp.boxIdx].x + boxLayout[inp.boxIdx].w} y1={ny + inputNodeH / 2}
                        x2={inputNodeX} y2={ny + inputNodeH / 2}
                        stroke={inp.color} strokeWidth={firehoseHit ? 1 : isFinal ? 0.8 : 0.5}
                        opacity={Math.min(firehoseHit ? displayBrightness * 0.5 : isFinal ? 0.3 : (eventFresh ? 0.4 : 0.1), COL_RAMP.data)} />
                    )}
                  </g>
                );
              })}

              {/* Raw input boxes */}
              {RAW_BOXES.map((box, i) => {
                const bl = boxLayout[i];
                const y = bl.y;
                const boxH = bl.h;
                const bx = bl.x, bw = bl.w;
                const lastFire = getBoxFireTime(box);
                const lastHot = getBoxHotTime(box);
                const age = time - lastFire;
                const hotAge = time - lastHot;
                const isActive = age < BLINK_WINDOW || shimmerVal > 0;
                const isHot = hotAge < BLINK_WINDOW;
                const isFresh = age < 0.3;
                // Firehose border shimmer when playing
                const shimmerStroke = shimmerVal > 0 && !isHot ? `${box.color}${Math.round(shimmerVal * 255).toString(16).padStart(2,'0')}` : null;


                // — MOUSE box: LMB | scroll | RMB layout —
                if (box.id === "interact") {
                  const clickData = rawInputs.filter(r => r.type === "click" && r.t <= time && r.t > 0.5).slice(-1)[0];
                  const clickAge = clickData ? time - clickData.t : 999;
                  const clickFresh = clickAge < 0.4;
                  const isRMB = clickData?.data?.includes("RMB");
                  const isLMB = clickFresh && !isRMB;
                  // Box interior layout: [LMB] [wheel] [RMB] + speed meter below
                  const innerPad = 4;
                  const innerY = y + 16;
                  const innerH = 40; // fixed button area height, trail gets remainder
                  const gap = 2;
                  const wheelW = 8;
                  const btnW = (bw - innerPad * 2 - wheelW - gap * 2) / 2;
                  const lmbX = bx + innerPad;
                  const wheelX = lmbX + btnW + gap;
                  const rmbX = wheelX + wheelW + gap;
                  const LMB_SUSTAIN = 1.5;
                  const lmbDecay = isLMB ? Math.max(0.1, 1 - clickAge / LMB_SUSTAIN) : 0;
                  const rmbDecay = clickFresh && isRMB ? Math.max(0.1, 1 - clickAge / LMB_SUSTAIN) : 0;
                  return (
                    <g key={`raw-${box.id}`}>
                      <rect x={bx - 3} y={y - 3} width={bw + 6} height={boxH + 6} rx={10}
                        fill="none" stroke={`${box.color}30`} strokeWidth={4} filter="url(#glow)" />
                      <rect x={bx} y={y} width={bw} height={boxH} rx={8}
                        fill={`${box.color}12`}
                        stroke={`${box.color}cc`}
                        strokeWidth={1.2} />
                      <text x={bx + bw / 2} y={y + 10} textAnchor="middle"
                        fill={box.color}
                        fontSize={7} fontFamily={mono} fontWeight={700} letterSpacing={1.5}>MOUSE</text>
                      {/* LMB */}
                      <rect x={lmbX} y={innerY} width={btnW} height={innerH} rx={4}
                        fill={isLMB ? "#ff444444" : lmbDecay > 0 ? `rgba(255,68,68,${lmbDecay * 0.15})` : "rgba(255,68,68,0.02)"}
                        stroke={isLMB ? "#ff4444cc" : lmbDecay > 0 ? `rgba(255,68,68,${lmbDecay * 0.5})` : "rgba(255,68,68,0.06)"}
                        strokeWidth={isLMB ? 1.5 : 0.4}>
                        {isLMB && <animate attributeName="fill" values="#ff444455;#ff444415;#ff444455" dur="0.2s" repeatCount="2" />}
                      </rect>
                      {isLMB && (
                        <rect x={lmbX - 2} y={innerY - 2} width={btnW + 4} height={innerH + 4} rx={6}
                          fill="none" stroke="#ff4444" strokeWidth={1.5} filter="url(#glowSmall)" opacity={0.6}>
                          <animate attributeName="opacity" values="0.7;0.15;0.7" dur="0.4s" repeatCount="2" />
                        </rect>
                      )}
                      <text x={lmbX + btnW / 2} y={innerY + innerH / 2 + 3} textAnchor="middle"
                        fill={isLMB ? "#ff4444" : lmbDecay > 0 ? `rgba(255,68,68,${lmbDecay * 0.8})` : "rgba(255,68,68,0.15)"}
                        fontSize={7} fontFamily={mono} fontWeight={isLMB ? 700 : 600}>LMB</text>
                      {/* Scroll wheel */}
                      <rect x={wheelX} y={innerY + 4} width={wheelW} height={innerH - 8} rx={4}
                        fill="rgba(68,170,255,0.04)" stroke="rgba(68,170,255,0.15)" strokeWidth={0.5} />
                      <rect x={wheelX + 3} y={innerY + innerH / 2 - 6} width={wheelW - 6} height={12} rx={3}
                        fill="rgba(68,170,255,0.1)" stroke="rgba(68,170,255,0.2)" strokeWidth={0.5} />
                      {/* RMB */}
                      <rect x={rmbX} y={innerY} width={btnW} height={innerH} rx={4}
                        fill={clickFresh && isRMB ? "#ff880044" : rmbDecay > 0 ? `rgba(255,136,0,${rmbDecay * 0.15})` : "rgba(255,136,0,0.02)"}
                        stroke={clickFresh && isRMB ? "#ff8800cc" : rmbDecay > 0 ? `rgba(255,136,0,${rmbDecay * 0.5})` : "rgba(255,136,0,0.06)"}
                        strokeWidth={clickFresh && isRMB ? 1.5 : 0.4}>
                        {clickFresh && isRMB && <animate attributeName="fill" values="#ff880055;#ff880015;#ff880055" dur="0.2s" repeatCount="2" />}
                      </rect>
                      {clickFresh && isRMB && (
                        <rect x={rmbX - 2} y={innerY - 2} width={btnW + 4} height={innerH + 4} rx={6}
                          fill="none" stroke="#ff8800" strokeWidth={1.5} filter="url(#glowSmall)" opacity={0.6}>
                          <animate attributeName="opacity" values="0.7;0.15;0.7" dur="0.4s" repeatCount="2" />
                        </rect>
                      )}
                      <text x={rmbX + btnW / 2} y={innerY + innerH / 2 + 3} textAnchor="middle"
                        fill={clickFresh && isRMB ? "#ff8800" : rmbDecay > 0 ? `rgba(255,136,0,${rmbDecay * 0.8})` : "rgba(255,136,0,0.15)"}
                        fontSize={7} fontFamily={mono} fontWeight={clickFresh && isRMB ? 700 : 600}>RMB</text>
                      {/* v33: X/Y delta bars + speed readout */}
                      {(() => {
                        const barArea = innerY + innerH + 3;
                        const maxSpeed = 400;
                        const normSpeed = Math.min(1, currentSpeed / maxSpeed);
                        // Compute X and Y deltas from recent mouse data
                        const recentMouse = rawInputs
                          .filter(r => r.type === "mouse" && r.t <= time && r.t > time - 0.5)
                          .slice(-5);
                        let deltaX = 0, deltaY = 0;
                        if (recentMouse.length >= 2) {
                          const first = recentMouse[0], last = recentMouse[recentMouse.length - 1];
                          const p1 = (first.data || "").split(","), p2 = (last.data || "").split(",");
                          deltaX = (parseFloat(p2[0]) || 0) - (parseFloat(p1[0]) || 0);
                          deltaY = (parseFloat(p2[1]) || 0) - (parseFloat(p1[1]) || 0);
                        }
                        const normDX = Math.min(1, Math.abs(deltaX) / 80);
                        const normDY = Math.min(1, Math.abs(deltaY) / 80);
                        // X bar: horizontal along bottom
                        const xBarY = y + boxH - 10;
                        const xBarMaxW = bw - 22;
                        const xBarW = normDX * xBarMaxW;
                        const xDir = deltaX >= 0 ? 1 : -1;
                        const xBarX = bx + 10 + (xDir > 0 ? 0 : xBarMaxW - xBarW);
                        // Y bar: vertical along left side
                        const yBarX = bx + 2;
                        const yBarMaxH = innerH;
                        const yBarH = normDY * yBarMaxH;
                        const yDir = deltaY >= 0 ? 1 : -1;
                        const yBarY = innerY + (yDir > 0 ? yBarMaxH - yBarH : 0);
                        return (
                          <g>
                            {/* X delta bar */}
                            <rect x={bx + 10} y={xBarY} width={xBarMaxW} height={5} rx={1}
                              fill="rgba(0,0,0,0.2)" stroke="rgba(255,255,255,0.04)" strokeWidth={0.3} />
                            {normDX > 0.02 && (
                              <rect x={xBarX} y={xBarY} width={xBarW} height={5} rx={1}
                                fill="#55ccff" opacity={0.6 + normDX * 0.4} />
                            )}
                            {/* X needle — springs from center toward active direction */}
                            {(() => {
                              const xMid = bx + 10 + xBarMaxW / 2;
                              const xNeedleOffset = (deltaX / 80) * (xBarMaxW / 2);
                              const xNeedleX = xMid + Math.max(-xBarMaxW / 2, Math.min(xBarMaxW / 2, xNeedleOffset));
                              const needleIntensity = Math.min(1, Math.abs(deltaX) / 60);
                              return (
                                <g>
                                  <line x1={xMid} y1={xBarY - 0.5} x2={xMid} y2={xBarY + 5.5}
                                    stroke="rgba(255,255,255,0.12)" strokeWidth={0.5} />
                                  <rect x={xNeedleX - 1} y={xBarY - 1} width={2} height={7} rx={0.5}
                                    fill={needleIntensity > 0.1 ? "#55ccff" : "rgba(255,255,255,0.3)"}
                                    opacity={0.5 + needleIntensity * 0.5}
                                    style={{ transition: "x 0.15s ease-out, opacity 0.15s ease-out" }} />
                                </g>
                              );
                            })()}
                            <text x={bx + 6} y={xBarY + 4} fill="rgba(255,255,255,0.35)"
                              fontSize={4} fontFamily={mono}>X</text>
                            {/* Y delta bar */}
                            <rect x={yBarX} y={innerY} width={4} height={yBarMaxH} rx={1}
                              fill="rgba(0,0,0,0.2)" stroke="rgba(255,255,255,0.04)" strokeWidth={0.3} />
                            {normDY > 0.02 && (
                              <rect x={yBarX} y={yBarY} width={4} height={yBarH} rx={1}
                                fill="#44bbee" opacity={0.6 + normDY * 0.4} />
                            )}
                            {/* Y needle — springs from center toward active direction */}
                            {(() => {
                              const yMid = innerY + yBarMaxH / 2;
                              const yNeedleOffset = (deltaY / 80) * (yBarMaxH / 2);
                              const yNeedleY = yMid + Math.max(-yBarMaxH / 2, Math.min(yBarMaxH / 2, yNeedleOffset));
                              const needleIntensity = Math.min(1, Math.abs(deltaY) / 60);
                              return (
                                <g>
                                  <line x1={yBarX - 0.5} y1={yMid} x2={yBarX + 4.5} y2={yMid}
                                    stroke="rgba(255,255,255,0.12)" strokeWidth={0.5} />
                                  <rect x={yBarX - 1} y={yNeedleY - 1} width={6} height={2} rx={0.5}
                                    fill={needleIntensity > 0.1 ? "#44bbee" : "rgba(255,255,255,0.3)"}
                                    opacity={0.5 + needleIntensity * 0.5}
                                    style={{ transition: "y 0.15s ease-out, opacity 0.15s ease-out" }} />
                                </g>
                              );
                            })()}
                            <text x={yBarX + 2} y={innerY - 2} textAnchor="middle"
                              fill="rgba(255,255,255,0.35)" fontSize={4} fontFamily={mono}>Y</text>
                            {/* Speed readout */}
                            <text x={bx + bw - 4} y={xBarY + 4} textAnchor="end"
                              fill={normSpeed > 0.3 ? "#44aaff" : "rgba(255,255,255,0.2)"}
                              fontSize={5} fontFamily={mono} fontWeight={normSpeed > 0.3 ? 600 : 400}>
                              {Math.round(currentSpeed)}
                            </text>
                          </g>
                        );
                      })()}
                    </g>
                  );
                }

                // — KEYS box: WASD + R/E battle keys —
                if (box.id === "key") {
                  const kS = 14;
                  const kG = 2;
                  const cx = bx + bw / 2;
                  const ky = y + 20;
                  const BATTLE_SUSTAIN = 3.0; // longer glow + slower fade
                  const renderKey = (label, kx, ky2, w = kS, h = kS, isBattle = false) => {
                    const pressTime = keyLastPress[label] || -999;
                    const pressAge = time - pressTime;
                    const pressed = pressAge < 0.5;
                    const sustain = isBattle && pressAge < BATTLE_SUSTAIN;
                    const recent = pressAge < BLINK_WINDOW;
                    const baseColor = isBattle ? "#ff4444" : "#ffcc00";
                    // Slower cubic fade for battle keys
                    const sustainFade = sustain ? Math.pow(Math.max(0, 1 - pressAge / BATTLE_SUSTAIN), 0.6) : 0;
                    return (
                      <g key={`k-${label}`}>
                        {sustain && (
                          <rect x={kx - 2} y={ky2 - 2} width={w + 4} height={h + 4} rx={5}
                            fill="none" stroke={baseColor} strokeWidth={1.5} filter="url(#glowSmall)"
                            opacity={sustainFade * 0.7}>
                          </rect>
                        )}
                        <rect x={kx} y={ky2} width={w} height={h} rx={3}
                          fill={pressed ? `${baseColor}44` : sustain ? `${baseColor}${Math.round(sustainFade * 24).toString(16).padStart(2,'0')}` : recent ? `${baseColor}0c` : `${baseColor}0a`}
                          stroke={pressed ? `${baseColor}cc` : sustain ? `${baseColor}${Math.round(sustainFade * 102).toString(16).padStart(2,'0')}` : recent ? `${baseColor}33` : `${baseColor}18`}
                          strokeWidth={pressed ? 1.5 : 0.8}>
                          {pressed && <animate attributeName="opacity" values="1;0.5;1" dur="0.2s" repeatCount="2" />}
                        </rect>
                        <text x={kx + w / 2} y={ky2 + h / 2 + (h > kS ? 3 : 4)} textAnchor="middle"
                          fill={pressed ? baseColor : sustain ? `${baseColor}${Math.round(sustainFade * 187).toString(16).padStart(2,'0')}` : recent ? `${baseColor}66` : `${baseColor}33`}
                          fontSize={h > kS ? 7 : 9} fontFamily={mono} fontWeight={pressed ? 800 : 600}>{label === "SPC" ? "SPACE" : label}</text>
                      </g>
                    );
                  };
                  // Top row: W E R  (E between W and R, matching QWERTY)
                  const topRowW = kS * 3 + kG * 2;
                  const topRowX = cx - topRowW / 2;
                  const wX = topRowX;
                  const eX = topRowX + kS + kG;
                  const rX = topRowX + (kS + kG) * 2;
                  // Mid row: A S D — offset half-key LEFT of top row (real keyboard stagger)
                  const asdRowY = ky + kS + kG;
                  const aX = topRowX - Math.floor(kS / 2);
                  const sX = aX + kS + kG;
                  const dX = aX + (kS + kG) * 2;
                  // Spacebar below ASD
                  const spcY = asdRowY + kS + kG + 2;
                  const spcW = kS * 3 + kG * 2;
                  return (
                    <g key={`raw-${box.id}`}>
                      <rect x={bx - 3} y={y - 3} width={bw + 6} height={boxH + 6} rx={10}
                        fill="none" stroke={`${box.color}30`} strokeWidth={4} filter="url(#glow)" />
                      <rect x={bx} y={y} width={bw} height={boxH} rx={8}
                        fill={isHot ? "#ffcc0018" : `${box.color}10`}
                        stroke={isHot ? "#ffcc00aa" : `${box.color}cc`} strokeWidth={1.2} />
                      <text x={bx + bw / 2} y={y + 10} textAnchor="middle"
                        fill={box.color}
                        fontSize={7} fontFamily={mono} fontWeight={700} letterSpacing={1.5}>KEYBOARD</text>
                      {renderKey("W", wX, ky)}
                      {renderKey("E", eX, ky, kS, kS, true)}
                      {renderKey("R", rX, ky, kS, kS, true)}
                      {renderKey("A", aX, asdRowY)}
                      {renderKey("S", sX, asdRowY)}
                      {renderKey("D", dX, asdRowY)}
                      {renderKey("SPC", aX, spcY, spcW, 12, true)}
                    </g>
                  );
                }

                // — AUDIO box: FX decibel meter | Speech alphabet cycling —
                if (box.id === "audio") {
                  const fxAge = time - inputNodeFire.audio;
                  const spAge = time - inputNodeFire.linguistic;
                  const fxActive = fxAge < 1.5 && time > 0.1;
                  const spActive = spAge < 2.0 && time > 0.1;
                  const fxIntensity = fxActive ? Math.exp(-fxAge * 1.2) : 0;
                  const spIntensity = spActive ? Math.exp(-spAge * 0.6) : 0;
                  const innerPad = 3;
                  const pillH = 14;
                  const pillW = bw - innerPad * 2;
                  const fxY = y + 14;
                  const spY = fxY + pillH + 2;
                  // dB meter: 8 bars
                  const dbBars = 8;
                  const barW = (pillW - 16) / dbBars;
                  const barH = 8;
                  const dbX = bx + innerPad + 14;
                  const dbY = fxY + 3;
                  // dB level from intensity + noise
                  const dbLevel = fxActive ? Math.min(dbBars, Math.round(fxIntensity * dbBars + (playing ? Math.random() * 1.5 : 0))) : 0;
                  // Speech alphabet
                  const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
                  const spCharIdx = spActive && playing ? Math.floor(nowMs / 60) % alphabet.length : 0;
                  const spChar = spActive ? alphabet[spCharIdx] : "_";
                  return (
                    <g key={`raw-${box.id}`}>
                      {(fxActive || spActive) && <rect x={bx - 3} y={y - 3} width={bw + 6} height={boxH + 6} rx={10}
                        fill="none" stroke={`${box.color}50`} strokeWidth={4} filter="url(#glow)" />}
                      <rect x={bx} y={y} width={bw} height={boxH} rx={6}
                        fill={`${box.color}12`}
                        stroke={`${box.color}cc`} strokeWidth={fxActive || spActive ? 1.2 : 0.6} />
                      <text x={bx + bw / 2} y={y + 10} textAnchor="middle"
                        fill="#cc66ff" fontSize={7} fontFamily={mono} fontWeight={700} letterSpacing={1.5}>AUDIO</text>
                      {/* FX pill + dB meter */}
                      <rect x={bx + innerPad} y={fxY} width={pillW} height={pillH} rx={3}
                        fill={fxActive ? `rgba(204,102,255,${(fxIntensity * 0.15).toFixed(3)})` : "rgba(255,255,255,0.02)"}
                        stroke={fxActive ? "#cc66ff66" : "#cc66ff22"} strokeWidth={0.5} />
                      <text x={bx + innerPad + 2} y={fxY + 10} fill={fxActive ? "#cc66ff" : "#cc66ff55"}
                        fontSize={5.5} fontFamily={mono} fontWeight={600}>FX</text>
                      {Array.from({ length: dbBars }, (_, bi) => {
                        const lit = bi < dbLevel;
                        const barColor = bi < 5 ? "#44ff88" : bi < 7 ? "#ffcc00" : "#ff4444";
                        return (
                          <rect key={`db-${bi}`} x={dbX + bi * barW + 0.5} y={dbY} width={barW - 1} height={barH} rx={1}
                            fill={lit ? barColor : "rgba(255,255,255,0.04)"}
                            opacity={lit ? 0.7 + fxIntensity * 0.3 : 0.3} />
                        );
                      })}
                      {/* Speech pill + alphabet box */}
                      <rect x={bx + innerPad} y={spY} width={pillW} height={pillH} rx={3}
                        fill={spActive ? `rgba(170,136,255,${(spIntensity * 0.15).toFixed(3)})` : "rgba(255,255,255,0.02)"}
                        stroke={spActive ? "#aa88ff66" : "#aa88ff22"} strokeWidth={0.5} />
                      <text x={bx + innerPad + 2} y={spY + 10} fill={spActive ? "#aa88ff" : "#aa88ff55"}
                        fontSize={5} fontFamily={mono} fontWeight={600}>SPCH</text>
                      <rect x={bx + innerPad + pillW - 16} y={spY + 2} width={14} height={10} rx={2}
                        fill={spActive ? "rgba(170,136,255,0.15)" : "rgba(255,255,255,0.03)"}
                        stroke={spActive ? "#aa88ff55" : "#aa88ff22"} strokeWidth={0.4} />
                      <text x={bx + innerPad + pillW - 9} y={spY + 10} textAnchor="middle"
                        fill={spActive ? "#aa88ff" : "#aa88ff44"}
                        fontSize={7} fontFamily={mono} fontWeight={700}>{spChar}</text>
                    </g>
                  );
                }

                // — TXT box: Language | Symbolic | Icon pills —
                if (box.id === "text") {
                  const langAge = time - inputNodeFire.language;
                  const symAge = time - inputNodeFire.symbolic;
                  const iconAge = time - inputNodeFire.icon;
                  const langAct = langAge < 2.0 && time > 0.1 ? Math.exp(-langAge * 0.8) : 0;
                  const symAct = symAge < 1.5 && time > 0.1 ? Math.exp(-symAge * 1.0) : 0;
                  const iconAct = iconAge < 1.5 && time > 0.1 ? Math.exp(-iconAge * 1.0) : 0;
                  const anyAct = langAct + symAct + iconAct > 0.1;
                  const innerPad = 3;
                  const pillH = 11;
                  const pillW = bw - innerPad * 2;
                  const pills = [
                    { label: "LANG", act: langAct, color: "#66ff88" },
                    { label: "SYM", act: symAct, color: "#44dd66" },
                  ];
                  // 4 icon fire times
                  const iconItems = [
                    { label: "☠", key: "iconDeath", color: "#ff4444" },
                    { label: "◎", key: "iconWaypoint", color: "#00ddff" },
                    { label: "↗", key: "iconEmit", color: "#ff6633" },
                    { label: "⊕", key: "iconReplicate", color: "#44dd66" },
                  ];
                  // Ticker messages
                  const tickerMsgs = ["NODE CAPTURED", "WAYPOINT SET", "ABILITY READY", "DOCK COMPLETE", "ENEMY SPOTTED", "ZONE CLEAR", "UNIT DEPLOYED", "SWITCH TARGET"];
                  const tickerIdx = playing && anyAct ? Math.floor(nowMs / 1800) % tickerMsgs.length : 0;
                  const tickerText = anyAct ? tickerMsgs[tickerIdx] : "";
                  const tickerScroll = playing && anyAct ? (nowMs % 1800) / 1800 : 0;
                  return (
                    <g key={`raw-${box.id}`}>
                      {anyAct && <rect x={bx - 3} y={y - 3} width={bw + 6} height={boxH + 6} rx={10}
                        fill="none" stroke={`${box.color}50`} strokeWidth={4} filter="url(#glow)" />}
                      <rect x={bx} y={y} width={bw} height={boxH} rx={6}
                        fill={`${box.color}12`}
                        stroke={`${box.color}cc`} strokeWidth={anyAct ? 1.2 : 0.6} />
                      <text x={bx + bw / 2} y={y + 10} textAnchor="middle"
                        fill="#66ff88" fontSize={7} fontFamily={mono} fontWeight={700} letterSpacing={1.5}>TXT</text>
                      {/* Ticker */}
                      <clipPath id="txt-ticker-clip">
                        <rect x={bx + innerPad} y={y + 11} width={pillW} height={8} />
                      </clipPath>
                      {anyAct && <text x={bx + innerPad + pillW - tickerScroll * (pillW + 20)} y={y + 18}
                        fill="#66ff8866" fontSize={5} fontFamily={mono} fontWeight={400}
                        clipPath="url(#txt-ticker-clip)">{tickerText}</text>}
                      {pills.map((p, pi) => {
                        const py = y + 20 + pi * (pillH + 1);
                        return (
                          <g key={`txt-pill-${pi}`}>
                            <rect x={bx + innerPad} y={py} width={pillW} height={pillH} rx={3}
                              fill={p.act > 0.1 ? `${p.color}${Math.round(p.act * 25).toString(16).padStart(2,'0')}` : "rgba(255,255,255,0.02)"}
                              stroke={p.act > 0.1 ? p.color + "66" : p.color + "22"} strokeWidth={0.5} />
                            <text x={bx + innerPad + pillW / 2} y={py + 8} textAnchor="middle"
                              fill={p.act > 0.1 ? p.color : p.color + "55"}
                              fontSize={5.5} fontFamily={mono} fontWeight={600}>{p.label}</text>
                          </g>
