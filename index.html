function computeProfile(events, upToTime) {
  const active = events.filter(e => e.t <= upToTime);
  let kills = 0, playerKills = 0, teamKills = 0, switches = 0, uniqueUnits = new Set();
  let waypoints = 0, ctrlTransitions = 0, captures = 0, playerCaptures = 0;
  let abilities = 0, replicates = 0, emits = 0;
  let zooms = [], zoomChanges = 0, lastZoom = null;
  let deaths = 0, docks = 0;
  const pathogenTypes = new Set(["VirusType","PneumoniaType","MycobacteriumType","TuberculosisType"]);

  for (const e of active) {
    if (e.type === "CombatEvent") {
      kills++;
      if (e.data.playerWasKiller || e.data.playerUnitKill) playerKills++;
      if (e.data.playerWasVictim) deaths++;
      if (pathogenTypes.has(e.data.killerType)) teamKills++;
    }
    if (e.type === "SwitchEvent") {
      switches++;
      if (e.data.toUnitType) uniqueUnits.add(e.data.toUnitType);
    }
    if (e.type === "ControlStateEvent") {
      ctrlTransitions++;
      if (e.data.toState === "Disabled" && e.data.trigger === "NodeDock") docks++;
    }
    if (e.type === "AbilityEvent") {
      abilities++;
      const ab = e.data.ability || "";
      if (ab.includes("Waypoint") || ab.includes("AutoDock")) waypoints++;
      if (ab === "Replicate") replicates++;
      if (ab === "Emit") emits++;
    }
    if (e.type === "NodeCaptureEvent") {
      captures++;
      if (e.data.playerInvolved) playerCaptures++;
    }
    if (e.type === "ViewEvent" && e.data.zoomLevel != null) {
      zooms.push(e.data.zoomLevel);
      if (lastZoom !== null && Math.abs(e.data.zoomLevel - lastZoom) > 20) zoomChanges++;
      lastZoom = e.data.zoomLevel;
    }
  }

  const elapsed = Math.max(upToTime, 1);
  const avgZoom = zooms.length ? zooms.reduce((a, b) => a + b, 0) / zooms.length : 150;

  return {
    reactivity: Math.min(100, (playerKills / elapsed) * 200 + (deaths > 0 ? 5 : 0)),
    strategicDepth: Math.min(100, (playerCaptures * 18) + (waypoints * 12) + (docks * 15) + (replicates * 3) + (emits * 2)),
    spatialAwareness: Math.min(100, (zoomChanges / Math.max(zooms.length, 1)) * 180 + (250 - avgZoom) * 0.25),
    toolAdoption: Math.min(100, (waypoints * 12) + (ctrlTransitions * 5) + (replicates * 4) + (emits * 3)),
    unitDiversity: Math.min(100, (uniqueUnits.size - 1) * 30 + Math.min(switches, 15) * 4),
    combatFocus: Math.min(100, (playerKills / Math.max(kills, 1)) * 100 + (playerCaptures === 0 && playerKills > 0 ? 20 : 0)),
    _kills: kills, _playerKills: playerKills, _teamKills: teamKills, _switches: switches,
    _units: uniqueUnits.size, _waypoints: waypoints, _ctrl: ctrlTransitions,
    _captures: captures, _playerCaptures: playerCaptures, _abilities: abilities,
    _avgZoom: Math.round(avgZoom), _zoomChanges: zoomChanges,
    _deaths: deaths, _replicates: replicates, _emits: emits, _docks: docks
  };
}

// classifyEvent: returns [{id, layer, weight}, ...] with multi-layer signal routing
// Events emit primary (1.0) and secondary (0.2-0.5) signals to reflect parallel processing
function classifyEvent(e) {
  const signals = [];
  if (e.type === "CombatEvent") {
    if (e.data.playerWasKiller || e.data.playerUnitKill) {
      signals.push({ id: "ev_kill", layer: "L1", weight: 1.0 });   // reactive execution
      signals.push({ id: "ev_kill", layer: "L2", weight: 0.3 });   // target selection pattern
    }
    if (e.data.playerWasVictim) {
      signals.push({ id: "ev_death", layer: "L1", weight: 1.0 });  // reactive failure
      signals.push({ id: "ev_death", layer: "L4", weight: 0.4 });  // "what went wrong?" metacog
    }
    // World deaths — units dying around the player, strategic awareness
    if (!e.data.playerWasKiller && !e.data.playerUnitKill && !e.data.playerWasVictim) {
      signals.push({ id: "ev_worldDeath", layer: "L3", weight: 1.0 }); // battlefield awareness
      signals.push({ id: "ev_worldDeath", layer: "L4", weight: 0.8 }); // attrition strategy
    }
  }
  if (e.type === "ViewEvent") {
    const z = e.data.zoomLevel;
    if (z < 150) {
      signals.push({ id: "ev_zoomIn", layer: "L1", weight: 1.0 }); // tactical focus
      signals.push({ id: "ev_zoomIn", layer: "L2", weight: 0.2 }); // spatial awareness
    } else if (z > 200) {
      signals.push({ id: "ev_zoomOut", layer: "L3", weight: 1.0 }); // strategic overview
      signals.push({ id: "ev_zoomOut", layer: "L4", weight: 0.3 }); // metacognitive assessment
    } else {
      // 150-200 midrange: gentle signal to both — player is adjusting perspective
      signals.push({ id: "ev_zoomIn", layer: "L1", weight: 0.3 });
      signals.push({ id: "ev_zoomOut", layer: "L3", weight: 0.3 });
    }
  }
  if (e.type === "SwitchEvent") {
    const d = e.data.switchDistance || 0;
    if (e.data.switchMethod === "DeathRespawn") {
      signals.push({ id: "ev_death", layer: "L1", weight: 1.0 });
      signals.push({ id: "ev_death", layer: "L4", weight: 0.4 });
    } else if (d < 20) {
      signals.push({ id: "ev_nearSwitch", layer: "L1", weight: 1.0 }); // micro-management
    } else if (d <= 100) {
      signals.push({ id: "ev_midSwitch", layer: "L2", weight: 1.0 }); // pattern-based switching
      signals.push({ id: "ev_midSwitch", layer: "L1", weight: 0.2 }); // reactive component
    } else {
      signals.push({ id: "ev_farSwitch", layer: "L4", weight: 1.0 }); // strategic repositioning
      signals.push({ id: "ev_farSwitch", layer: "L3", weight: 0.4 }); // planning component
    }
  }
  if (e.type === "ControlStateEvent") {
    if (e.data.trigger === "FKeyToggle") {
      signals.push({ id: "ev_mouseFollow", layer: "L2", weight: 1.0 }); // mode adaptation
      signals.push({ id: "ev_mouseFollow", layer: "L1", weight: 0.3 }); // input modality
    }
    if (e.data.trigger === "WaypointSet") {
      signals.push({ id: "ev_waypoint", layer: "L3", weight: 1.0 }); // planning
      signals.push({ id: "ev_waypoint", layer: "L4", weight: 0.3 }); // resource decision
    }
    if (e.data.trigger === "NodeDock") {
      signals.push({ id: "ev_dock", layer: "L3", weight: 1.0 });    // strategic objective
      signals.push({ id: "ev_dock", layer: "L4", weight: 0.5 });    // high-level decision
    }
    if (e.data.toState === "DirectControl") {
      signals.push({ id: "ev_wasd", layer: "L1", weight: 1.0 });    // direct control
    }
  }
  if (e.type === "AbilityEvent") {
    if (e.data.ability === "Replicate") {
      signals.push({ id: "ev_replicate", layer: "L1", weight: 1.0 }); // reactive button press
      signals.push({ id: "ev_replicate", layer: "L2", weight: 0.3 }); // timing pattern
      signals.push({ id: "ev_replicate", layer: "L3", weight: 0.3 }); // resource strategy
    }
    if (e.data.ability === "Emit") {
      signals.push({ id: "ev_emit", layer: "L1", weight: 1.0 });     // reactive tactic
      signals.push({ id: "ev_emit", layer: "L2", weight: 0.3 });     // pattern recognition
      signals.push({ id: "ev_emit", layer: "L3", weight: 0.3 });     // area denial
    }
    if (e.data.ability && e.data.ability.includes("Waypoint")) {
      signals.push({ id: "ev_waypoint", layer: "L3", weight: 1.0 });
      signals.push({ id: "ev_waypoint", layer: "L4", weight: 0.3 });
    }
    if (e.data.ability && e.data.ability.includes("MouseFollow")) {
      signals.push({ id: "ev_mouseFollow", layer: "L2", weight: 1.0 });
      signals.push({ id: "ev_mouseFollow", layer: "L1", weight: 0.3 });
    }
    if (e.data.ability && e.data.ability.includes("AutoDock")) {
      signals.push({ id: "ev_dock", layer: "L3", weight: 1.0 });
      signals.push({ id: "ev_dock", layer: "L4", weight: 0.5 });
    }
  }
  if (e.type === "NodeCaptureEvent" && e.data.playerInvolved) {
    signals.push({ id: "ev_capture", layer: "L3", weight: 1.0 });   // strategic objective
    signals.push({ id: "ev_capture", layer: "L4", weight: 0.4 });   // resource decision
    signals.push({ id: "ev_capture", layer: "L2", weight: 0.2 });   // spatial awareness
  }
  return signals;
}
// Flat adapter for backward compat with rendering code that expects [layerId, eventId, ...]
function classifyEventFlat(e) {
  const signals = classifyEvent(e);
  const flat = [];
  for (const s of signals) {
    if (s.weight >= 0.6) flat.push(s.layer, s.id); // only primary signals for flat
  }
  return flat;
}

// Cognitive timescale-aligned saturation thresholds
const LAYER_THRESHOLDS = { L1: 15, L2: 10, L3: 8, L4: 5 };
// Progressive career contribution: higher cognitive layers are more career-diagnostic
const LAYER_CAREER_WEIGHT = { L1: 0.5, L2: 0.8, L3: 1.2, L4: 1.6 };
const DECAY_LAMBDA = 0.015; // exponential decay per second

function computeTreeActivation(events, maxTime) {
  const activeCounts = {};
  const weightedCounts = {};
  const lastActivated = {};
  if (maxTime < 0.2) return { activeCounts, lastActivated, layerStrength: {}, profileStrength: {}, careerStrength: {}, weightedCounts };

  // ─── RAW INPUT → L1 REACTIVE ───────────────────────────────
  // The sensorimotor stream IS L1. Every mouse move, WASD press, position change
  // is reactive processing. ~15 L1 inputs/s that accumulate massively
  const rawInputRate = 15;
  const rawInputWeight = 0.15;
  const rawL1Volume = Math.min(maxTime, 300) * rawInputRate;
  const rawL1Decayed = rawInputWeight * rawInputRate * (1 - Math.exp(-DECAY_LAMBDA * maxTime)) / DECAY_LAMBDA;
  
  weightedCounts["L1"] = (weightedCounts["L1"] || 0) + rawL1Decayed;
  activeCounts["L1"] = (activeCounts["L1"] || 0) + Math.round(rawL1Volume);
  if (maxTime > 0.2) lastActivated["L1"] = maxTime;

  // Accumulate weighted signals with temporal decay
  for (const e of events) {
    if (e.t > maxTime) break;
    const signals = classifyEvent(e);
    const age = maxTime - e.t;
    const decayFactor = Math.exp(-DECAY_LAMBDA * age);
    for (const sig of signals) {
      const key = sig.layer;
      activeCounts[key] = (activeCounts[key] || 0) + 1;
      activeCounts[sig.id] = (activeCounts[sig.id] || 0) + 1;
      weightedCounts[key] = (weightedCounts[key] || 0) + sig.weight * decayFactor;
      lastActivated[key] = Math.max(lastActivated[key] || 0, e.t);
      lastActivated[sig.id] = Math.max(lastActivated[sig.id] || 0, e.t);
    }
  }

  // ─── MYELINATION ESCALATION ─────────────────────────────────
  // Repeated lower-layer firing causes higher layers to "awaken"
  const rawL1 = activeCounts["L1"] || 0;
  const rawL2 = activeCounts["L2"] || 0;
  const rawL3 = activeCounts["L3"] || 0;
  const l2Escalation = rawL1 > 10 ? Math.min(1.0, (rawL1 - 10) / 15) : 0;
  const l3Escalation = rawL2 > 3  ? Math.min(1.0, (rawL2 - 3) / 8)   : 0;
  const l4Escalation = rawL3 > 5  ? Math.min(1.0, (rawL3 - 5) / 10)  : 0;
  const escalationBonus = { L1: 0, L2: l2Escalation * 6, L3: l3Escalation * 5, L4: l4Escalation * 3 };

  // Sigmoid saturation curve per layer (cognitive timescale aligned)
  const layerStrength = {};
  for (const l of TREE_LAYERS) {
    const wc = (weightedCounts[l.id] || 0) + escalationBonus[l.id];
    const threshold = LAYER_THRESHOLDS[l.id] || 10;
    const k = 6 / threshold;
    layerStrength[l.id] = 1 / (1 + Math.exp(-k * (wc - threshold / 2)));
  }

  // Profile strength: weighted by LAYER_PROFILE_EDGES weights
  const profileStrength = {};
  for (const p of TREE_PROFILES) {
    if (p.id === "pr_swiss") {
      // Swiss Army: requires balanced activation, penalizes gaps — progressive layer weighting
      const scores = p.layers.map(l => (layerStrength[l] || 0) * (LAYER_CAREER_WEIGHT[l] || 1));
      const weights = p.layers.map(l => LAYER_CAREER_WEIGHT[l] || 1);
      const totalW = weights.reduce((a, b) => a + b, 0);
      const min = Math.min(...p.layers.map(l => layerStrength[l] || 0));
      const wAvg = scores.reduce((a, b) => a + b, 0) / totalW;
      profileStrength[p.id] = min > 0.05 ? wAvg * 0.85 : 0;
    } else {
      // Weighted average from edge weights × progressive layer importance
      let totalWeight = 0, totalScore = 0;
      for (const edge of LAYER_PROFILE_EDGES) {
        if (edge[1] === p.id) {
          const w = (edge[2] || 1) * (LAYER_CAREER_WEIGHT[edge[0]] || 1);
          totalWeight += w;
          totalScore += (layerStrength[edge[0]] || 0) * w;
        }
      }
      profileStrength[p.id] = totalWeight > 0 ? totalScore / totalWeight : 0;
    }
    // Propagate lastActivated
    const layerTimes = p.layers.map(l => lastActivated[l] || -999);
    const latestLayer = Math.max(...layerTimes);
    if (latestLayer > 0 && profileStrength[p.id] > 0.05) lastActivated[p.id] = latestLayer;
  }

  // Softmax career probabilities (temperature=0.3 for differentiation)
  const careerRawScores = {};
  for (const c of TREE_CAREERS) {
    let totalWeight = 0, totalScore = 0;
    for (const edge of PROFILE_CAREER_EDGES) {
      if (edge[0] && c.profiles && edge[1] === c.id) {
        // edge format is [profile, career, weight]
      }
    }
    // Weighted max from contributing profiles via edges
    let maxWeightedScore = 0;
    for (const edge of PROFILE_CAREER_EDGES) {
      if (edge[1] === c.id) {
        const w = edge[2] || 1;
        const ps = profileStrength[edge[0]] || 0;
        maxWeightedScore = Math.max(maxWeightedScore, ps * w);
      }
    }
    careerRawScores[c.id] = maxWeightedScore;
    // Propagate lastActivated
    const profileTimes = c.profiles.map(p => lastActivated[p] || -999);
    const latestProfile = Math.max(...profileTimes);
    if (latestProfile > 0 && maxWeightedScore > 0.05) lastActivated[c.id] = latestProfile;
  }

  // Softmax normalization
  const temperature = 0.3;
  const careerIds = TREE_CAREERS.map(c => c.id);
  const maxRaw = Math.max(...careerIds.map(id => careerRawScores[id] || 0), 0.001);
  const expScores = {};
  let expSum = 0;
  for (const id of careerIds) {
    const normalized = (careerRawScores[id] || 0) / maxRaw;
    expScores[id] = Math.exp(normalized / temperature);
    expSum += expScores[id];
  }
  const careerStrength = {};
  for (const id of careerIds) {
    careerStrength[id] = expSum > 0 ? expScores[id] / expSum : 0;
  }

  return { activeCounts, lastActivated, layerStrength, profileStrength, careerStrength, weightedCounts };
}

// ═══════════════════════════════════════════════════════════════
// RAW INPUT STREAM GENERATOR
// Synthesizes frame-level input samples from event telemetry
// In production: captured at 60fps. Here: interpolated at 10/s
// ═══════════════════════════════════════════════════════════════

function generateRawInputs(events, maxTime) {
  const RATE = 0.1; // sample every 100ms
  const samples = [];
  let curZoom = 150, curUnit = "?", mouseX = 400, mouseY = 300;
  let wasd = [false, false, false, false]; // W A S D
  let mouseFollow = false;
  let unitHP = 100, nearestEnemy = 80, nearestNode = 50, teamPop = 25, cellCount = 10;
  const seed = (t) => Math.sin(t * 127.1 + 311.7) * 43758.5453 % 1;
  const jitter = (t, scale) => (seed(t) - 0.5) * scale;

  // Pre-index events by time for fast lookup
  const eventsByTime = {};
  for (const e of events) {
    const bucket = Math.round(e.t * 10) / 10;
    if (!eventsByTime[bucket]) eventsByTime[bucket] = [];
    eventsByTime[bucket].push(e);
  }

  for (let t = 0; t <= Math.min(maxTime, 300); t += RATE) {
    const roundT = Math.round(t * 10) / 10;
    const evtsNow = eventsByTime[roundT] || [];

    // ── EARLY GAME RAMP: player is orienting, not acting at full speed ──
    // 0-5s: sparse (20%), 5-20s: building, 20s+: full rate
    // Event-driven samples (hot) always pass — real actions aren't suppressed
    const ramp = t < 5 ? 0.2 : t < 20 ? 0.2 + (t - 5) / 15 * 0.8 : 1.0;
    const passRamp = seed(t * 99.7 + 0.3) < ramp; // deterministic gate

    // Update state from events at this time
    for (const e of evtsNow) {
      if (e.type === "ViewEvent") curZoom = e.data.zoomLevel;
      if (e.type === "SwitchEvent") curUnit = (e.data.toUnitType || "").replace("Type", "").substring(0, 4);
      if (e.type === "ControlStateEvent") {
        if (e.data.trigger === "FKeyToggle") mouseFollow = !mouseFollow;
      }
      // Combat proximity affects HP and enemy distance
      if (e.type === "CombatEvent") {
        if (e.data.playerWasVictim) unitHP = Math.max(10, unitHP - 20 - seed(t * 9.1) * 15);
        nearestEnemy = 5 + seed(t * 6.3) * 30; // close when combat happens
      }
      // Node captures shift distances
      if (e.type === "NodeCaptureEvent") {
        nearestNode = 10 + seed(t * 8.7) * 40;
        if (e.data.capturedByTeam === 1) teamPop += 2; else teamPop = Math.max(5, teamPop - 2);
      }
    }

    // Mouse movement: continuous with jitter, bigger moves near events, ramped in early game
    const nearEvent = evtsNow.length > 0;
    const moveRamp = t < 10 ? 0.3 : t < 30 ? 0.3 + (t - 10) / 20 * 0.7 : 1.0;
    mouseX += jitter(t * 3.7, (nearEvent ? 40 : 8) * moveRamp);
    mouseY += jitter(t * 5.3, (nearEvent ? 30 : 6) * moveRamp);
    mouseX = Math.max(50, Math.min(750, mouseX));
    mouseY = Math.max(50, Math.min(550, mouseY));

    // WASD: toggle randomly, more active when no mouse-follow, ramped in early game
    const wasdRamp = t < 10 ? 0.3 : t < 30 ? 0.3 + (t - 10) / 20 * 0.7 : 1.0;
    if (seed(t * 2.1) > 1 - (mouseFollow ? 0.08 : 0.3) * wasdRamp) wasd[0] = !wasd[0];
    if (seed(t * 3.3) > 1 - 0.07 * wasdRamp) wasd[1] = !wasd[1];
    if (seed(t * 4.7) > 1 - 0.05 * wasdRamp) wasd[2] = !wasd[2];
    if (seed(t * 5.9) > 1 - 0.07 * wasdRamp) wasd[3] = !wasd[3];

    // Drift world state between events
    unitHP = Math.min(100, unitHP + 0.3); // slow regen
    nearestEnemy += jitter(t * 4.1, 8); nearestEnemy = Math.max(5, Math.min(150, nearestEnemy));
    nearestNode += jitter(t * 2.9, 4); nearestNode = Math.max(5, Math.min(120, nearestNode));
    cellCount = Math.max(3, Math.round(teamPop * (0.3 + seed(t * 1.7) * 0.4)));

    // ═══ MOUSE samples ═══
    if (passRamp || nearEvent) {
      samples.push({ t: roundT, type: "mouse", data: `${Math.round(mouseX)},${Math.round(mouseY)}`, hot: nearEvent });
    }

    // ═══ KEYBOARD samples ═══
    const keys = (wasd[0]?"W":"")+(wasd[1]?"A":"")+(wasd[2]?"S":"")+(wasd[3]?"D":"");
    if ((keys || seed(t * 7.1) > 0.6) && (passRamp || nearEvent)) {
      samples.push({ t: roundT, type: "key", data: keys || "---", hot: false });
    }

    // ═══ WORLD STATE samples — unitHP, unitPos, enemyDist, nodeDist, teamPop, cellCount, nodeOwner ═══
    // Always-on game state channels — continuous stream like mouse
    if (passRamp || nearEvent) {
      samples.push({ t: roundT, type: "world", data: `hp=${Math.round(unitHP)} pos=${Math.round(mouseX)},${Math.round(mouseY)} ed=${Math.round(nearestEnemy)} nd=${Math.round(nearestNode)} tp=${teamPop} cc=${cellCount}`, hot: nearEvent });
    }

    // ═══ SCROLL events — only on actual zoom changes ═══
    for (const e of evtsNow) {
      if (e.type === "ViewEvent" && e.data.trigger === "scroll") {
        samples.push({ t: roundT, type: "scroll", data: `z${e.data.zoomLevel}`, hot: true });
      }
    }

    // ═══ Click events — continuous stream + bursts at combat ═══
    // Player clicks constantly during gameplay, not just at classified events
    if ((seed(t * 8.9) > 0.9943 || nearEvent) && (passRamp || nearEvent)) {
      samples.push({ t: roundT, type: "click", data: "LMB", hot: nearEvent });
    }
    if ((seed(t * 12.1) > 0.9983 || (nearEvent && seed(t * 7.7) > 0.5)) && (passRamp || nearEvent)) {
      samples.push({ t: roundT, type: "click", data: "RMB", hot: nearEvent });
    }
    for (const e of evtsNow) {
      if (e.type === "CombatEvent" && (e.data.playerWasKiller || e.data.playerUnitKill)) {
        samples.push({ t: roundT, type: "click", data: "LMB", hot: true });
      }
      if (e.type === "SwitchEvent" && e.data.switchMethod === "DirectClick") {
        samples.push({ t: roundT, type: "click", data: "LMB→" + curUnit, hot: true });
      }
      if (e.type === "ControlStateEvent" && e.data.trigger === "WaypointSet") {
        samples.push({ t: roundT, type: "click", data: "RMB wp", hot: true });
      }
      // F key from control state toggles
      if (e.type === "ControlStateEvent" && e.data.trigger === "FKeyToggle") {
        samples.push({ t: roundT, type: "key", data: "F", hot: true });
      }
      if (e.type === "AbilityEvent") {
        const k = e.data.ability === "Replicate" ? "R" : e.data.ability === "Emit" ? "E" : "SPC";
        samples.push({ t: roundT, type: "key", data: k, hot: true });
      }
    }
  }
  return samples;
}

// Pre-generate raw inputs for both sessions
const SOLDIER_RAW = generateRawInputs(SOLDIER_EVENTS, 88.6);
const COMMANDER_RAW = generateRawInputs(COMMANDER_EVENTS, 196.8);

// ═══════════════════════════════════════════════════════════════
// BATTLEFIELD MAP COMPONENT
// ═══════════════════════════════════════════════════════════════

function BattlefieldMap({ time, session = "commander", height = 320 }) {
  const [hover, setHover] = useState(null);
  const W = 420, H = 300;
  const pad = 20;
  const isCmd = session === "commander";
  const events = isCmd ? COMMANDER_EVENTS : SOLDIER_EVENTS;
  const trajectory = isCmd ? CMD_TRAJECTORY : IMM_TRAJECTORY;
  const combatDetail = isCmd ? CMD_COMBAT_DETAIL : IMM_COMBAT_DETAIL;
  const nodeCaptures = isCmd ? CMD_NODE_CAPTURES : IMM_NODE_CAPTURES;
  const abilities = isCmd ? CMD_ABILITIES : IMM_ABILITIES;

  const toSvg = (gameX, gameZ) => {
    const sx = pad + ((gameX - MAP.minX) / (MAP.maxX - MAP.minX)) * (W - 2 * pad);
    const sy = H - pad - ((gameZ - MAP.minZ) / (MAP.maxZ - MAP.minZ)) * (H - 2 * pad);
    return [sx, sy];
  };

  // Node states + capture counts at current time
  const { nodeStates, nodeCounts } = useMemo(() => {
    const states = {}, counts = {};
    for (const c of nodeCaptures) {
      if (c[0] > time) break;
      const name = c[1], team = c[2];
      states[name] = team === 1 ? "pathogen" : "immune";
      if (!counts[name]) counts[name] = { pathogen: 0, immune: 0 };
      counts[name][team === 1 ? "pathogen" : "immune"]++;
    }
    return { nodeStates: states, nodeCounts: counts };
  }, [nodeCaptures, time]);

  // Combat events with detail for tooltips
  const combatDots = useMemo(() => {
    return combatDetail.filter(c => c[0] <= time).map((c, i) => ({
      t: c[0], pos: toSvg(c[1], c[2]),
      killer: UNIT_ABBR[c[3]] || c[3], victim: UNIT_ABBR[c[4]] || c[4],
      isPlayerKill: c[5] === 1, isPlayerDeath: c[6] === 1, i
    }));
  }, [combatDetail, time]);

  // Heatmap cells with kill breakdown
  const heatCells = useMemo(() => {
    const gridSize = 30, cells = {};
    for (const dot of combatDots) {
      const gx = Math.floor(dot.pos[0] / gridSize), gy = Math.floor(dot.pos[1] / gridSize);
      const key = `${gx},${gy}`;
      if (!cells[key]) cells[key] = { x: gx * gridSize, y: gy * gridSize, count: 0, playerKills: 0, playerDeaths: 0, killers: {}, victims: {} };
      cells[key].count++;
      if (dot.isPlayerKill) cells[key].playerKills++;
      if (dot.isPlayerDeath) cells[key].playerDeaths++;
      cells[key].killers[dot.killer] = (cells[key].killers[dot.killer] || 0) + 1;
      cells[key].victims[dot.victim] = (cells[key].victims[dot.victim] || 0) + 1;
    }
    return Object.values(cells);
  }, [combatDots]);

  // Player trajectory from position data
  const trajPoints = useMemo(() => {
    return trajectory.filter(t => t[0] <= time).map(t => ({
      pos: toSvg(t[1], t[2]), unit: t[3], t: t[0]
    }));
  }, [trajectory, time]);

  // Ability positions (waypoints, replicates, emits)
  const abilityDots = useMemo(() => {
    return abilities.filter(a => a[0] <= time).map(a => ({
      pos: toSvg(a[1], a[2]), ability: a[3], unit: a[4], t: a[0]
    }));
  }, [abilities, time]);

  // Player death markers
  const deathMarkers = useMemo(() => {
    return combatDots.filter(d => d.isPlayerDeath);
  }, [combatDots]);

  const handleMouseMove = (e) => {
    const svg = e.currentTarget;
    const rect = svg.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / rect.width * W;
    const my = (e.clientY - rect.top) / rect.height * H;
    // Check heatmap cells
    let best = null;
    for (const cell of heatCells) {
      if (mx >= cell.x && mx <= cell.x + 30 && my >= cell.y && my <= cell.y + 30 && cell.count > 0) {
        best = { type: "heat", ...cell, sx: cell.x + 15, sy: cell.y };
        break;
      }
    }
    // Check ability dots
    if (!best) {
      for (const ab of abilityDots) {
        const dx = ab.pos[0] - mx, dy = ab.pos[1] - my;
        if (Math.sqrt(dx*dx + dy*dy) < 12) {
          best = { type: "ability", ...ab, sx: ab.pos[0], sy: ab.pos[1] };
          break;
        }
      }
    }
    // Check death markers
    if (!best) {
      for (const d of deathMarkers) {
        const dx = d.pos[0] - mx, dy = d.pos[1] - my;
        if (Math.sqrt(dx*dx + dy*dy) < 12) {
          best = { type: "death", ...d, sx: d.pos[0], sy: d.pos[1] };
          break;
        }
      }
    }
    setHover(best);
  };

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height, background: "rgba(0,0,0,0.3)", borderRadius: 10, border: "1px solid rgba(255,255,255,0.06)", cursor: hover ? "crosshair" : "default" }}
         onMouseMove={handleMouseMove} onMouseLeave={() => setHover(null)}>
      {/* Grid */}
      {[0.25, 0.5, 0.75].map(f => (
        <g key={f}>
          <line x1={pad + f * (W - 2 * pad)} y1={pad} x2={pad + f * (W - 2 * pad)} y2={H - pad} stroke="rgba(255,255,255,0.03)" />
          <line x1={pad} y1={pad + f * (H - 2 * pad)} x2={W - pad} y2={pad + f * (H - 2 * pad)} stroke="rgba(255,255,255,0.03)" />
        </g>
      ))}

      {/* Combat heatmap */}
      {heatCells.map((cell, i) => {
        const intensity = Math.min(cell.count / 8, 1);
        const hasPlayerDeath = cell.playerDeaths > 0;
        const hasPlayerKill = cell.playerKills > 0;
        const r = hasPlayerKill ? 100 : hasPlayerDeath ? 255 : 180;
        const g2 = hasPlayerKill ? 200 : hasPlayerDeath ? 40 : 80;
        const b = hasPlayerKill ? 255 : hasPlayerDeath ? 40 : 180;
        return (
          <rect key={i} x={cell.x} y={cell.y} width={30} height={30} rx={4}
            fill={`rgba(${r},${g2},${b},${intensity * 0.35})`}
            stroke={hover && hover.type === "heat" && hover.x === cell.x && hover.y === cell.y ? "rgba(255,255,255,0.5)" : "none"} strokeWidth={1} />
        );
      })}

      {/* Player trajectory line */}
      {trajPoints.length > 1 && (
        <polyline points={trajPoints.map(p => `${p.pos[0]},${p.pos[1]}`).join(" ")}
          fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth={1.5} />
      )}

      {/* Trajectory direction dots */}
      {trajPoints.filter((_, i) => i % 3 === 0).map((p, i) => {
        const age = (time - p.t) / (isCmd ? 197 : 119);
        const c = UNIT_COLORS[p.unit] || "#888";
        return <circle key={`tr-${i}`} cx={p.pos[0]} cy={p.pos[1]} r={2} fill={c} opacity={Math.max(0.15, 1 - age)} />;
      })}

      {/* Ability markers */}
      {abilityDots.map((ab, i) => {
        const age = time - ab.t;
        const opacity = Math.max(0.15, 0.7 - age / 100);
        const isWP = ab.ability === "WaypointSet";
        const isRep = ab.ability === "Replicate";
        const c = isWP ? "#00d4ff" : isRep ? "#a855f7" : "#ffaa00";
        return isWP ? (
          <g key={`ab-${i}`} opacity={opacity}>
            <line x1={ab.pos[0]-5} y1={ab.pos[1]-5} x2={ab.pos[0]+5} y2={ab.pos[1]+5} stroke={c} strokeWidth={1.5} />
            <line x1={ab.pos[0]+5} y1={ab.pos[1]-5} x2={ab.pos[0]-5} y2={ab.pos[1]+5} stroke={c} strokeWidth={1.5} />
          </g>
        ) : (
          <circle key={`ab-${i}`} cx={ab.pos[0]} cy={ab.pos[1]} r={isRep ? 4 : 3} fill="none" stroke={c} strokeWidth={1.5} opacity={opacity} />
        );
      })}

      {/* Node circles with capture counts */}
      {Object.entries(NODES).map(([name, node]) => {
        const [sx, sy] = toSvg(node.x, node.z);
        const state = nodeStates[name];
        const counts = nodeCounts[name] || { pathogen: 0, immune: 0 };
        const isBase = name.includes("Base");
        const isLarge = name.includes("Large");
        const r = isBase ? 14 : isLarge ? 11 : 8;
        const fill = state === "pathogen" ? "rgba(255,107,53,0.3)" : state === "immune" ? "rgba(0,212,255,0.3)" : "rgba(100,100,100,0.2)";
        const stroke = state === "pathogen" ? "#ff6b35" : state === "immune" ? "#00d4ff" : "rgba(255,255,255,0.15)";
        const totalCaps = counts.pathogen + counts.immune;
        return (
          <g key={name}>
            <circle cx={sx} cy={sy} r={r} fill={fill} stroke={stroke} strokeWidth={1.5} />
            <text x={sx} y={sy + 1} textAnchor="middle" dominantBaseline="middle" fill="white" fontSize={isBase ? 9 : 7} fontWeight="bold" fontFamily="'JetBrains Mono',monospace">
              {isBase ? (name === "Base1Node" ? "P" : "I") : totalCaps > 0 ? totalCaps : ""}
            </text>
            {totalCaps > 1 && (
              <text x={sx} y={sy + r + 10} textAnchor="middle" fill="rgba(255,255,255,0.35)" fontSize={7} fontFamily="'JetBrains Mono',monospace">
                {counts.pathogen > 0 ? `P${counts.pathogen}` : ""}{counts.pathogen > 0 && counts.immune > 0 ? "/" : ""}{counts.immune > 0 ? `I${counts.immune}` : ""}
              </text>
            )}
          </g>
        );
      })}

      {/* Player death markers - prominent */}
      {deathMarkers.map((d, i) => (
        <g key={`death-${i}`}>
          <circle cx={d.pos[0]} cy={d.pos[1]} r={10} fill="rgba(255,0,0,0.15)" stroke="rgba(255,0,0,0.6)" strokeWidth={1.5} />
          <text x={d.pos[0]} y={d.pos[1] + 1} textAnchor="middle" dominantBaseline="middle" fill="#ff4444" fontSize={10} fontWeight="bold">{"💀"}</text>
        </g>
      ))}

      {/* Current player position */}
      {trajPoints.length > 0 && (() => {
        const last = trajPoints[trajPoints.length - 1];
        const c = UNIT_COLORS[last.unit] || "#fff";
        return (
          <g>
            <circle cx={last.pos[0]} cy={last.pos[1]} r={8} fill="none" stroke={c} strokeWidth={2} opacity={0.8}>
              <animate attributeName="r" values="6;12;6" dur="2s" repeatCount="indefinite" />
              <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite" />
            </circle>
            <circle cx={last.pos[0]} cy={last.pos[1]} r={4} fill={c} />
          </g>
        );
      })()}

      {/* Map labels */}
      <text x={W - pad - 2} y={pad + 10} textAnchor="end" fill="rgba(255,255,255,0.12)" fontSize={7}
        fontFamily="JetBrains Mono, monospace">PATHOGEN SPAWN</text>
      <text x={pad + 2} y={H - pad - 5} textAnchor="start" fill="rgba(255,255,255,0.12)" fontSize={7}
        fontFamily="JetBrains Mono, monospace">IMMUNE BASE</text>

      {/* Legend */}
      <g transform={`translate(${pad}, ${H - pad + 3})`}>
        <circle cx={5} cy={6} r={3} fill="#00d4ff" opacity={0.6} /><text x={12} y={9} fill="rgba(255,255,255,0.25)" fontSize={6} fontFamily="'JetBrains Mono',monospace">Waypoint</text>
        <circle cx={65} cy={6} r={3} fill="none" stroke="#a855f7" strokeWidth={1.5} /><text x={72} y={9} fill="rgba(255,255,255,0.25)" fontSize={6} fontFamily="'JetBrains Mono',monospace">Replicate</text>
        <text x={135} y={9} fill="rgba(255,0,0,0.5)" fontSize={8} fontWeight="bold">{"💀"}</text><text x={147} y={9} fill="rgba(255,255,255,0.25)" fontSize={6} fontFamily="'JetBrains Mono',monospace">Death</text>
      </g>

      {/* Tooltip */}
      {hover && (() => {
        const tx = Math.min(Math.max(hover.sx + 12, 10), W - 160);
        const ty = Math.max(hover.sy - 50, 5);
        if (hover.type === "heat") {
          const topKillers = Object.entries(hover.killers).sort((a,b) => b[1]-a[1]).slice(0,2).map(([k,v]) => `${k}:${v}`).join(" ");
          const topVictims = Object.entries(hover.victims).sort((a,b) => b[1]-a[1]).slice(0,2).map(([k,v]) => `${k}:${v}`).join(" ");
          return (
            <g>
              <rect x={tx} y={ty} width={150} height={52} rx={6} fill="rgba(0,0,0,0.9)" stroke="rgba(255,255,255,0.3)" strokeWidth={1} />
              <text x={tx+6} y={ty+13} fill="white" fontSize={10} fontWeight="bold" fontFamily="'JetBrains Mono',monospace">{hover.count} kills in zone</text>
              <text x={tx+6} y={ty+26} fill="rgba(255,255,255,0.5)" fontSize={8} fontFamily="'JetBrains Mono',monospace">Killers: {topKillers}</text>
              <text x={tx+6} y={ty+38} fill="rgba(255,255,255,0.5)" fontSize={8} fontFamily="'JetBrains Mono',monospace">Victims: {topVictims}</text>
              {hover.playerKills > 0 && <text x={tx+6} y={ty+48} fill="#00ff88" fontSize={8} fontFamily="'JetBrains Mono',monospace">Player kills: {hover.playerKills}</text>}
            </g>
          );
        }
        if (hover.type === "ability") {
          return (
            <g>
              <rect x={tx} y={ty} width={130} height={30} rx={6} fill="rgba(0,0,0,0.9)" stroke="rgba(168,85,247,0.5)" strokeWidth={1} />
              <text x={tx+6} y={ty+13} fill="white" fontSize={10} fontWeight="bold" fontFamily="'JetBrains Mono',monospace">{hover.ability}</text>
              <text x={tx+6} y={ty+24} fill="rgba(255,255,255,0.5)" fontSize={8} fontFamily="'JetBrains Mono',monospace">{hover.unit} @ {Math.floor(hover.t)}s</text>
            </g>
          );
        }
        if (hover.type === "death") {
          return (
            <g>
              <rect x={tx} y={ty} width={140} height={30} rx={6} fill="rgba(0,0,0,0.9)" stroke="rgba(255,0,0,0.5)" strokeWidth={1} />
              <text x={tx+6} y={ty+13} fill="#ff4444" fontSize={10} fontWeight="bold" fontFamily="'JetBrains Mono',monospace">PLAYER DEATH</text>

const MBTIScatter = ({ time, session }) => {
  const [hover, setHover] = useState(null);
  const data = session === "commander" ? MBTI_CMD : MBTI_IMM;
  const maxT = session === "commander" ? 196.8 : 118.543;
  const visible = data.filter(d => d[4] <= time);
  
  const W = 500, H = 500, pad = 50;
  const cx = W/2, cy = H/2;
  
  const toX = v => pad + ((v + 1) / 2) * (W - 2*pad);
  const toY = v => pad + ((1 - v) / 2) * (H - 2*pad);
  
  const quadColors = { ST: "#ff6b35", SF: "#e74c8b", NT: "#00d4ff", NF: "#a855f7" };
  const quadDesc = { ST: "Facts", SF: "Emotion", NT: "Logic", NF: "Creative" };
  
  const counts = { ST: 0, SF: 0, NT: 0, NF: 0 };
  visible.forEach(d => { if (counts[d[2]] !== undefined) counts[d[2]]++; });
  const total = Math.max(visible.length, 1);

  const handleMouseMove = (e) => {
    const svg = e.currentTarget;
    const rect = svg.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    let best = null, bestDist = 20;
    visible.forEach((d, i) => {
      const dx = toX(d[0]) - mx, dy = toY(d[1]) - my;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < bestDist) { bestDist = dist; best = { ...d, i, sx: toX(d[0]), sy: toY(d[1]) }; }
    });
    setHover(best);
  };
  
  return (
    <svg width={W} height={H} style={{ background: "rgba(0,0,0,0.3)", borderRadius: 12, cursor: hover ? "crosshair" : "default" }}
         onMouseMove={handleMouseMove} onMouseLeave={() => setHover(null)}>
      <defs>
        <radialGradient id={`mbtiGlow${session}`} cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="rgba(255,255,255,0.03)" />
          <stop offset="100%" stopColor="rgba(0,0,0,0)" />
        </radialGradient>
      </defs>
      <rect x={0} y={0} width={W} height={H} fill={`url(#mbtiGlow${session})`} rx={12}/>
      
      <rect x={pad} y={pad} width={(W-2*pad)/2} height={(H-2*pad)/2} fill="rgba(255,107,53,0.05)" />
      <rect x={cx} y={pad} width={(W-2*pad)/2} height={(H-2*pad)/2} fill="rgba(231,76,139,0.05)" />
      <rect x={pad} y={cy} width={(W-2*pad)/2} height={(H-2*pad)/2} fill="rgba(0,212,255,0.05)" />
      <rect x={cx} y={cy} width={(W-2*pad)/2} height={(H-2*pad)/2} fill="rgba(168,85,247,0.05)" />
      
      <line x1={pad} y1={cy} x2={W-pad} y2={cy} stroke="rgba(255,255,255,0.2)" strokeWidth={1} />
      <line x1={cx} y1={pad} x2={cx} y2={H-pad} stroke="rgba(255,255,255,0.2)" strokeWidth={1} />
      
      <text x={cx} y={pad-12} textAnchor="middle" fill="rgba(255,255,255,0.7)" fontSize={15} fontWeight="bold" fontFamily="'JetBrains Mono',monospace">Sensing</text>
      <text x={cx} y={H-pad+24} textAnchor="middle" fill="rgba(255,255,255,0.7)" fontSize={15} fontWeight="bold" fontFamily="'JetBrains Mono',monospace">Intuitive</text>
      <text x={pad-8} y={cy} textAnchor="end" fill="rgba(255,255,255,0.7)" fontSize={15} fontWeight="bold" fontFamily="'JetBrains Mono',monospace" dominantBaseline="middle">Thinker</text>
      <text x={W-pad+8} y={cy} textAnchor="start" fill="rgba(255,255,255,0.7)" fontSize={15} fontWeight="bold" fontFamily="'JetBrains Mono',monospace" dominantBaseline="middle">Feeler</text>
      
      {[
        { q: "ST", x: pad + 55, y: pad + 24 },
        { q: "SF", x: W - pad - 55, y: pad + 24 },
        { q: "NT", x: pad + 55, y: H - pad - 14 },
        { q: "NF", x: W - pad - 55, y: H - pad - 14 }
      ].map(({ q, x, y }) => (
        <g key={q}>
          <text x={x} y={y} textAnchor="middle" fill={quadColors[q]} fontSize={11} fontWeight="bold" fontFamily="'JetBrains Mono',monospace" opacity={0.7}>{quadDesc[q]}</text>
          <text x={x} y={y+18} textAnchor="middle" fill={quadColors[q]} fontSize={22} fontWeight="bold" fontFamily="'JetBrains Mono',monospace" opacity={0.9}>{Math.round(counts[q]/total*100)}%</text>
        </g>
      ))}
      
      {visible.map((d, i) => {
        const age = (time - d[4]) / maxT;
        const opacity = Math.max(0.2, 1 - age * 0.6);
        const isRecent = d[4] > time - 5;
        const isHovered = hover && hover.i === i;
        return (
          <circle key={i} cx={toX(d[0])} cy={toY(d[1])}
            r={isHovered ? 8 : isRecent ? 5 : 3}
            fill={quadColors[d[2]]} opacity={isHovered ? 1 : opacity}
            stroke={isHovered ? "white" : isRecent ? "rgba(255,255,255,0.6)" : "none"}
            strokeWidth={isHovered ? 2 : isRecent ? 1 : 0} />
        );
      })}
      
      {/* Tooltip */}
      {hover && (() => {
        const d = [hover[0], hover[1], hover[2], hover[3], hover[4]];
        const tx = Math.min(hover.sx + 12, W - 140);
        const ty = Math.max(hover.sy - 40, 20);
        return (
          <g>
            <rect x={tx} y={ty} width={130} height={38} rx={6} fill="rgba(0,0,0,0.85)" stroke={quadColors[d[2]]} strokeWidth={1} />
            <text x={tx+8} y={ty+14} fill="white" fontSize={11} fontWeight="bold" fontFamily="'JetBrains Mono',monospace">{d[3]}</text>
            <text x={tx+8} y={ty+28} fill="rgba(255,255,255,0.6)" fontSize={9} fontFamily="'JetBrains Mono',monospace">{quadDesc[d[2]]} \u2022 {Math.floor(d[4]/60)}:{String(Math.floor(d[4]%60)).padStart(2,"0")}</text>
          </g>
        );
      })()}
      
      <circle cx={cx} cy={cy} r={4} fill="none" stroke="rgba(255,255,255,0.25)" strokeWidth={1}>
        <animate attributeName="r" values="3;8;3" dur="3s" repeatCount="indefinite" />
        <animate attributeName="opacity" values="0.3;0.08;0.3" dur="3s" repeatCount="indefinite" />
      </circle>
      <rect x={pad} y={pad} width={W-2*pad} height={H-2*pad} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={1} rx={4} />
    </svg>
  );
};


function TemporalReplay() {
  const [time, setTime] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [speed, setSpeed] = useState(1);
  const [tab, setTab] = useState("career");
  const [mapSession, setMapSession] = useState("commander");
  const [treeSession, setTreeSession] = useState("commander");
  const animRef = useRef(null);
  const lastFrameRef = useRef(null);
  const playingRef = useRef(false);
  const [wallTime, setWallTime] = useState(0); // real elapsed seconds since play start


  // ═══ TELEMETRY FILE LOADING ═══
  const [telemetrySource, setTelemetrySource] = useState("demo"); // "demo" | "loaded"
  const [loadedEvents, setLoadedEvents] = useState(null);
  const [loadedMeta, setLoadedMeta] = useState(null); // {duration, playerTeam, sessionId, label}
  const [telemetryStatus, setTelemetryStatus] = useState("");

  const parseTelemetryFile = useCallback((file) => {
    if (!file || !file.name.endsWith(".json")) return;
    setTelemetryStatus("⏳ " + file.name);
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const raw = JSON.parse(ev.target.result);
        // Map file format {eventType, timestamp, data} → dashboard {t, type, data}
        const events = (raw.events || []).map(e => ({
          t: e.timestamp != null ? e.timestamp : e.t,
          type: e.eventType || e.type,
          data: e.data || {}
        })).sort((a, b) => a.t - b.t);
        if (events.length === 0) { setTelemetryStatus("❌ No events found"); return; }
        // Detect team from first SwitchEvent
        const pathogenTypes = new Set(["VirusType","PneumoniaType","MycobacteriumType","TuberculosisType"]);
        const immuneTypes = new Set(["NeutrophilType","TCellType","NKCellType","MacrophageType"]);
        const firstSwitch = events.find(e => e.type === "SwitchEvent");
        const unitType = firstSwitch?.data?.toUnitType || "";
        const team = pathogenTypes.has(unitType) ? "pathogen" : immuneTypes.has(unitType) ? "immune" : "unknown";
        const duration = raw.matchDuration || Math.max(...events.map(e => e.t || 0));
        const meta = {
          duration: Math.round(duration * 10) / 10,
          playerTeam: raw.playerTeam || (team === "pathogen" ? 1 : 2),
          sessionId: raw.sessionId || file.name.replace(".json", ""),
          label: team === "pathogen" ? "PATHOGEN PLAYER" : team === "immune" ? "IMMUNE PLAYER" : file.name.replace(".json", ""),
          team,
          eventCount: events.length,
          fileName: file.name
        };
        setLoadedEvents(events);
        setLoadedMeta(meta);
        setTelemetrySource("loaded");
        setTelemetryStatus("✅ " + events.length + " events • " + meta.duration.toFixed(0) + "s • " + meta.label);
      } catch (err) {
        setTelemetryStatus("❌ Parse error: " + err.message);
      }
    };
    reader.onerror = () => setTelemetryStatus("❌ File read failed");
    reader.readAsText(file);
  }, []);

  const handleTelemetryFile = useCallback((e) => {
    parseTelemetryFile(e.target?.files?.[0]);
    e.target.value = "";
  }, [parseTelemetryFile]);

  // ═══ RESOLVED DATA — loaded or demo ═══
  const isLoaded = telemetrySource === "loaded" && loadedEvents;
  const activeEvents = isLoaded ? loadedEvents : (treeSession === "commander" ? COMMANDER_EVENTS : SOLDIER_EVENTS);
  const activeDuration = isLoaded ? (loadedMeta?.duration || MAX_DUR) : MAX_DUR;
  const activeLabel = isLoaded ? (loadedMeta?.label || "LOADED") : (treeSession === "commander" ? "THE COMMANDER" : "THE SOLDIER");
  const activeTeam = isLoaded ? (loadedMeta?.team || "unknown") : treeSession;
  const activeColor = activeTeam === "pathogen" ? C_COLOR : S_COLOR;

  // ═══ AUTO-LOAD from local server ═══
  const tick = useCallback(() => {
    if (!playingRef.current) return;
    const now = performance.now();
    if (lastFrameRef.current != null) {
      const realDt = (now - lastFrameRef.current) / 1000; // real seconds
      const dt = realDt * speed * 0.8; // game-time seconds (5x slower than real)
      setWallTime(prev => prev + realDt);
      setTime(prev => {
        const next = prev + dt;
        if (next >= 160) { playingRef.current = false; setPlaying(false); return 160; }
        return next;
      });
    }
    lastFrameRef.current = now;
    if (playingRef.current) animRef.current = requestAnimationFrame(tick);
  }, [speed]);

  useEffect(() => {
    playingRef.current = playing;
    if (playing) {
      lastFrameRef.current = null;
      animRef.current = requestAnimationFrame(tick);
    } else {
      if (animRef.current) cancelAnimationFrame(animRef.current);
    }
    return () => { if (animRef.current) cancelAnimationFrame(animRef.current); };
  }, [playing, tick]);

    const onKey = (e) => {
      if (e.code === "Space" && e.target === document.body) {
        e.preventDefault();
        const next = !playingRef.current;
        playingRef.current = next;
        if (!next && animRef.current) cancelAnimationFrame(animRef.current);
        setPlaying(next);
      }
    };
    window.addEventListener("keydown", onKey);

  }, []);




  const soldierProfile = computeProfile(isLoaded ? loadedEvents : SOLDIER_EVENTS, time);

    return icon + " " + desc;

            const READOUT_EVENTS = new Set(["ev_kill", "ev_death", "ev_capture", "ev_waypoint", "ev_worldDeath"]);
            if (HEATMAP_EVENTS.has(s.id)) inputNodeFire.heatmap = Math.max(inputNodeFire.heatmap, e.t);
            if (SCHEMATIC_EVENTS.has(s.id)) inputNodeFire.schematic = Math.max(inputNodeFire.schematic, e.t);
            if (READOUT_EVENTS.has(s.id)) inputNodeFire.readout = Math.max(inputNodeFire.readout, e.t);
          }
        }
        // Track combat/switch for CELLS input nodes + minimap data
        const PATHOGEN_ABBR = new Set(["Vir", "Pne", "Myc", "Tub"]);
        const IMMUNE_ABBR = new Set(["Neu", "TCe", "NKC", "Mac", "DCe"]);
        const combatDetail = treeSession === "commander" ? CMD_COMBAT_DETAIL : IMM_COMBAT_DETAIL;
        const trajectory = treeSession === "commander" ? CMD_TRAJECTORY : IMM_TRAJECTORY;
        // Build full cell roster from combat + trajectory + node positions
        const cellSightings = [];
        const KILL_SPLASH_FADE = 2.5;
        const killSplashes = [];

        // ═══ SYNTHETIC INITIAL SPAWNS ═══
        // Game starts with ~10 viruses + 3 pathogens at infected basecamp, immune spawns over 0-4s
        const PATHOGEN_BASE = { x: 378, z: 295 };
        const IMMUNE_BASE = { x: 103, z: 118 };
        const INFECTED_NODE = { x: 350, z: 270 }; // basecamp node
        // ═══ GAME NODE POSITIONS ═══
        const MAP_NODES = {
          "Base1Node":    { x: 103, z: 118 },  // immune base
          "Base2Node":    { x: 378, z: 295 },  // pathogen base
          "LargeNode":    { x: 225, z: 210 },  // center
          "SmallNode_UL": { x: 130, z: 310 },  // upper-left (high Z = top in game)
          "SmallNode_UR": { x: 320, z: 340 },  // upper-right
          "SmallNode_LL": { x: 100, z: 250 },  // lower-left
          "SmallNode_LR": { x: 330, z: 170 },  // lower-right
        };
        const hashPos = (i, cx, cz, spread) => ({
          x: cx + Math.sin(i * 2.654 + 1.3) * spread * (0.5 + Math.abs(Math.sin(i * 4.1)) * 0.5),
          z: cz + Math.cos(i * 3.217 + 0.7) * spread * (0.5 + Math.abs(Math.cos(i * 5.3)) * 0.5),
        });
        // Cells wander from spawn point over time — dual-frequency sinusoidal drift
        const driftPos = (baseX, baseZ, cellIdx, t, speed) => {
          const phase = cellIdx * 1.618;
          return {
            x: baseX + Math.sin(t * speed * 0.4 + phase) * 12 + Math.sin(t * speed * 0.15 + phase * 2.3) * 20,
            z: baseZ + Math.cos(t * speed * 0.35 + phase * 1.7) * 12 + Math.cos(t * speed * 0.12 + phase * 3.1) * 18,
          };
        };
        // Pathogen spawns at t=0: 7 viruses near base, 3 near infected node
        if (time >= 0) {
          for (let i = 0; i < 7; i++) {
            const p = hashPos(i, PATHOGEN_BASE.x, PATHOGEN_BASE.z, 30);
            const d = driftPos(p.x, p.z, i, time, 1.0);
            cellSightings.push({ x: d.x, z: d.z, team: "path", age: time, player: false, spawn: true, cellId: `p${i}` });
          }
          for (let i = 0; i < 3; i++) {
            const p = hashPos(i + 10, INFECTED_NODE.x, INFECTED_NODE.z, 20);
            const d = driftPos(p.x, p.z, i + 10, time, 0.8);
            cellSightings.push({ x: d.x, z: d.z, team: "path", age: time, player: false, spawn: true, cellId: `pn${i}` });
          }
          // Infected basecamp node visible from start
          cellSightings.push({ x: INFECTED_NODE.x, z: INFECTED_NODE.z, team: "node", age: time });
        }
        // Immune spawns: staggered over first 4 seconds
        const IMM_SPAWN_TIMES = [0, 0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 3.5];
        const IMM_SPAWN_TYPES = ["Neu", "Neu", "TCe", "NKC", "Neu", "DCe", "Mac", "Neu"];
        for (let i = 0; i < IMM_SPAWN_TIMES.length; i++) {
          if (time >= IMM_SPAWN_TIMES[i]) {
            const p = hashPos(i + 20, IMMUNE_BASE.x, IMMUNE_BASE.z, 25);
            const cellAge = time - IMM_SPAWN_TIMES[i];
            const d = driftPos(p.x, p.z, i + 20, cellAge, 1.2);
            cellSightings.push({ x: d.x, z: d.z, team: "imm", age: cellAge, player: false, spawn: true, cellId: `i${i}` });
          }
        }
        // Immune base node
        if (time >= 0) {
          cellSightings.push({ x: IMMUNE_BASE.x, z: IMMUNE_BASE.z, team: "node", age: time });
        }

        // Trajectory: player-controlled cell positions (most reliable location data)
        for (const t2 of trajectory) {
          if (t2[0] > time) break;
          const age = time - t2[0];
          const isPath = ["VirusType","PneumoniaType","MycobacteriumType","TuberculosisType"].includes(t2[3]);
          cellSightings.push({ x: t2[1], z: t2[2], team: isPath ? "path" : "imm", age, player: true });
        }
        // Combat: both killer and victim positions
        for (const c of combatDetail) {
          if (c[0] > time) break;
          inputNodeFire.enemyDist = c[0];
          inputNodeFire.cellCount = c[0];
          const age = time - c[0];
          const killerTeam = PATHOGEN_ABBR.has(c[3]) ? "path" : IMMUNE_ABBR.has(c[3]) ? "imm" : null;
          const victimTeam = PATHOGEN_ABBR.has(c[4]) ? "path" : IMMUNE_ABBR.has(c[4]) ? "imm" : null;
          // Node positions as map landmarks
          if (c[3] === "Nod" || c[4] === "Nod") {
            cellSightings.push({ x: c[1], z: c[2], team: "node", age });
          }
          if (killerTeam) cellSightings.push({ x: c[1], z: c[2], team: killerTeam, age });
          if (victimTeam) cellSightings.push({ x: c[1], z: c[2], team: victimTeam, age, dead: true });
          if (age < KILL_SPLASH_FADE) {
            killSplashes.push({ x: c[1], z: c[2], age, killer: c[3], victim: c[4] });
          }
        }
        // Player position from trajectory
        let playerPos = null;
        for (const t2 of trajectory) {
          if (t2[0] > time) break;
          playerPos = { x: t2[1], z: t2[2], type: t2[3] };
        }
        // ═══ NODE OWNERSHIP STATE ═══
        // Track which team owns each node at current time
        const nodeOwnership = {}; // nodeName → team (1=pathogen, 2=immune)
        // Base nodes start with their teams
        nodeOwnership["Base2Node"] = 1; // pathogen base starts infected
        nodeOwnership["Base1Node"] = 2; // immune base starts clean
        const nodeCaptures = treeSession === "commander" ? CMD_NODE_CAPTURES : IMM_NODE_CAPTURES;
        for (const c of nodeCaptures) {
          if (c[0] > time) break;
          nodeOwnership[c[1]] = c[2]; // [time, nodeName, capturedByTeam, playerInvolved]
        }
        // Switch events for CELLS input node
        const treeEventsUpToNow = treeEvents.filter(e => e.t <= time);
        for (const e of treeEventsUpToNow) {
          if (e.type === "SwitchEvent") { inputNodeFire.teamPop = e.t; inputNodeFire.nodeOwner = e.t; }
        }
        // ═══ GATED FIREHOSE — only flicker channels with recent real data ═══
        if (playing && COL_RAMP.data > 0) {
          FIREHOSE_KEYS.forEach((key, i) => {
            const lastReal = inputNodeFire[key] !== undefined ? inputNodeFire[key] : -999;
            const realAge = time - lastReal;
            if (realAge > FIREHOSE_RECENCY) return; // channel is stale — go genuinely dark
            const cycle = Math.floor(nowMs / PRIMES[i % PRIMES.length]);
            if (cycle % 7 < 5) firehoseSet.add(key);
          });
        }
        // Population by interval (10s bins): estimate total alive per side
        const POP_BIN = 10;
        const BASE_POP = 25;
        const popBins = [];
        const maxBins = Math.ceil(time / POP_BIN);
        let pathDeaths = 0, immDeaths = 0;
        for (let b = 0; b < maxBins; b++) {
          const t0 = b * POP_BIN;
          const t1 = Math.min(t0 + POP_BIN, time);
          for (const c of combatDetail) {
            if (c[0] < t0 || c[0] > t1) continue;
            if (PATHOGEN_ABBR.has(c[4])) pathDeaths++;
            if (IMMUNE_ABBR.has(c[4])) immDeaths++;
          }
          popBins.push({ t0, pathPop: Math.max(0, BASE_POP - pathDeaths), immPop: Math.max(0, BASE_POP - immDeaths) });
        }

        // Input label nodes — 22 individual data channels for christmas tree firehose
        const INPUT_NODES = [
          // (UNIT now embedded inside HUD container)
          // MOUSE container (boxIdx 0) — 6 channels
          { boxIdx: 0, label: "mouseX", fireKey: "mouseX", color: "#44aaff" },
          { boxIdx: 0, label: "mouseY", fireKey: "mouseY", color: "#3388dd" },
          { boxIdx: 0, label: "velocity", fireKey: "velocity", color: "#55bbff" },
          { boxIdx: 0, label: "LMB", fireKey: "LMB", color: "#ff4444" },
          { boxIdx: 0, label: "RMB", fireKey: "RMB", color: "#ff8800" },
          { boxIdx: 0, label: "scroll", fireKey: "scroll", color: "#66ccff" },
          // KEYBOARD container (boxIdx 1) — 8 channels
          { boxIdx: 1, label: "W", fireKey: "W", color: "#ffcc00" },
          { boxIdx: 1, label: "A", fireKey: "A", color: "#ffbb00" },
          { boxIdx: 1, label: "S", fireKey: "S", color: "#ffdd22" },
          { boxIdx: 1, label: "D", fireKey: "D", color: "#ffaa00" },
          { boxIdx: 1, label: "R", fireKey: "R", color: "#ff5544" },
          { boxIdx: 1, label: "E", fireKey: "E", color: "#ff6633" },
          { boxIdx: 1, label: "SPC", fireKey: "SPC", color: "#ff7744" },
          { boxIdx: 1, label: "F", fireKey: "F", color: "#88cc44" },
          // AUDIO container (boxIdx 2) — 2 channels
          { boxIdx: 2, label: "FX", fireKey: "audio", color: "#cc66ff" },
          { boxIdx: 2, label: "Speech", fireKey: "linguistic", color: "#aa88ff" },
          // TXT container (boxIdx 3) — 3 channels
          { boxIdx: 3, label: "Language", fireKey: "language", color: "#66ff88" },
          { boxIdx: 3, label: "Symbolic", fireKey: "symbolic", color: "#44dd66" },
          { boxIdx: 3, label: "Icon", fireKey: "icon", color: "#88ffaa" },
          // HUD container (boxIdx 4) — 3 channels + UNIT inset
          { boxIdx: 4, label: "Heatmap", fireKey: "heatmap", color: "#ffaa44" },
          { boxIdx: 4, label: "Schematic", fireKey: "schematic", color: "#ff8833" },
          { boxIdx: 4, label: "Readout", fireKey: "readout", color: "#ffcc66" },
          // WORLD container (boxIdx 6) — 7 channels
          { boxIdx: 5, label: "unitHP", fireKey: "unitHP", color: "#44ffaa" },
          { boxIdx: 5, label: "unitPos", fireKey: "unitPos", color: "#00ddff" },
          { boxIdx: 5, label: "enemyDist", fireKey: "enemyDist", color: "#ff4466" },
          { boxIdx: 5, label: "nodeDist", fireKey: "nodeDist", color: "#66ddff" },
          { boxIdx: 5, label: "teamPop", fireKey: "teamPop", color: "#44dd88" },
          { boxIdx: 5, label: "cellCount", fireKey: "cellCount", color: "#88eeff" },
          { boxIdx: 5, label: "nodeOwner", fireKey: "nodeOwner", color: "#aaddff" },
        ];
        const inputNodeH = 14; // half game event height (28/2)

        // v30: eventToBoxIds removed — was only used by legacy synapse system

        // Helper: get best fire time for a box (max across its raw types)
        const getBoxFireTime = (box) => {
          const types = box.rawTypes || [box.id];
          return Math.max(...types.map(t => rawLastFire[t] || -999));
        };
        const getBoxHotTime = (box) => {
          const types = box.rawTypes || [box.id];
          return Math.max(...types.map(t => rawLastHot[t] || -999));
        };

        // Event stream: classified events
        const rawEvents = time < 0.2 ? [] : treeEvents.filter(e => e.t <= time).slice(-14);

        // Compute live-brightness floor from treeActivation (matches mid-playback look)
        const maxEventCount = Math.max(1, ...Object.values(treeActivation.activeCounts || {}));
        const getLiveFinalFloor = (id, type) => {
          if (time < 2) return 0;
          if (type === "event") {
            const c = treeActivation.activeCounts[id] || 0;
            if (id === "ev_worldDeath") return Math.min(0.85, c * 0.012);
            return c > 0 ? Math.max(0.15, Math.min(0.85, Math.sqrt(c / maxEventCount))) : 0;
          }
          if (type === "skill") {
            // Skills lit proportional to their sub-skill fire counts
            const c = treeActivation.activeCounts[id] || 0;
            return c > 0 ? Math.max(0.2, Math.min(0.75, c / maxEventCount * 3)) : 0;
          }
          if (type === "layer") return treeActivation.layerStrength[id] || 0;
          if (type === "profile") return treeActivation.profileStrength[id] || 0;
          if (type === "career") return treeActivation.careerStrength[id] || 0;
          return 0;
        };

        const getNodeIntensity = (id, type) => {
          // ═══ COLUMN RAMP = CEILING — node can't be brighter than its ramp allows ═══
          // Brightness comes FROM signal flow (prop, fire counts, mastery).
          // A node can't light without a path to it. Ramp caps maximum visible brightness.
          let colRamp = 1;
          if (type === "event")  colRamp = COL_RAMP.events;
          if (type === "skill")  colRamp = id === "sk_virus" ? COL_RAMP.bioVirus : COL_RAMP.bioOther;
          if (type === "layer")  colRamp = COL_RAMP.layers;
          if (type === "profile") colRamp = COL_RAMP.profiles;
          if (type === "career") colRamp = COL_RAMP.careers;
          if (colRamp <= 0) return 0;

          // Signal-driven brightness — what actually arrived through edges
          let signal = 0;
          if (type === "event") {
            const preFire = (derivedPreFire[id] || 0) * 0.5;
            const evPulse = getEventPulse(id);
            const prop = getPropIntensity(id);
            const HEAVY = new Set(["ev_emit", "ev_replicate", "ev_zoomOut", "ev_zoomIn", "ev_dock"]);
            if (HEAVY.has(id)) {
              signal = Math.max(evPulse, preFire * 1.5, prop * 1.3);
            } else if (id === "ev_worldDeath") {
              const wdCount = treeActivation.activeCounts["ev_worldDeath"] || 0;
              const accumGlow = Math.min(0.7, wdCount * 0.012);
              signal = Math.max(evPulse * 0.6, preFire, prop * 1.2, accumGlow);
            } else {
              signal = Math.max(evPulse * 0.4, preFire, prop);
            }
          } else if (type === "skill") {
            const prop = getPropIntensity(id);
            const mastery = getParentMastery ? getParentMastery(id) : 0;
            signal = Math.max(prop * 0.5, mastery * 0.8);
          } else if (type === "layer") {
            signal = getPropIntensity(id) * 0.9;
          } else if (type === "profile") {
            signal = getPropIntensity(id) * 0.7;
          } else if (type === "career") {
            signal = getPropIntensity(id) * 0.5;
          }

          // End-state floors only apply when ramp is nearly full (playback ending)
          const liveFloor = colRamp > 0.8 ? getLiveFinalFloor(id, type) : 0;
          const traceFloor = colRamp > 0.8 && isFinalNode(id) ? Math.max(0.12, getFinalStrength(id)) : 0;

          // Final: signal capped by ramp ceiling AND max incoming edge brightness
          // A node can never be brighter than the pathway feeding it
          const edgeCap = maxIncomingEdge[id] !== undefined ? maxIncomingEdge[id] : colRamp;
          return Math.min(Math.max(signal, liveFloor, traceFloor), colRamp, edgeCap);
        };

        const isBlinking = (id) => {
          const last = treeActivation.lastActivated[id];
          if (last === undefined) return false;
          const age = time - last;
          return age > 0 && age < BLINK_WINDOW && COL_RAMP.input > 0;
        };

        // ═══ FORWARD PROPAGATION MODEL ═══
        // Signal travels left→right with real delay per column transition.
        // An event firing at t=5.0 reaches layers at t+0.3, profiles at t+0.6, careers at t+0.9
        const PROP_DELAY = 0.5;  // seconds per column transition (ramps handle cascade timing)
        const PROP_DECAY = 1.2;  // seconds for propagation wavefront to fade
        // Layer speed ratios relative to L1: L2 half speed, L3 third, L4 fifth
        const LAYER_SPEED = { L1: 2.0, L2: 0.5, L3: 0.3, L4: 0.2 };
        const getLayerDelay = (toId) => PROP_DELAY / (LAYER_SPEED[toId] || 1.0);

        // Build propagation timeline: for each node, when did a propagation wavefront last arrive?
        const propArrival = {}; // nodeId → latest arrival time
        // Seed: event nodes fire at their actual event time
        rawEvents.forEach(e => {
          const signals = classifyEvent(e);
          signals.forEach(s => {
            if (s.id.startsWith("ev_")) {
              propArrival[s.id] = Math.max(propArrival[s.id] || -999, e.t);
            }
          });
        });
        // ═══ EVENT NODE SEEDING — sparse bursts from raw inputs ═══
        // Event nodes fire from classified events (sporadic) + periodic raw input bursts
        // Sparse seeding = edges flash on/off instead of staying constantly lit
        // Burst every ~0.6s game-time keeps L1 pathway flashing rapidly
        const RAW_BURST_INTERVAL = 0.6; // seconds between raw-input bursts
        const RAW_BURST_DURATION = 0.25; // how long each burst lasts
        for (const r of rawInputs) {
          if (r.t > time) break;
          // Only seed during burst windows
          const burstPhase = r.t % RAW_BURST_INTERVAL;
          if (burstPhase > RAW_BURST_DURATION) continue;
          if (r.type === "mouse") {
            propArrival["ev_mouseFollow"] = Math.max(propArrival["ev_mouseFollow"] || -999, r.t);
            propArrival["ev_midSwitch"] = Math.max(propArrival["ev_midSwitch"] || -999, r.t);
          }
          if (r.type === "key") {
            const d = r.data || "";
            if (d.includes("W") || d.includes("A") || d.includes("S") || d.includes("D")) {
              propArrival["ev_wasd"] = Math.max(propArrival["ev_wasd"] || -999, r.t);
            }
            if (d === "R" || d.includes("R")) propArrival["ev_replicate"] = Math.max(propArrival["ev_replicate"] || -999, r.t);
            if (d === "E" || d.includes("E")) propArrival["ev_emit"] = Math.max(propArrival["ev_emit"] || -999, r.t);
            if (d === "SPC" || d.includes("SPC")) propArrival["ev_dock"] = Math.max(propArrival["ev_dock"] || -999, r.t);
          }
          if (r.type === "click") {
            propArrival["ev_kill"] = Math.max(propArrival["ev_kill"] || -999, r.t);
          }
          if (r.type === "scroll") {
            propArrival["ev_zoomIn"] = Math.max(propArrival["ev_zoomIn"] || -999, r.t);
            propArrival["ev_zoomOut"] = Math.max(propArrival["ev_zoomOut"] || -999, r.t);
          }
          if (r.type === "world") {
            propArrival["ev_nearSwitch"] = Math.max(propArrival["ev_nearSwitch"] || -999, r.t);
            propArrival["ev_worldDeath"] = Math.max(propArrival["ev_worldDeath"] || -999, r.t);
          }
        }
        // Propagate through edge layers with per-target delay
        const propagateThrough = (edges, delayFn) => {
          edges.forEach(edge => {
            const fromId = edge[0], toId = edge[1], w = edge[2] || 1.0;
            if (w < 0.3) return;
            const fromArrival = propArrival[fromId];
            if (fromArrival === undefined || fromArrival < -900) return;
            const delay = typeof delayFn === "function" ? delayFn(toId) : delayFn;
            const toArrival = fromArrival + delay;
            if (toArrival <= time) {
              propArrival[toId] = Math.max(propArrival[toId] || -999, toArrival);
            }
          });
        };
        propagateThrough(EVENT_SUBSKILL_EDGES, PROP_DELAY * 2.0); // event → sub-skill (visible cascade delay)
        propagateThrough(EVENT_SKILL_EDGES, PROP_DELAY * 2.5); // event → parent cell
        propagateThrough(SUBSKILL_LAYER_EDGES, getLayerDelay); // skill→layer (replaces direct event→layer)
        propagateThrough(LAYER_PROFILE_EDGES, PROP_DELAY);
        propagateThrough(PROFILE_CAREER_EDGES, PROP_DELAY);

        // Get propagation intensity: how recently did the wavefront arrive at this node?
        const HEAVY_EVENTS = new Set(["ev_emit", "ev_replicate", "ev_zoomOut", "ev_zoomIn", "ev_dock"]);
        const getPropIntensity = (id) => {
          const arrival = propArrival[id];
          if (arrival === undefined || arrival < -900) return 0;
          const age = time - arrival;
          if (age < 0) return 0;
          // L1 decays fast — short blink window so it flashes on/off
          if (id === "L1") return Math.exp(-age / 0.4);
          // worldDeath: sustain grows with attrition count — starts normal, ends 4× longer
          if (id === "ev_worldDeath") {
            const wdCount = treeActivation.activeCounts["ev_worldDeath"] || 0;
            const wdDecay = PROP_DECAY * (1 + Math.min(3, wdCount * 0.06)); // 1×→4× over ~50 deaths
            return Math.exp(-age / wdDecay);
          }
          // Heavy events sustain 3× longer
          const decay = HEAVY_EVENTS.has(id) ? PROP_DECAY * 3 : PROP_DECAY;
          return Math.exp(-age / decay);
        };

        // Edge propagation: edge lights up ONLY when wavefront is traversing it
        const getEdgePropIntensity = (fromId, toId, delay) => {
          // Use layer-specific delay for layer targets
          const edgeDelay = LAYER_SPEED[toId] ? getLayerDelay(toId) : delay;
          const fromArrival = propArrival[fromId];
          if (fromArrival === undefined || fromArrival < -900) return 0;
          const edgeStart = fromArrival;
          const edgeEnd = fromArrival + edgeDelay;
          // L1 edges: fast blink with short fade
          const fadeTime = toId === "L1" ? 0.2 : PROP_DECAY * 0.5;
          if (time >= edgeStart && time <= edgeEnd + fadeTime) {
            const transitProgress = Math.min(1, (time - edgeStart) / edgeDelay);
            const fadeAfter = time > edgeEnd ? Math.exp(-(time - edgeEnd) / fadeTime) : 1;
            return transitProgress * fadeAfter;
          }
          return 0;
        };

        // ═══ CUMULATIVE EDGE FIRE TRACKING — "baking in" trails ═══
        // Count how many times each edge path has been activated
        // This creates permanent visual weight on frequently-used pathways
        const edgeFireCounts = {}; // "fromId:toId" → weighted count
        rawEvents.forEach(e => {
          const signals = classifyEvent(e);
          signals.forEach(s => {
            // Count channel→event fires, weighted by signal importance
            const evId = s.id;
            const layerId = s.layer;
            if (evId && layerId) {
              const importance = SIGNAL_IMPORTANCE[evId] || 1.0;
              const k1 = `${evId}:${layerId}`;
              edgeFireCounts[k1] = (edgeFireCounts[k1] || 0) + s.weight * importance;
            }
            // Count source channel activations → event (also importance-weighted)
            if (evId && evId.startsWith("ev_")) {
              const importance = SIGNAL_IMPORTANCE[evId] || 1.0;
              for (const df of DERIVED_FEATURES) {
                if (df.feeds.includes(evId)) {
                  for (const src of df.sources) {
                    const k2 = `${src}:${evId}`;
                    edgeFireCounts[k2] = (edgeFireCounts[k2] || 0) + 0.5 * importance;
                  }
                }
              }
            }
          });
        });
        // Find the max fire count for normalization
        // ─── CHANNEL → DERIVED FEATURE fire counts ─────────────
        const timeBasedRawVolume = Math.max(1, time * 10);
        for (const df of DERIVED_FEATURES) {
          for (const src of df.sources) {
            const k = `${src}:${df.id}`;
            edgeFireCounts[k] = (edgeFireCounts[k] || 0) + timeBasedRawVolume * 0.08;
          }
          for (const evId of df.feeds) {
            const k = `${df.id}:${evId}`;
            const relevantEvents = rawEvents.filter(e => classifyEvent(e).some(s => s.id === evId)).length;
            edgeFireCounts[k] = (edgeFireCounts[k] || 0) + relevantEvents * 0.5;
          }
        }
        // ─── SKILL → L1 edge fire counts: boost from raw input volume ─────────────
        for (const edge of SUBSKILL_LAYER_EDGES) {
          if (edge[1] === "L1" && edge[2] >= 0.3) {
            const k = `${edge[0]}:L1`;
            edgeFireCounts[k] = (edgeFireCounts[k] || 0) + timeBasedRawVolume * 0.04;
          }
        }
        // ─── HEAVY EVENT boost cascades through skills ─────────────
        for (const sEdge of EVENT_SKILL_EDGES) {
          if (HEAVY_EVENTS.has(sEdge[0])) {
            const sk = `${sEdge[0]}:${sEdge[1]}`;
            edgeFireCounts[sk] = (edgeFireCounts[sk] || 0) + timeBasedRawVolume * 0.06;
          }
        }
        // ─── EVENT → SUB-SKILL edge fire counts (independent per sub-skill) ─────────────
        for (const edge of EVENT_SUBSKILL_EDGES) {
          const k = `${edge[0]}:${edge[1]}`;
          const eventFires = rawEvents.filter(e => classifyEvent(e).some(s => s.id === edge[0])).length;
          edgeFireCounts[k] = (edgeFireCounts[k] || 0) + eventFires * (edge[2] || 1) * 0.8;
        }
        // ─── EVENT → SKILL edge fire counts ─────────────
        for (const edge of EVENT_SKILL_EDGES) {
          const k = `${edge[0]}:${edge[1]}`;
          const eventFires = rawEvents.filter(e => classifyEvent(e).some(s => s.id === edge[0])).length;
          edgeFireCounts[k] = (edgeFireCounts[k] || 0) + eventFires * (edge[2] || 1) * 0.6;
        }
        // ─── RANDOM FIRE: ALL game events → ALL biology skills at half firehose speed ─────────────
        // Fire counts ALWAYS accumulate (for final pathway myelination)
        // Propagation arrivals ONLY during playback (for visual flicker)
        // GATE: biology skills only fire AFTER game events have populated (left→right cascade)
        const MOVEMENT_EVENTS = new Set(["ev_wasd", "ev_mouseFollow", "ev_waypoint"]);
        const movementEdgeKeys = new Set(); // track for blue coloring in renderer
        const activeEventCount = TREE_EVENTS.filter(ev => propArrival[ev.id] !== undefined && propArrival[ev.id] > -900).length;
        if (COL_RAMP.events > 0 && activeEventCount >= 2) {
          const HALF_PRIMES = [14, 22, 26, 34, 38, 46, 58, 62, 74, 82, 86, 94, 106, 118, 122, 134, 142, 146, 158, 166, 178];

          // First pass: determine which skills are "active" from non-movement events
          const skillActivity = {};
          TREE_SKILLS.forEach(sk => { skillActivity[sk.id] = 0; });

          // Non-movement events fire normally to all skills (gated by per-skill ramp)
          TREE_EVENTS.forEach((ev, ei) => {
            if (MOVEMENT_EVENTS.has(ev.id)) return;
            TREE_SKILLS.forEach((sk, si) => {
              // Per-skill ramp: virus lights with events, others ramp 5-30s
              const skRamp = sk.id === "sk_virus" ? COL_RAMP.bioVirus : sk.id === "sk_win" ? COL_RAMP.bioOther : COL_RAMP.bioOther;
              if (skRamp <= 0) return;
              const pairIdx = ei * TREE_SKILLS.length + si;
              const period = HALF_PRIMES[pairIdx % HALF_PRIMES.length];
              const cycle = Math.floor(nowMs / period);
              const phase = (ev.id.length * 17 + sk.id.length * 31 + pairIdx * 7) % 13;
              if ((cycle + phase) % 9 < 5) {
                const k = `${ev.id}:${sk.id}`;
                edgeFireCounts[k] = (edgeFireCounts[k] || 0) + 2 * skRamp;
                if (playing) {
                  propArrival[sk.id] = Math.max(propArrival[sk.id] || -999, time - 0.8);
                  propArrival[ev.id] = Math.max(propArrival[ev.id] || -999, time - 0.1);
                }
                skillActivity[sk.id] = (skillActivity[sk.id] || 0) + 2 * skRamp;
              }
            });
          });

          // Identify active skills
          const activeSkills = TREE_SKILLS.filter(sk => skillActivity[sk.id] > 3);
          const hasActive = activeSkills.length > 0;

          // Movement events: fire RAPIDLY to active cells at 50%, or any cell at 30%
          TREE_EVENTS.forEach((ev, ei) => {
            if (!MOVEMENT_EVENTS.has(ev.id)) return;
            const movPrimes = [11, 17, 23, 29, 37];
            TREE_SKILLS.forEach((sk, si) => {
              const skRamp = sk.id === "sk_virus" ? COL_RAMP.bioVirus : COL_RAMP.bioOther;
              if (skRamp <= 0) return;
              const pairIdx = ei * TREE_SKILLS.length + si;
              const period = movPrimes[pairIdx % movPrimes.length];
              const cycle = Math.floor(nowMs / period);
              const phase = (ev.id.length * 7 + sk.id.length * 19 + pairIdx * 3) % 7;
              const isActive = hasActive && activeSkills.some(a => a.id === sk.id);
              const duty = hasActive ? (isActive ? 5 : 0) : 3;
              if ((cycle + phase) % 9 < duty) {
                const k = `${ev.id}:${sk.id}`;
                const brightness = isActive || !hasActive ? (hasActive ? 5 : 3) : 0;
                edgeFireCounts[k] = (edgeFireCounts[k] || 0) + brightness * skRamp;
                if (playing) {
                  propArrival[sk.id] = Math.max(propArrival[sk.id] || -999, time - 0.8);
                  propArrival[ev.id] = Math.max(propArrival[ev.id] || -999, time - 0.08);
                }
                movementEdgeKeys.add(k);
              }
            });
          });

          // Sub-skill edges for all events
          TREE_EVENTS.forEach((ev, ei) => {
            TREE_SUB_SKILLS.forEach((ss, si) => {
              const pairIdx = ei * TREE_SUB_SKILLS.length + si;
              const period = HALF_PRIMES[(pairIdx + 3) % HALF_PRIMES.length];
              const cycle = Math.floor(nowMs / period);
              const phase = (ev.id.length * 13 + ss.id.length * 29 + pairIdx * 11) % 11;
              if ((cycle + phase) % 9 < 4) {
                const k = `${ev.id}:${ss.id}`;
                edgeFireCounts[k] = (edgeFireCounts[k] || 0) + 1.5;
                if (playing) {
                  propArrival[ss.id] = Math.max(propArrival[ss.id] || -999, time - 0.9);
                }
                if (MOVEMENT_EVENTS.has(ev.id)) movementEdgeKeys.add(k);
              }
            });
          });
          // Cascade sub-skill fires into sub-skill→layer edges (always accumulate)
          SUBSKILL_LAYER_EDGES.forEach((edge, i) => {
            const k = `${edge[0]}:${edge[1]}`;
            // Check if this sub-skill has any fire count from any source
            const ssHasFire = Object.keys(edgeFireCounts).some(ek => ek.endsWith(`:${edge[0]}`) && edgeFireCounts[ek] > 0);
            if (ssHasFire) {
              edgeFireCounts[k] = (edgeFireCounts[k] || 0) + (edge[2] || 1) * 2;
              if (playing) {
                const ssArrival = propArrival[edge[0]];
                if (ssArrival !== undefined && ssArrival > -900 && time - ssArrival < 1.5) {
                  propArrival[edge[1]] = Math.max(propArrival[edge[1]] || -999, ssArrival + PROP_DELAY * 0.5);
                }
              }
            }
          });
        }
        // ─── SKILL → LAYER edge fire counts (cascade from sub-skill activation) ─────────────
        for (const sEdge of EVENT_SUBSKILL_EDGES) {
          const sk = `${sEdge[0]}:${sEdge[1]}`;
          const sCount = edgeFireCounts[sk] || 0;
          if (sCount > 0) {
            for (const lEdge of SUBSKILL_LAYER_EDGES) {
              if (lEdge[0] === sEdge[1]) {
                const lk = `${lEdge[0]}:${lEdge[1]}`;
                edgeFireCounts[lk] = (edgeFireCounts[lk] || 0) + sCount * (lEdge[2] || 1) * 0.4;
              }
            }
          }
        }
        // ─── CASCADE: propagate counts through skill→layer→profile→career AFTER all boosts ─────────────
        for (const edge of SUBSKILL_LAYER_EDGES) {
          const k = `${edge[0]}:${edge[1]}`;
          const count = edgeFireCounts[k] || 0;
          if (count > 0) {
            for (const pe of LAYER_PROFILE_EDGES) {
              if (pe[0] === edge[1]) {
                const pk = `${pe[0]}:${pe[1]}`;
                const layerMult = LAYER_CAREER_WEIGHT[pe[0]] || 1;
                edgeFireCounts[pk] = (edgeFireCounts[pk] || 0) + count * (pe[2] || 1) * layerMult * 0.5;
              }
            }
          }
        }
        for (const edge of LAYER_PROFILE_EDGES) {
          const k = `${edge[0]}:${edge[1]}`;
          const count = edgeFireCounts[k] || 0;
          if (count > 0) {
            for (const ce of PROFILE_CAREER_EDGES) {
              if (ce[0] === edge[1]) {
                const ck = `${ce[0]}:${ce[1]}`;
                edgeFireCounts[ck] = (edgeFireCounts[ck] || 0) + count * (ce[2] || 1) * 0.3;
              }
            }
          }
        }
        const maxFireCount = Math.max(1, ...Object.values(edgeFireCounts));

        // ═══ MAX INCOMING EDGE BRIGHTNESS — node can't be brighter than its brightest feeding pathway ═══
        const maxIncomingEdge = {};
        const computeEdgeBrightness = (fromId, toId, weight) => {
          const fireKey = `${fromId}:${toId}`;
          const rawFire = edgeFireCounts[fireKey] || 0;
          const propEdge = getEdgePropIntensity(fromId, toId, PROP_DELAY) * (weight || 1);
          const CYCLE_LEN = Math.max(1, maxFireCount * 0.3);
          const completed = Math.floor(rawFire / CYCLE_LEN);
          const progress = (rawFire % CYCLE_LEN) / CYCLE_LEN;
          const mFloor = Math.min(0.3, completed * 0.06);
          const cycleBright = mFloor + progress * (0.7 - mFloor);
          return Math.max(cycleBright, propEdge);
        };
        const ALL_EDGES = [
          ...EVENT_SKILL_EDGES, ...EVENT_SUBSKILL_EDGES,
          ...SUBSKILL_LAYER_EDGES, ...LAYER_PROFILE_EDGES, ...PROFILE_CAREER_EDGES
        ];
        for (const edge of ALL_EDGES) {
          const toId = edge[1], w = edge[2] || 1;
          const b = computeEdgeBrightness(edge[0], toId, w);
          maxIncomingEdge[toId] = Math.max(maxIncomingEdge[toId] || 0, b);
        }

        // ═══ FINAL PATHWAY — when stopped, ALL fired chains remain highlighted ═══
        // Full trace: channel → derived feature → event → skill → layer → profile → career
        // Brightness proportional to fire count relative to max
        const finalPathway = new Set(); // set of "fromId:toId" edge keys + node IDs
        const finalStrength = {}; // node/edge → 0-1 strength for brightness scaling
        if (time > 2) {
          // Find max fire count for normalization (across ALL edge types)
          let maxELFire = 1;
          for (const edge of SUBSKILL_LAYER_EDGES) {
            const k = `${edge[0]}:${edge[1]}`;
            const c = edgeFireCounts[k] || 0;
            if (c > maxELFire) maxELFire = c;
          }
          for (const edge of EVENT_SKILL_EDGES) {
            const k = `${edge[0]}:${edge[1]}`;
            const c = edgeFireCounts[k] || 0;
            if (c > maxELFire) maxELFire = c;
          }
          for (const edge of LAYER_PROFILE_EDGES) {
            const k = `${edge[0]}:${edge[1]}`;
            const c = edgeFireCounts[k] || 0;
            if (c > maxELFire) maxELFire = c;
          }
          // Trace EVERY skill→layer edge that fired
          for (const edge of SUBSKILL_LAYER_EDGES) {
            const k = `${edge[0]}:${edge[1]}`;
            const c = edgeFireCounts[k] || 0;
            if (c < 1) continue;
            const strength = Math.max(0.15, c / maxELFire);
